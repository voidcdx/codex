<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Void Codex — Faction Weakness</title>
  <link rel="icon" type="image/png" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/layout.css">
  <link rel="stylesheet" href="/static/panels.css">
  <link rel="stylesheet" href="/static/responsive.css">
  <link rel="stylesheet" href="/static/factions.css">
</head>
<body>
<div class="atmo"></div>

<div class="app">

<main class="main">
<header class="header">
  <div class="live-header-brand">VOID <span>CODEX</span><div class="live-subtext" data-text="FACTION WEAKNESS">FACTION WEAKNESS</div></div>
  <div class="header-actions">
    <div class="theme-switcher">
      <span class="theme-dot" data-theme="stalker" title="Stalker Classic"></span>
      <span class="theme-dot" data-theme="jade"    title="Jade"></span>
      <span class="theme-dot" data-theme="ash"     title="Void Ash"></span>
    </div>
  </div>
</header>

<div class="factions-wrap">
  <div class="faction-controls">
    <div class="search-wrap" id="faction-search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/>
      </svg>
      <input type="text" id="faction-search" class="faction-search-input" placeholder="Search factions…" autocomplete="off">
      <button class="search-clear-btn" id="search-clear" onclick="clearSearch()" aria-label="Clear search">×</button>
    </div>
    <div class="filter-pills" id="type-pills">
      <button class="filter-pill active" data-filter="all" onclick="setFilter(this)">All</button>
      <button class="filter-pill" data-filter="weak" onclick="setFilter(this)">Vulnerable</button>
      <button class="filter-pill" data-filter="resist" onclick="setFilter(this)">Resistant</button>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-pills" id="group-pills">
      <button class="filter-pill active" data-group="all" onclick="setGroup(this)">All</button>
      <button class="filter-pill" data-group="grineer" onclick="setGroup(this)">Grineer</button>
      <button class="filter-pill" data-group="corpus" onclick="setGroup(this)">Corpus</button>
      <button class="filter-pill" data-group="infested" onclick="setGroup(this)">Infested</button>
      <button class="filter-pill" data-group="other" onclick="setGroup(this)">Other</button>
    </div>
  </div>

  <div class="faction-roster" id="faction-roster"></div>
</div>
</main>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <div class="brand-text">VOID <span>CODEX</span></div>
  </div>

  <nav class="nav-menu">
    <a href="/calculator" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 20 20"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="11" y="3" width="6" height="6" rx="1"/><rect x="3" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/></svg>
      </div>
      Calculator
    </a>
    <a href="/live" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="3"/><path d="M10 2 L10 5 M10 15 L10 18 M2 10 L5 10 M15 10 L18 10"/></svg>
      </div>
      Live Data
    </a>
    <a href="/factions" class="nav-item active">
      <div class="nav-icon">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M10 2L17 5V12C17 15.5 10 18 10 18C10 18 3 15.5 3 12V5Z"/>
          <line x1="10" y1="8" x2="10" y2="12"/><line x1="8" y1="10" x2="12" y2="10"/>
        </svg>
      </div>
      Factions
    </a>
    <a href="/reliquary" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="7" width="14" height="10" rx="1"/>
          <path d="M6 7V5a4 4 0 0 1 8 0v2"/>
          <circle cx="10" cy="12" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      Reliquary
    </a>
  </nav>

  <div class="sidebar-tools">
    <button class="nav-item" onclick="openGuide()">
      <div class="nav-icon">
        <svg viewBox="0 0 20 20"><rect x="4" y="3" width="12" height="14" rx="1"/><line x1="7" y1="7" x2="13" y2="7"/><line x1="7" y1="11" x2="13" y2="11"/></svg>
      </div>
      Guide
    </button>
  </div>

  <div class="sidebar-footer">
    <div class="sidebar-theme-switcher">
      <span class="sidebar-theme-label">Theme</span>
      <div class="theme-switcher" style="padding-right:0">
        <span class="theme-dot" data-theme="stalker" title="Stalker Classic"></span>
        <span class="theme-dot" data-theme="jade"    title="Jade"></span>
        <span class="theme-dot" data-theme="ash"     title="Void Ash"></span>
      </div>
    </div>
    <div id="nav-ver">v—</div>
    <div class="sidebar-footer-copy">© 2026 Void Codex</div>
    <div class="sidebar-footer-copy">Data: wiki.warframe.com</div>
    <div class="sidebar-footer-copy">Not affiliated with DE</div>
  </div>
</aside>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleDrawer()"></div>
<button class="burger-btn" id="burger-btn" aria-label="Menu" onclick="toggleDrawer()">
  <span></span><span></span><span></span>
</button>

</div><!-- .app -->

<script src="/static/js/constants.js"></script>
<script src="/static/js/factions.js"></script>
<script src="/static/js/theme.js"></script>
</body>
</html>
