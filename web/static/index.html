<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warframe Damage Calculator</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css">
</head>
<body>
<header>
  <h1>Warframe Damage Calculator</h1>
</header>

<div class="container">
  <div>
    <!-- Weapon -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Weapon</h2>
      <input type="text" id="weapon-search" class="search-input" placeholder="Search weapon…">
      <label for="weapon-select">Weapon</label>
      <select id="weapon-select" size="1"></select>
    </div>

    <!-- Mods — 2×4 card grid -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Mods (in slot order)</h2>
      <div id="mod-grid-wrapper">
        <div id="mod-grid" class="mod-grid"></div>
        <svg id="element-arcs"></svg>
      </div>
      <div id="element-badges" class="element-badges"></div>
      <button class="btn-optimal" id="optimal-btn" onclick="runOptimalOrder()" disabled>Optimal Mod Order</button>
    </div>

    <!-- Mod Picker Modal -->
    <div class="mod-picker-overlay" id="mod-picker-overlay">
      <div class="mod-picker">
        <div class="mod-picker-header">
          <h3>Select Mod — Slot <span id="picker-slot-num"></span></h3>
          <input type="text" class="mod-picker-search" id="mod-picker-search" placeholder="Search mods…" autocomplete="off">
        </div>
        <div class="mod-picker-list" id="mod-picker-list"></div>
      </div>
    </div>

    <!-- Enemy -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Enemy</h2>
      <input type="text" id="enemy-search" class="search-input" placeholder="Search enemy…">
      <label for="enemy-select">Enemy</label>
      <select id="enemy-select" size="1"></select>
    </div>

    <!-- Hit Options -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Hit Options</h2>
      <div class="options-row">
        <div>
          <label for="crit-mode">Hit Type</label>
          <select id="crit-mode">
            <option value="average">Average (Expected)</option>
            <option value="guaranteed">Guaranteed Crit</option>
            <option value="max">Maximum Crit</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:18px">
          <input type="checkbox" id="headshot-cb" style="width:auto;margin:0">
          <label for="headshot-cb" style="margin:0;cursor:pointer">Headshot</label>
        </div>
        <div>
          <label for="viral-stacks">Viral Stacks</label>
          <input type="number" id="viral-stacks" min="0" max="10" value="0" style="width:64px">
        </div>
        <div>
          <label for="corrosive-stacks">Corrosive Stacks</label>
          <input type="number" id="corrosive-stacks" min="0" max="10" value="0" style="width:64px">
        </div>
      </div>
    </div>

    <button class="btn-calc" id="calc-btn" onclick="runCalculation()">Calculate</button>
  </div>

  <!-- Right column -->
  <div class="right-col">

    <!-- Weapon Stats -->
    <div class="panel" id="weapon-stats-panel" style="display:none">
      <h2>Weapon Stats</h2>
      <div id="weapon-stats-content"></div>
    </div>

    <!-- Enemy Stats -->
    <div class="panel" id="enemy-stats-panel" style="display:none">
      <h2>Enemy Stats</h2>
      <div id="enemy-stats-content"></div>
    </div>

    <!-- Results -->
    <div class="panel results-panel" id="results-panel">
      <h2>Results</h2>
      <div class="no-results" id="no-results">Select a weapon and enemy, then click Calculate.</div>
      <div id="results-content" style="display:none"></div>
    </div>

  </div>
</div>

<script>
let allWeapons = [];
let allMods = [];
let allEnemies = [];

// Warframe element colours
const ELEM_COLORS = {
  impact:      '#9090b0',
  puncture:    '#d0c080',
  slash:       '#e05050',
  heat:        '#ff7a30',
  cold:        '#60b0e0',
  electricity: '#f0e040',
  toxin:       '#60d030',
  blast:       '#ffd040',
  corrosive:   '#a0e040',
  gas:         '#c0e040',
  magnetic:    '#c060f0',
  radiation:   '#f0a020',
  viral:       '#f060a0',
  true:        '#ffffff',
  void:        '#9060ff',
};

// Tooltip text map
const TOOLTIPS = {
  'crit-chance':  'Chance per hit to deal a critical strike. 100–200% = guaranteed Tier 1 + chance at Tier 2, etc.',
  'crit-mult':    'Damage multiplier on a critical hit.',
  'status':       'Chance per hit to apply a status proc — Slash bleed, Heat burn, Viral debuff, etc.',
  'fire-rate':    'Shots (or attacks) per second. Affects DPS but not per-hit damage.',
  'magazine':     'Rounds before a reload is required.',
  'reload':       'Time in seconds to reload the weapon.',
  'multishot':    'Projectiles fired per trigger pull. Each projectile deals full damage and independently rolls status/crit. Base is 1.0 for all weapons.',
  'impact':       'Strong vs. Machinery, Robotic. Weak vs. Infested Sinew.',
  'puncture':     'Strong vs. Armor, Fossilized. Weak vs. Infested Flesh.',
  'slash':        'Strong vs. Cloned Flesh, Infested. Weak vs. Robotic, Machinery. Procs a bleed DoT that bypasses armor.',
  'heat':         'Strong vs. Cloned Flesh, Infested Flesh. Weak vs. Robotic. Procs a burn DoT.',
  'cold':         'Strong vs. Shields, Proto Shields. Weak vs. Infested. Procs a slow.',
  'electricity':  'Strong vs. Robotic, Machinery. Weak vs. Alloy Armor. Procs a chain stun.',
  'toxin':        'Strong vs. Cloned Flesh, Fossilized. Weak vs. Robotic, Machinery. Procs a poison DoT that bypasses shields.',
  'blast':        'Heat + Cold. Strong vs. Machinery, Fossilized. Weak vs. Alloy Armor. Procs a knockback.',
  'corrosive':    'Electricity + Toxin. Strong vs. Ferrite Armor, Fossilized. Weak vs. Proto Shields. Permanently strips armor stacks.',
  'gas':          'Heat + Toxin. Strong vs. Infested Flesh. Weak vs. Robotic, Machinery. Procs a toxic cloud AoE.',
  'magnetic':     'Cold + Electricity. Strong vs. Shields, Proto Shields. Weak vs. Alloy Armor. Procs a shield drain.',
  'radiation':    'Heat + Electricity. Strong vs. Alloy Armor, Robotic. Weak vs. Ferrite Armor, Infested. Procs confusion (enemies attack each other).',
  'viral':        'Cold + Toxin. Strong vs. Cloned Flesh, Flesh. Weak vs. Robotic, Machinery. Procs a health debuff (×4.25 damage to health at 10 stacks).',
  'void':         'Dealt by Operator amps and select weapons. No special armor/health interactions.',
};

// Track current multishot for results note
let _currentMultishot = 1.0;

function initTooltips() {
  document.querySelectorAll('[data-tooltip]').forEach(el => {
    if (el._tippyBound) return;
    const text = TOOLTIPS[el.dataset.tooltip];
    if (!text) return;
    el._tippyBound = true;
    if (typeof tippy === 'function') {
      tippy(el, {
        content: text,
        placement: 'top',
        theme: 'warframe',
        delay: [200, 0],
        maxWidth: 280,
      });
    }
  });
}

async function loadData() {
  [allWeapons, allMods, allEnemies] = await Promise.all([
    fetch('/api/weapons').then(r => r.json()),
    fetch('/api/mods').then(r => r.json()),
    fetch('/api/enemies').then(r => r.json()),
  ]);
  populateSelect('weapon-select', allWeapons.map(w => w.name));
  populateSelect('enemy-select', allEnemies.map(e => e.name));

  document.getElementById('weapon-select').addEventListener('change', onWeaponChange);
  document.getElementById('enemy-select').addEventListener('change', () => { showEnemyStats(getCurrentEnemy()); updateOptimalBtn(); });

  initModGrid();

  // Default selections for quick testing
  setSelectValue('weapon-select', 'Soma Prime');
  setSelectValue('enemy-select', 'Heavy Gunner');
  onWeaponChange();
  showEnemyStats(getCurrentEnemy());
}

function getCurrentWeapon() {
  const name = document.getElementById('weapon-select').value;
  return allWeapons.find(x => x.name === name) || null;
}

function getCurrentEnemy() {
  const name = document.getElementById('enemy-select').value;
  return allEnemies.find(x => x.name === name) || null;
}

// ---------------------------------------------------------------------------
// 2×4 Mod Card Grid
// ---------------------------------------------------------------------------
let selectedAttack = null; // name of selected attack mode (null = first)

let modSlots = ['','','','','','','','']; // 8 slots, mod names
let _pickerSlot = -1; // which slot the picker is open for
let _sortableInstance = null;

function polaritySVG(polarity) {
  if (!polarity) return '';
  const paths = {
    'Madurai':   '<path d="M6 2L11 10L6 8L1 10Z"/>',
    'Naramon':   '<path d="M1 4.5H11V7.5H1Z"/>',
    'Vazarin':   '<path d="M3 1C9 3 9 9 3 11L3 1Z"/>',
    'Zenurik':   '<path d="M1 2.5H11V4.5H1ZM1 7.5H11V9.5H1Z"/>',
    'Unairu':    '<path d="M6 1L11 11H1Z"/>',
    'Penjaga':   '<path d="M6 1L10 5L6 9M6 5H2"/>',
    'Umbra':     '<path d="M6 1L10 6L6 11L2 6ZM6 4L8 6L6 8"/>',
    'Universal': '<circle cx="6" cy="6" r="4"/>',
  };
  const p = paths[polarity];
  if (!p) return '';
  return `<span class="mod-polarity"><svg class="polarity-icon" viewBox="0 0 12 12" width="14" height="14" fill="currentColor" stroke="none">${p}</svg></span>`;
}

function initModGrid() {
  modSlots = ['','','','','','','',''];
  renderModCards();
  initSortable();
  updateOptimalBtn();
}

function renderModCards() {
  const grid = document.getElementById('mod-grid');
  grid.innerHTML = '';
  modSlots.forEach((modName, i) => {
    const card = document.createElement('div');
    card.className = 'mod-card' + (modName ? '' : ' empty');
    card.dataset.slot = i;
    if (modName) {
      const mod = allMods.find(m => m.name === modName);
      const rarity = mod ? (mod.rarity || '').toLowerCase() : '';
      if (rarity) card.classList.add('rarity-' + rarity);
      const elemTag = mod && mod.primary_element ? mod.primary_element : '';
      const polIcon = mod ? polaritySVG(mod.polarity) : '';
      card.innerHTML = `
        <button class="mod-clear" onclick="event.stopPropagation();clearModSlot(${i})" title="Remove mod">&times;</button>
        ${polIcon}
        <div class="mod-name">${esc(modName)}</div>
        ${elemTag ? `<div class="mod-element">${esc(elemTag)}</div>` : ''}
        <div class="slot-num">${i+1}</div>`;
      card.onclick = () => openModPicker(i);
    } else {
      card.innerHTML = `
        <div class="add-icon">+</div>
        <div class="add-label">Add Mod</div>
        <div class="slot-num">${i+1}</div>`;
      card.onclick = () => openModPicker(i);
    }
    grid.appendChild(card);
  });
  updateElementBadges();
}

function initSortable() {
  const grid = document.getElementById('mod-grid');
  if (_sortableInstance) _sortableInstance.destroy();
  _sortableInstance = new Sortable(grid, {
    animation: 200,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd(evt) {
      const item = modSlots.splice(evt.oldIndex, 1)[0];
      modSlots.splice(evt.newIndex, 0, item);
      renderModCards();
      initSortable();
      updateModdedStats();
    }
  });
}

function clearModSlot(i) {
  modSlots[i] = '';
  renderModCards();
  initSortable();
  updateModdedStats();
  updateOptimalBtn();
}

function getSelectedMods() {
  return modSlots.filter(Boolean);
}

function updateOptimalBtn() {
  const btn = document.getElementById('optimal-btn');
  const weapon = getCurrentWeapon();
  const enemy = document.getElementById('enemy-select').value;
  btn.disabled = !(weapon && enemy && getSelectedMods().length > 1);
}

// ---------------------------------------------------------------------------
// Mod Picker
// ---------------------------------------------------------------------------
function openModPicker(slotIndex) {
  _pickerSlot = slotIndex;
  document.getElementById('picker-slot-num').textContent = slotIndex + 1;
  const overlay = document.getElementById('mod-picker-overlay');
  overlay.classList.add('active');
  const search = document.getElementById('mod-picker-search');
  search.value = '';
  search.focus();
  renderPickerList('');
}

function closeModPicker() {
  document.getElementById('mod-picker-overlay').classList.remove('active');
  _pickerSlot = -1;
}

function renderPickerList(query) {
  const weapon = getCurrentWeapon();
  const types = getCompatibleModTypes(weapon);
  const q = query.toLowerCase();
  const filtered = allMods
    .filter(m => weapon ? types.has(m.type) : true)
    .filter(m => !q || m.name.toLowerCase().includes(q));

  const list = document.getElementById('mod-picker-list');
  const RARITY_COLORS = { common: '#9e9e78', uncommon: '#6a8f47', rare: '#5a7cc4', legendary: '#c49a1f' };
  list.innerHTML = filtered.slice(0, 100).map(m => {
    const rc = RARITY_COLORS[(m.rarity || '').toLowerCase()] || '#888';
    const elem = m.primary_element || '';
    return `<div class="mod-picker-item" data-mod="${esc(m.name)}" onclick="selectPickerMod(this)">
      <span class="mod-rarity-dot" style="background:${rc}"></span>
      ${esc(m.name)}
      ${elem ? `<span class="mod-element-tag">${esc(elem)}</span>` : ''}
    </div>`;
  }).join('');
}

function selectPickerMod(el) {
  if (_pickerSlot < 0) return;
  modSlots[_pickerSlot] = el.dataset.mod;
  closeModPicker();
  renderModCards();
  initSortable();
  updateModdedStats();
  updateOptimalBtn();
}

// Close picker on outside click
document.addEventListener('click', e => {
  const overlay = document.getElementById('mod-picker-overlay');
  if (overlay && overlay.classList.contains('active') && e.target === overlay) {
    closeModPicker();
  }
});

// Picker search
document.addEventListener('DOMContentLoaded', () => {
  const search = document.getElementById('mod-picker-search');
  if (search) search.addEventListener('input', function() { renderPickerList(this.value); });
});

// ---------------------------------------------------------------------------
// Element Combination Badges
// ---------------------------------------------------------------------------
const ELEM_COMBOS = {
  'heat+cold': 'Blast', 'cold+heat': 'Blast',
  'electricity+toxin': 'Corrosive', 'toxin+electricity': 'Corrosive',
  'heat+toxin': 'Gas', 'toxin+heat': 'Gas',
  'cold+electricity': 'Magnetic', 'electricity+cold': 'Magnetic',
  'heat+electricity': 'Radiation', 'electricity+heat': 'Radiation',
  'cold+toxin': 'Viral', 'toxin+cold': 'Viral',
};
const PRIMARY_ELEMENTS = new Set(['heat', 'cold', 'electricity', 'toxin']);

function updateElementBadges() {
  const container = document.getElementById('element-badges');
  if (!container) return;
  // Gather elemental mods in slot order, tracking slot index
  const elemQueue = [];
  modSlots.forEach((name, slotIdx) => {
    if (!name) return;
    const mod = allMods.find(m => m.name === name);
    if (mod && mod.primary_element && PRIMARY_ELEMENTS.has(mod.primary_element.toLowerCase())) {
      elemQueue.push({ element: mod.primary_element.toLowerCase(), slotIdx });
    }
  });

  // Append weapon's innate primary elements at slot 8 (after all 8 mod slots)
  const weaponData = getCurrentWeapon();
  if (weaponData) {
    const atk = getSelectedAttackData(weaponData);
    const bd = ((atk || weaponData).base_damage) || {};
    Object.keys(bd).forEach(k => {
      if (PRIMARY_ELEMENTS.has(k) && bd[k] > 0) {
        elemQueue.push({ element: k, slotIdx: 8 });
      }
    });
  }

  // Combine in order (same as combiner.py logic)
  const badges = [];
  const used = new Set();
  for (let i = 0; i < elemQueue.length; i++) {
    if (used.has(i)) continue;
    let combined = false;
    for (let j = i + 1; j < elemQueue.length; j++) {
      if (used.has(j)) continue;
      const key = elemQueue[i].element + '+' + elemQueue[j].element;
      if (ELEM_COMBOS[key]) {
        badges.push({ a: elemQueue[i].element, b: elemQueue[j].element, result: ELEM_COMBOS[key], slotA: elemQueue[i].slotIdx, slotB: elemQueue[j].slotIdx });
        used.add(i);
        used.add(j);
        combined = true;
        break;
      }
    }
    if (!combined) {
      badges.push({ a: elemQueue[i].element, b: null, result: elemQueue[i].element, slotA: elemQueue[i].slotIdx, slotB: -1 });
      used.add(i);
    }
  }

  container.innerHTML = badges.filter(b => b.b).map(b => {
    const ca = ELEM_COLORS[b.a] || '#888';
    const cb = ELEM_COLORS[b.b] || '#888';
    const cr = ELEM_COLORS[b.result.toLowerCase()] || 'var(--accent)';
    const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
    return `<div class="element-badge">
      <span class="elem-dot" style="background:${ca}"></span>${cap(b.a)}
      <span class="arrow">+</span>
      <span class="elem-dot" style="background:${cb}"></span>${cap(b.b)}
      <span class="arrow">=</span>
      <span class="elem-dot" style="background:${cr}"></span>${cap(b.result)}
    </div>`;
  }).join('');

  drawElementArcs(badges.filter(b => b.b !== null));
}

function drawElementArcs(combos) {
  const svg = document.getElementById('element-arcs');
  if (!svg) return;
  svg.innerHTML = '';
  if (!combos || !combos.length) { svg.style.height = '0'; return; }

  const grid = document.getElementById('mod-grid');
  const wrap = document.getElementById('mod-grid-wrapper');
  const wrapRect = wrap.getBoundingClientRect();
  const arcSpace = 30 + combos.length * 28;
  svg.setAttribute('width', wrap.offsetWidth);
  svg.setAttribute('height', grid.offsetHeight + arcSpace);

  combos.forEach((combo, idx) => {
    if (combo.slotA < 0 || combo.slotB < 0) return;
    const cardA = grid.children[combo.slotA];
    const cardB = grid.children[combo.slotB];
    if (!cardA || !cardB) return;

    const rectA = cardA.getBoundingClientRect();
    const rectB = cardB.getBoundingClientRect();
    const ax = rectA.left - wrapRect.left + rectA.width / 2;
    const ay = rectA.top - wrapRect.top + rectA.height;
    const bx = rectB.left - wrapRect.left + rectB.width / 2;
    const by = rectB.top - wrapRect.top + rectB.height;
    const mx = (ax + bx) / 2;
    const my = Math.max(ay, by) + 18 + idx * 28;
    const color = ELEM_COLORS[combo.result.toLowerCase()] || 'var(--accent)';

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${ax} ${ay} Q${ax} ${my} ${mx} ${my} M${bx} ${by} Q${bx} ${my} ${mx} ${my}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('stroke-opacity', '0.5');
    svg.appendChild(path);

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${mx},${my})`);
    const label = combo.result;
    const tw = label.length * 7 + 14;
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', -tw / 2); bg.setAttribute('y', -9);
    bg.setAttribute('width', tw); bg.setAttribute('height', 18);
    bg.setAttribute('rx', 9);
    bg.setAttribute('fill', 'rgba(15,15,25,0.85)');
    bg.setAttribute('stroke', color); bg.setAttribute('stroke-width', '1');
    g.appendChild(bg);
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('text-anchor', 'middle'); text.setAttribute('dy', '4');
    text.setAttribute('fill', color); text.setAttribute('font-size', '11');
    text.setAttribute('font-weight', '600'); text.setAttribute('font-family', 'inherit');
    text.textContent = label;
    g.appendChild(text);
    svg.appendChild(g);
  });
}

window.addEventListener('resize', () => updateElementBadges());

// ---------------------------------------------------------------------------
// Optimal Mod Order
// ---------------------------------------------------------------------------
async function runOptimalOrder() {
  const weapon = document.getElementById('weapon-select').value;
  const enemy = document.getElementById('enemy-select').value;
  const mods = getSelectedMods();
  if (!weapon || !enemy || mods.length < 2) return;

  const btn = document.getElementById('optimal-btn');
  btn.disabled = true;
  btn.textContent = 'Optimizing…';

  try {
    const critMode = document.getElementById('crit-mode').value;
    const headshot = document.getElementById('headshot-cb').checked;
    const viralStacks = parseInt(document.getElementById('viral-stacks').value, 10) || 0;
    const corrosiveStacks = parseInt(document.getElementById('corrosive-stacks').value, 10) || 0;

    const resp = await fetch('/api/optimal-order', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({weapon, mods, enemy, crit_mode: critMode, headshot, viral_stacks: viralStacks, corrosive_stacks: corrosiveStacks, attack: selectedAttack}),
    });
    if (!resp.ok) throw new Error('Failed');
    const data = await resp.json();
    if (data.optimal_mods) {
      // Rebuild modSlots preserving empty slots
      const newSlots = ['','','','','','','',''];
      data.optimal_mods.forEach((name, i) => { newSlots[i] = name; });
      modSlots = newSlots;
      renderModCards();
      initSortable();
      updateModdedStats();
    }
  } catch(e) {
    // silent
  } finally {
    btn.disabled = false;
    btn.textContent = 'Optimal Mod Order';
    updateOptimalBtn();
  }
}

// Returns the set of mod types compatible with the given weapon
function getCompatibleModTypes(weapon) {
  if (!weapon) return new Set();
  const slot = weapon.slot || '';
  const cls  = weapon.class || '';
  const types = new Set([weapon.name]); // always include weapon-specific mods

  if (slot === 'Primary') {
    types.add('Primary');
    if (cls === 'Shotgun') {
      types.add('Shotgun');
    } else if (cls === 'Sniper Rifle') {
      types.add('Rifle');
      types.add('Sniper');
    } else if (cls === 'Bow' || cls === 'Crossbow') {
      types.add('Rifle');
      types.add('Bow');
    } else {
      types.add('Rifle');
      types.add('Assault Rifle');
    }
  } else if (slot === 'Secondary') {
    types.add('Pistol');
  } else if (slot === 'Melee') {
    types.add('Melee');
    const classMap = {
      'Dagger':           'Daggers',
      'Dual Daggers':     'Dual Daggers',
      'Sword':            'Swords',
      'Dual Swords':      'Dual Swords',
      'Nikana':           'Nikanas',
      'Dual Nikanas':     'Dual Nikanas',
      'Two-Handed Nikana':'Two-Handed Nikana',
      'Heavy Blade':      'Heavy Blade',
      'Hammer':           'Hammers',
      'Polearm':          'Polearms',
      'Staff':            'Staves',
      'Whip':             'Whips',
      'Blade and Whip':   'Blade And Whip',
      'Glaive':           'Glaives',
      'Claws':            'Claws',
      'Tonfa':            'Tonfas',
      'Scythe':           'Scythes',
      'Heavy Scythe':     'Heavy Scythe',
      'Rapier':           'Rapiers',
      'Sword and Shield': 'Sword And Shield',
      'Machete':          'Machetes',
      'Sparring':         'Sparring',
      'Fist':             'Fists',
      'Nunchaku':         'Nunchaku',
      'Warfan':           'Warfans',
      'Gunblade':         'Gunblade',
    };
    if (classMap[cls]) types.add(classMap[cls]);
  }
  return types;
}

// (buildModOptions and refreshModDropdowns removed — replaced by card grid + picker)

function onWeaponChange() {
  selectedAttack = null;
  const weapon = getCurrentWeapon();
  updateAttackSelector(weapon);
  showWeaponStats(weapon);
  updateModdedStats();
  updateOptimalBtn();
  updateElementBadges();
}

function updateAttackSelector(weapon) {
  if (!weapon || !weapon.attacks || weapon.attacks.length <= 1) {
    selectedAttack = null;
  } else {
    selectedAttack = selectedAttack || weapon.attacks[0].name;
  }
}

function selectAttack(name) {
  selectedAttack = name;
  showWeaponStats(getCurrentWeapon());
  updateModdedStats();
  updateElementBadges();
}

function getSelectedAttackData(weapon) {
  if (!weapon || !weapon.attacks || !weapon.attacks.length) return null;
  if (selectedAttack) {
    const found = weapon.attacks.find(a => a.name === selectedAttack);
    if (found) return found;
  }
  return weapon.attacks[0];
}

// ---------------------------------------------------------------------------
// Weapon stats panel — base stats
// ---------------------------------------------------------------------------
function showWeaponStats(weapon) {
  const panel = document.getElementById('weapon-stats-panel');
  if (!weapon) { panel.style.display = 'none'; return; }

  const atk = getSelectedAttackData(weapon);
  const pct = v => (v * 100).toFixed(1) + '%';
  const fmt = (v, suffix) => v != null ? v + (suffix || '') : '—';
  const sub = [weapon.slot, weapon.class, weapon.trigger].filter(Boolean).join(' · ');

  const imgHtml = weapon.image
    ? `<div class="weapon-stats-img-row" id="weapon-img-row">
        <img src="/static/images/weapons/${esc(weapon.image)}" alt=""
             onerror="document.getElementById('weapon-img-row').style.display='none'">
        <div>
          <div class="weapon-stats-name">${esc(weapon.name)}</div>
          <div class="weapon-stats-sub">${esc(sub)}</div>
        </div>
       </div>`
    : `<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
        <div class="weapon-stats-name">${esc(weapon.name)}</div>
        <div class="weapon-stats-sub">${esc(sub)}</div>
       </div>`;

  const hasMultiAttack = weapon.attacks && weapon.attacks.length > 1;
  const attackTabsHtml = hasMultiAttack
    ? `<div class="attack-tabs">${weapon.attacks.map(a =>
        `<button class="attack-tab${a.name === selectedAttack ? ' active' : ''}"
          onclick="selectAttack(this.dataset.name)" data-name="${esc(a.name)}">${esc(a.name)}</button>`
      ).join('')}</div>`
    : '';

  document.getElementById('weapon-stats-content').innerHTML = `
    ${imgHtml}
    ${attackTabsHtml}
    <div class="stat-rows">
      <div class="stat-row">
        <div class="stat-block">
          <div class="stat-label" data-tooltip="crit-chance">Crit Chance</div>
          <div class="stat-value crit" id="sv-cc">${pct((atk ? atk.crit_chance : weapon.crit_chance) || 0)}</div>
          <div class="stat-modded" id="sm-cc" style="display:none"></div>
        </div>
        <div class="stat-block">
          <div class="stat-label" data-tooltip="crit-mult">Crit Mult</div>
          <div class="stat-value crit" id="sv-cm">${fmt((atk ? atk.crit_multiplier : weapon.crit_multiplier), 'x')}</div>
          <div class="stat-modded" id="sm-cm" style="display:none"></div>
        </div>
        <div class="stat-block">
          <div class="stat-label" data-tooltip="status">Status</div>
          <div class="stat-value status" id="sv-sc">${pct((atk ? atk.status_chance : weapon.status_chance) || 0)}</div>
          <div class="stat-modded" id="sm-sc" style="display:none"></div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-block">
          <div class="stat-label" data-tooltip="fire-rate">Fire Rate</div>
          <div class="stat-value">${fmt(atk ? atk.fire_rate : weapon.fire_rate)}</div>
          <div class="stat-modded" id="sm-fr" style="display:none"></div>
        </div>
        <div class="stat-block">
          <div class="stat-label" data-tooltip="magazine">Magazine</div>
          <div class="stat-value">${fmt(weapon.magazine)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label" data-tooltip="reload">Reload</div>
          <div class="stat-value">${fmt(weapon.reload, 's')}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label" data-tooltip="multishot">Multishot</div>
          <div class="stat-value" id="sv-ms">1.0</div>
          <div class="stat-modded" id="sm-ms" style="display:none"></div>
        </div>
      </div>
    </div>
    <div id="damage-table-wrap"></div>
  `;

  renderDamageTable(atk ? atk.base_damage : weapon.base_damage, null);
  panel.style.display = 'block';
  initTooltips();
}

function renderDamageTable(baseDmg, moddedData) {
  const wrap = document.getElementById('damage-table-wrap');
  if (!wrap) return;

  const hasModded = moddedData && Object.keys(moddedData.modded_damage || {}).length > 0;

  // Merge all damage types: base IPS + modded elementals
  const allTypes = new Set([
    ...Object.keys(baseDmg),
    ...(hasModded ? Object.keys(moddedData.modded_damage) : []),
  ]);

  const baseTotal = Object.values(baseDmg).reduce((s, v) => s + v, 0);
  const moddedTotal = hasModded ? moddedData.modded_total : null;

  const headerModded = hasModded
    ? `<th style="text-align:right" class="col-modded">Modded</th>`
    : '';

  const rows = Array.from(allTypes).map(type => {
    const baseVal = baseDmg[type];
    const modVal  = hasModded ? moddedData.modded_damage[type] : null;
    const color   = ELEM_COLORS[type] || 'var(--text)';
    const dot     = `<span class="elem-dot" style="background:${color}"></span>`;
    const label   = type.charAt(0).toUpperCase() + type.slice(1);
    const ttAttr  = TOOLTIPS[type] ? ` data-tooltip="${type}"` : '';

    const baseCell = baseVal != null
      ? `<td class="col-base" style="text-align:right">${baseVal.toFixed(1)}</td>`
      : `<td class="col-base" style="text-align:right;color:var(--border)">—</td>`;

    const moddedCell = hasModded
      ? `<td class="col-modded" style="text-align:right">${modVal != null ? modVal.toFixed(1) : '—'}</td>`
      : '';

    return `<tr>
      <td${ttAttr}>${dot}${label}</td>
      ${baseCell}
      ${moddedCell}
    </tr>`;
  }).join('');

  const moddedTotalCell = hasModded
    ? `<td style="text-align:right" class="col-modded">${moddedTotal.toFixed(1)}</td>`
    : '';

  wrap.innerHTML = `
    <table class="breakdown-table">
      <thead>
        <tr>
          <th>Damage Type</th>
          <th style="text-align:right">Base</th>
          ${headerModded}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot class="total-row">
        <tr>
          <td>Total</td>
          <td style="text-align:right">${baseTotal.toFixed(1)}</td>
          ${moddedTotalCell}
        </tr>
      </tfoot>
    </table>
  `;
  initTooltips();
}

// ---------------------------------------------------------------------------
// Live modded stats update
// ---------------------------------------------------------------------------
let _modUpdateTimer = null;

function updateModdedStats() {
  clearTimeout(_modUpdateTimer);
  _modUpdateTimer = setTimeout(_doUpdateModdedStats, 120);
}

async function _doUpdateModdedStats() {
  const weapon = getCurrentWeapon();
  if (!weapon) return;

  const mods = getSelectedMods();

  try {
    const resp = await fetch('/api/modded-weapon', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ weapon: weapon.name, mods, attack: selectedAttack }),
    });
    if (!resp.ok) return;
    const data = await resp.json();

    // Update damage table
    const atkData = getSelectedAttackData(weapon);
    renderDamageTable(atkData ? atkData.base_damage : weapon.base_damage, mods.length > 0 ? data : null);

    // Update crit/status stat blocks
    const hasMods = mods.length > 0;
    const pct = v => (v * 100).toFixed(1) + '%';

    const smCC = document.getElementById('sm-cc');
    const smCM = document.getElementById('sm-cm');
    const smSC = document.getElementById('sm-sc');

    if (smCC) {
      if (hasMods && Math.abs(data.modded_cc - data.base_cc) > 0.0001) {
        smCC.textContent = pct(data.modded_cc);
        smCC.style.display = 'block';
      } else {
        smCC.style.display = 'none';
      }
    }
    if (smCM) {
      if (hasMods && Math.abs(data.modded_cm - data.base_cm) > 0.0001) {
        smCM.textContent = data.modded_cm.toFixed(2) + 'x';
        smCM.style.display = 'block';
      } else {
        smCM.style.display = 'none';
      }
    }
    if (smSC) {
      if (hasMods && Math.abs(data.modded_sc - data.base_sc) > 0.0001) {
        smSC.textContent = pct(data.modded_sc);
        smSC.style.display = 'block';
      } else {
        smSC.style.display = 'none';
      }
    }

    const smMS = document.getElementById('sm-ms');
    if (smMS) {
      const ms = data.modded_multishot || 1.0;
      _currentMultishot = ms;
      if (hasMods && ms > 1.0001) {
        smMS.textContent = '→ ' + ms.toFixed(2) + 'x';
        smMS.style.display = 'block';
      } else {
        smMS.style.display = 'none';
        if (!hasMods) _currentMultishot = 1.0;
      }
    }

    const smFR = document.getElementById('sm-fr');
    if (smFR) {
      const baseFr  = data.base_fr  || 0;
      const moddedFr = data.modded_fr || 0;
      if (hasMods && baseFr > 0 && Math.abs(moddedFr - baseFr) > 0.001) {
        smFR.textContent = '→ ' + moddedFr.toFixed(2) + '/s';
        smFR.style.display = 'block';
      } else {
        smFR.style.display = 'none';
      }
    }
  } catch(e) {
    // silent — non-critical
  }
}

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function populateSelect(id, names) {
  const sel = document.getElementById(id);
  sel.innerHTML = names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
}

function setSelectValue(id, value) {
  const sel = document.getElementById(id);
  for (const opt of sel.options) {
    if (opt.value === value) { sel.value = value; return; }
  }
}

function setSelectByText(sel, text) {
  for (const opt of sel.options) {
    if (opt.value === text) { sel.value = text; return; }
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtNum(n) {
  return n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

// Search/filter selects
document.addEventListener('DOMContentLoaded', () => {
  setupSearch('weapon-search', 'weapon-select', () => allWeapons.map(w => w.name), onWeaponChange);
  setupSearch('enemy-search', 'enemy-select', () => allEnemies.map(e => e.name), () => showEnemyStats(getCurrentEnemy()));
  loadData();
});

function setupSearch(inputId, selectId, getNames, onChange) {
  document.getElementById(inputId).addEventListener('input', function() {
    const q = this.value.toLowerCase();
    const names = getNames().filter(n => n.toLowerCase().includes(q));
    populateSelect(selectId, names);
    if (onChange) onChange();
  });
}

// ---------------------------------------------------------------------------
// Calculate
// ---------------------------------------------------------------------------
async function runCalculation() {
  const weapon = document.getElementById('weapon-select').value;
  const enemy  = document.getElementById('enemy-select').value;
  const mods   = getSelectedMods();
  const critMode    = document.getElementById('crit-mode').value;
  const headshot    = document.getElementById('headshot-cb').checked;
  const viralStacks     = parseInt(document.getElementById('viral-stacks').value, 10) || 0;
  const corrosiveStacks = parseInt(document.getElementById('corrosive-stacks').value, 10) || 0;

  if (!weapon || !enemy) {
    showError('Please select a weapon and enemy.');
    return;
  }

  const btn = document.getElementById('calc-btn');
  btn.disabled = true;
  btn.textContent = 'Calculating…';

  try {
    const resp = await fetch('/api/calculate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({weapon, mods, enemy, crit_mode: critMode, headshot, viral_stacks: viralStacks, corrosive_stacks: corrosiveStacks, attack: selectedAttack}),
    });
    const data = await resp.json();
    if (!resp.ok) {
      showError(data.detail || 'Calculation failed.');
    } else {
      showResults(data);
    }
  } catch(e) {
    showError('Network error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Calculate';
  }
}

function showError(msg) {
  document.getElementById('no-results').style.display = 'none';
  document.getElementById('results-content').style.display = 'none';
  let errDiv = document.getElementById('error-msg');
  if (!errDiv) {
    errDiv = document.createElement('div');
    errDiv.id = 'error-msg';
    errDiv.className = 'error-msg';
    document.getElementById('results-panel').appendChild(errDiv);
  }
  errDiv.textContent = msg;
  errDiv.style.display = 'block';
}

function showResults(data) {
  const errDiv = document.getElementById('error-msg');
  if (errDiv) errDiv.style.display = 'none';
  document.getElementById('no-results').style.display = 'none';

  const breakdown = data.breakdown;
  const entries = Object.entries(breakdown).sort((a,b) => b[1] - a[1]);
  const maxVal = entries.length ? entries[0][1] : 1;

  const meta = [
    `Weapon: ${data.weapon}`,
    `Mods: ${data.mods.length ? data.mods.join(', ') : '(none)'}`,
    `Enemy: ${data.enemy}`,
    `Crit: ${data.crit_mode} — ×${data.crit_multiplier.toFixed(3)}${data.headshot ? ' (headshot)' : ''}`,
    data.viral_stacks > 0 ? `Viral: ${data.viral_stacks} stacks (×${[1.75,2,2.25,2.5,2.75,3,3.25,3.5,3.75,4.25][data.viral_stacks-1]})` : null,
    data.corrosive_stacks > 0 ? `Corrosive: ${data.corrosive_stacks} stacks (−${Math.min(80, 20 + 6*data.corrosive_stacks)}% armor)` : null,
  ].filter(Boolean).join(' &nbsp;|&nbsp; ');

  const rows = entries.map(([type, val]) => {
    const pct = maxVal > 0 ? (val / maxVal * 100).toFixed(1) : 0;
    const key  = type.toLowerCase();
    const color = ELEM_COLORS[key] || 'var(--accent)';
    const dot = `<span class="elem-dot" style="background:${color}"></span>`;
    const ttAttr = TOOLTIPS[key] ? ` data-tooltip="${key}"` : '';
    return `<tr>
      <td${ttAttr}>${dot}${type}</td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div></td>
      <td>${val.toFixed(2)}</td>
    </tr>`;
  }).join('');

  const ms = _currentMultishot;
  const msNote = ms > 1.0001
    ? `<span class="ms-note">Per-projectile damage. ×${ms.toFixed(2)} multishot → <strong>${(data.total * ms).toFixed(2)}</strong> effective per trigger</span>`
    : '';

  // Status procs section
  const PROC_LABELS = { slash: 'Slash (Bleed)', heat: 'Heat (Burn)', gas: 'Gas (Cloud)', toxin: 'Toxin (Poison)', electricity: 'Electricity (Arc)' };
  const PROC_COLORS = { slash: ELEM_COLORS.slash, heat: ELEM_COLORS.heat, gas: ELEM_COLORS.gas, toxin: ELEM_COLORS.toxin, electricity: ELEM_COLORS.electricity };
  let procsHtml = '';
  if (data.procs) {
    const activeProcs = Object.entries(data.procs).filter(([, p]) => p.active);
    if (activeProcs.length) {
      const procRows = activeProcs.map(([key, p]) => {
        const color = PROC_COLORS[key] || 'var(--accent)';
        const dot = `<span class="elem-dot" style="background:${color}"></span>`;
        return `<tr>
          <td>${dot}${PROC_LABELS[key] || key}</td>
          <td>${p.damage_per_tick.toFixed(2)} × ${p.ticks} ticks</td>
          <td>${p.total_damage.toFixed(2)}</td>
        </tr>`;
      }).join('');
      procsHtml = `
        <h4 style="margin:12px 0 6px;color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em">Status Procs (if triggered)</h4>
        <table class="breakdown-table">
          <thead><tr><th>Proc</th><th>Per Tick</th><th>Total (6 ticks)</th></tr></thead>
          <tbody>${procRows}</tbody>
        </table>`;
    }
  }

  // DPS section
  let dpsHtml = '';
  if (data.fire_rate != null) {
    const fr  = data.fire_rate;
    const mag = data.magazine;
    const rel = data.reload;
    const ms  = data.modded_ms || 1.0;
    const sc  = data.modded_sc || 0.0;

    const burstDps     = data.total * ms * fr;
    const sustainedDps = (rel > 0 && mag > 1)
      ? data.total * ms * mag / (mag / fr + rel)
      : null;

    const procsPerSec = sc * ms * fr;
    let procDpsRows = '';
    let totalProcDps = 0;
    if (data.procs) {
      for (const [key, p] of Object.entries(data.procs)) {
        if (!p.active || procsPerSec <= 0) continue;
        const pdps = p.damage_per_tick * procsPerSec;
        totalProcDps += pdps;
        const label = PROC_LABELS[key] || key;
        const color = ELEM_COLORS[key] || 'var(--accent)';
        const dot   = `<span class="elem-dot" style="background:${color}"></span>`;
        procDpsRows += `<tr><td>${dot}${label} DPS</td><td></td><td>${fmtNum(pdps)}</td></tr>`;
      }
    }

    const scPct = (sc * 100).toFixed(1);
    const footnote = procsPerSec > 0
      ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">Proc DPS is steady-state average @ ${scPct}% status chance</div>`
      : '';

    dpsHtml = `
      <h4 style="margin:12px 0 6px;color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em">DPS</h4>
      <table class="breakdown-table">
        <thead><tr><th>Metric</th><th></th><th>DPS</th></tr></thead>
        <tbody>
          <tr><td>Burst DPS</td><td style="font-size:0.75rem;color:var(--text-muted)">×${ms.toFixed(2)} multishot × ${fr}/s</td><td>${fmtNum(burstDps)}</td></tr>
          ${sustainedDps != null ? `<tr><td>Sustained DPS</td><td style="font-size:0.75rem;color:var(--text-muted)">${rel}s reload / ${mag} mag</td><td>${fmtNum(sustainedDps)}</td></tr>` : ''}
          ${procDpsRows}
        </tbody>
        ${totalProcDps > 0 ? `<tfoot class="total-row"><tr><td colspan="2">TOTAL w/ procs</td><td>${fmtNum(burstDps + totalProcDps)}</td></tr></tfoot>` : ''}
      </table>
      ${footnote}`;
  }

  document.getElementById('results-content').innerHTML = `
    <div class="result-header">
      <h3>${esc(data.weapon)} vs ${esc(data.enemy)}</h3>
      <div class="result-total">${data.total.toFixed(2)} <span>total damage</span></div>
    </div>
    <div class="result-meta">${meta}</div>
    <table class="breakdown-table">
      <thead><tr><th>Type</th><th>Bar</th><th>Damage</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot class="total-row">
        <tr><td colspan="2">TOTAL</td><td>${data.total.toFixed(2)}</td></tr>
      </tfoot>
    </table>
    ${msNote}
    ${procsHtml}
    ${dpsHtml}
  `;
  document.getElementById('results-content').style.display = 'block';
  initTooltips();
}
