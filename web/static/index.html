<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warframe Damage Calculator</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css">
</head>
<body>
<header>
  <span class="nav-brand">Void Codex</span>
  <nav style="display:flex;align-items:center;gap:6px;margin-left:auto">
    <a href="/" style="color:var(--accent2);text-decoration:none;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:6px;border:1px solid var(--border-highlight)">Damage Calculator</a>
    <a href="/live" style="color:var(--text-dim);text-decoration:none;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:6px;border:1px solid transparent;transition:color .15s" onmouseover="this.style.color='var(--accent2)'" onmouseout="this.style.color='var(--text-dim)'">Live Data</a>
  </nav>
</header>

<div class="container">
  <div>
    <!-- Weapon -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Weapon</h2>
      <div class="combobox-wrap" id="weapon-combobox">
        <div class="search-wrap">
          <input type="text" id="weapon-search" class="search-input" placeholder="Search weapon…" autocomplete="off">
          <button class="search-clear" onclick="clearCombobox('weapon')" title="Clear">×</button>
        </div>
        <div class="combobox-dropdown" id="weapon-dropdown"></div>
      </div>
      <div id="bonus-element-div" style="display:none; margin-top:10px">
        <label style="font-size:.85rem;color:#aaa">Bonus Element (Kuva / Tenet)</label>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <select id="bonus-element-type" onchange="updateModdedStats();updateElementBadges()">
            <option value="heat">Heat</option>
            <option value="cold">Cold</option>
            <option value="electricity">Electricity</option>
            <option value="toxin">Toxin</option>
          </select>
          <input type="number" id="bonus-element-pct" min="25" max="60" value="25" style="width:52px"
                 oninput="if(+this.value>60)this.value=60;if(+this.value<25)this.value=25;updateModdedStats();updateElementBadges()">
          <span style="color:#aaa">%</span>
        </div>
      </div>
    </div>

    <!-- Mods — 2×4 card grid -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Mods (in slot order)<span class="mod-panel-actions"><button class="btn-alchemy-mixer" onclick="openAlchemyMixer()" title="Alchemy Mixer"><svg class="riven-alchemy-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <polygon points="4,1 20,1 23,4 23,20 20,23 4,23 1,20 1,4" fill="#1a1208" stroke="#D4A843" stroke-width="0.8"/>
  <circle cx="12" cy="12" r="8" fill="none" stroke="#8B6914" stroke-width="0.5"/>
  <circle cx="12" cy="3.5" r="1.2" fill="#D4A843" opacity="0.9"/>
  <circle cx="12" cy="20.5" r="1.2" fill="#D4A843" opacity="0.9"/>
  <circle cx="3.5" cy="12" r="1.2" fill="#D4A843" opacity="0.9"/>
  <circle cx="20.5" cy="12" r="1.2" fill="#D4A843" opacity="0.9"/>
  <path d="M12,5.5 L18,16.5 L6,16.5 Z" fill="none" stroke="#D4A843" stroke-width="1.1" stroke-linejoin="round"/>
  <line x1="7.5" y1="13.5" x2="16.5" y2="13.5" stroke="#D4A843" stroke-width="1.1"/>
  <rect x="9.5" y="1" width="5" height="1" fill="#D4A843" opacity="0.6"/>
  <rect x="9.5" y="22" width="5" height="1" fill="#D4A843" opacity="0.6"/>
</svg></button><button class="btn-add-riven" onclick="openRivenBuilder()" title="Add Riven mod">+</button></span></h2>
      <div id="mod-grid-wrapper">
        <div id="special-slots" class="special-slots-row"></div>
        <div id="mod-grid" class="mod-grid"></div>
        <svg id="element-arcs"></svg>
      </div>
      <div id="element-badges" class="element-badges"></div>

    </div>

    <!-- Riven Builder Modal -->
    <div class="mod-picker-overlay" id="riven-picker-overlay">
      <div class="riven-modal">
        <button class="riven-modal-close" onclick="closeRivenBuilder()">×</button>
<div class="riven-modal-right">
          <h2 class="riven-modal-title">Create riven</h2>
          <div id="riven-rows"></div>
          <div class="riven-btn-row">
            <button class="btn-riven-apply" onclick="applyRiven()">Add</button>
            <button class="btn-riven-reset" onclick="clearRiven();closeRivenBuilder()">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Alchemy Mixer Modal -->
    <div class="mod-picker-overlay" id="alchemy-mixer-overlay">
      <div class="alchemy-modal">
        <button class="riven-modal-close" onclick="closeAlchemyMixer()">×</button>
        <h2 class="alchemy-modal-title">Alchemy Mixer</h2>
        <p class="alchemy-hint">Select two primary elements to combine</p>
        <div class="alchemy-element-picker" id="alchemy-picker"></div>
        <div class="alchemy-stage" id="alchemy-stage">
          <div class="alchemy-orb alchemy-orb-left" id="alchemy-orb-left"></div>
          <div class="alchemy-orb alchemy-orb-right" id="alchemy-orb-right"></div>
          <div class="alchemy-result-flash" id="alchemy-flash"></div>
        </div>
        <div class="alchemy-result" id="alchemy-result"></div>
        <div class="alchemy-mods" id="alchemy-mods"></div>
      </div>
    </div>

    <!-- Mod Picker Modal -->
    <div class="mod-picker-overlay" id="mod-picker-overlay">
      <div class="mod-picker">
        <div class="mod-picker-header">
          <h3>Select Mod — Slot <span id="picker-slot-num"></span></h3>
          <div class="search-wrap">
            <input type="text" class="mod-picker-search" id="mod-picker-search" placeholder="Search mods…" autocomplete="off">
            <button class="search-clear" onclick="clearSearch('mod-picker-search')" title="Clear">×</button>
          </div>
        </div>
        <div class="mod-picker-list" id="mod-picker-list"></div>
      </div>
    </div>

    <!-- Enemy -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Enemy</h2>
      <div class="combobox-wrap" id="enemy-combobox">
        <div class="search-wrap">
          <input type="text" id="enemy-search" class="search-input" placeholder="Search enemy…" autocomplete="off">
          <button class="search-clear" onclick="clearCombobox('enemy')" title="Clear">×</button>
        </div>
        <div class="combobox-dropdown" id="enemy-dropdown"></div>
      </div>
      <div class="enemy-level-row">
        <div style="display:flex;flex-direction:column">
          <label for="enemy-level">Level</label>
          <input type="number" id="enemy-level" min="1" max="9999" value="1" style="width:72px">
        </div>
        <button class="toggle-btn" id="steel-path-btn" onclick="toggleSteelPath()">Steel Path</button>
        <button class="toggle-btn" id="eximus-btn" onclick="toggleEximus()">Eximus</button>
      </div>
      <div id="enemy-scaled-stats" class="enemy-scaled-stats"></div>
    </div>

    <!-- Hit Options -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Hit Options</h2>
      <div class="options-row">
        <div>
          <label for="crit-mode">Hit Type</label>
          <select id="crit-mode" style="width:auto">
            <option value="average">Average</option>
            <option value="guaranteed">Guaranteed Crit</option>
            <option value="max">Max Crit</option>
          </select>
        </div>
        <div>
          <label for="body-part-select">Body Part</label>
          <select id="body-part-select"><option value="Body">Body</option></select>
        </div>
        <div>
          <label for="viral-stacks">Viral Stacks</label>
          <input type="number" id="viral-stacks" min="0" max="10" value="0" style="width:48px">
        </div>
        <div>
          <label for="corrosive-stacks">Corrosive Stacks</label>
          <input type="number" id="corrosive-stacks" min="0" max="10" value="0" style="width:48px">
        </div>
        <div id="combo-div" title="Melee combo multiplier tier (1=×1, 2=×2, … 12=×12; Venka Prime allows 13)">
          <label for="combo-counter">Combo</label>
          <input type="number" id="combo-counter" min="1" max="12" value="1" style="width:48px" oninput="if(+this.value>+this.max)this.value=this.max;if(+this.value<1)this.value=1">
        </div>
        <div title="Unique proc types on enemy — used by Condition Overload (+80% per type)">
          <label for="unique-statuses">Active Statuses</label>
          <input type="number" id="unique-statuses" min="0" max="10" value="0" style="width:48px">
        </div>
        <div title="Galvanized mod kill-stacks active (0 = base stats only, max 5)">
          <label for="galv-stacks">Galv. Stacks</label>
          <input type="number" id="galv-stacks" min="0" max="5" value="0" style="width:48px">
        </div>
      </div>
    </div>

    <!-- Warframe Buffs -->
    <div class="panel" style="margin-bottom:16px">
      <h2 style="display:flex;align-items:center;gap:8px">Warframe Buffs
        <button type="button" class="btn-add-buff" onclick="addBuffRow()" title="Add ability buff" style="background:none;border:1px solid #b89d65;color:#b89d65;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:13px">+ Add</button>
      </h2>
      <div id="buff-rows"></div>
    </div>

    <button class="btn-calc" id="calc-btn" onclick="runCalculation()">Calculate</button>
  </div>

  <!-- Right column -->
  <div class="right-col">

    <!-- Weapon Stats -->
    <div class="panel" id="weapon-stats-panel" style="display:none">
      <h2>Weapon Stats</h2>
      <div id="weapon-stats-content"></div>
    </div>

    <!-- Enemy Stats -->
    <div class="panel" id="enemy-stats-panel" style="display:none">
      <h2>Enemy Stats</h2>
      <div id="enemy-stats-content"></div>
    </div>

    <!-- Results -->
    <div class="panel results-panel" id="results-panel">
      <h2>Results</h2>
      <div class="no-results" id="no-results">Select a weapon and enemy, then click Calculate.</div>
      <div id="results-content" style="display:none"></div>
    </div>

  </div>
</div>

<script>
let allWeapons = [];
let allMods = [];
let allEnemies = [];

// Warframe element colours
const ELEM_COLORS = {
  impact:      '#9090b0',
  puncture:    '#d0c080',
  slash:       '#e05050',
  heat:        '#ff7a30',
  cold:        '#60b0e0',
  electricity: '#f0e040',
  toxin:       '#60d030',
  blast:       '#ffd040',
  corrosive:   '#a0e040',
  gas:         '#c0e040',
  magnetic:    '#c060f0',
  radiation:   '#f0a020',
  viral:       '#f060a0',
  true:        '#ffffff',
  void:        '#9060ff',
};

// Damage-type SVG icons (16×16 viewBox, uses currentColor)
const DMG_ICONS = {

  slash:       '<path d="M4 12 L12 4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M6 13 L14 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>',
  heat:        '<path d="M8 1.5 L6 6 L3.5 9 C3 10 3 11.5 4.5 13 C5.5 14 7 14.5 8 14.5 C9 14.5 10.5 14 11.5 13 C13 11.5 13 10 12.5 9 L10 6 L8 1.5Z M5.5 7 L7 4 L8 6.5 L9.5 3.5 L10.5 7" stroke="currentColor" stroke-width="0.8" fill="currentColor" stroke-linejoin="round"/>',
  cold:        '<line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2.8" y1="5" x2="13.2" y2="11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2.8" y1="11" x2="13.2" y2="5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="8" y1="2" x2="6" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="8" y1="2" x2="10" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>',
  electricity: '<polygon points="9,1 5,7.5 7.5,7.5 6,15 12,7 9,7" fill="currentColor"/>',
  toxin:       '<path d="M8 2 C8 2 3 8 3 11 C3 13.2 5.2 15 8 15 C10.8 15 13 13.2 13 11 C13 8 8 2 8 2Z" fill="currentColor"/>',
  blast:       '<circle cx="8" cy="8" r="2" fill="currentColor"/><polygon points="8,0.5 9,5.5 14,5 10,7 14.5,8 10,9 14,11 9,10.5 8,15.5 7,10.5 2,11 6,9 1.5,8 6,7 2,5 7,5.5" fill="currentColor" opacity="0.85"/>',
  corrosive:   '<path d="M5.5 2 C5.5 2 2 7 2 9.5 C2 11.5 3.6 13 5.5 13 C7.4 13 9 11.5 9 9.5 C9 7 5.5 2 5.5 2Z" fill="currentColor"/><path d="M11 6 C11 6 8.5 9.5 8.5 11 C8.5 12.4 9.6 13.5 11 13.5 C12.4 13.5 13.5 12.4 13.5 11 C13.5 9.5 11 6 11 6Z" fill="currentColor" opacity="0.7"/>',
  gas:         '<circle cx="6" cy="9" r="3.5" fill="currentColor" opacity="0.7"/><circle cx="10.5" cy="7.5" r="3" fill="currentColor" opacity="0.55"/><circle cx="8.5" cy="11.5" r="2.5" fill="currentColor" opacity="0.45"/>',
  magnetic:    '<rect x="2" y="2" width="4" height="3.5" rx="0.5" fill="currentColor"/><rect x="10" y="2" width="4" height="3.5" rx="0.5" fill="currentColor"/><path d="M4 5.5 L4 7 C4 10.9 5.8 13 8 13 C10.2 13 12 10.9 12 7 L12 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>',
  radiation:   '<circle cx="8" cy="8" r="1.6" fill="currentColor"/><path d="M9.04 2.09 A6 6 0 0 1 13.64 10.05 L10.63 8.96 A2.8 2.8 0 0 0 8.49 5.24Z" fill="currentColor"/><path d="M12.6 11.86 A6 6 0 0 1 3.4 11.86 L5.86 9.8 A2.8 2.8 0 0 0 10.14 9.8Z" fill="currentColor"/><path d="M2.36 10.05 A6 6 0 0 1 6.96 2.09 L7.51 5.24 A2.8 2.8 0 0 0 5.37 8.96Z" fill="currentColor"/>',
  viral:       '<path d="M5 2 C5 5 11 6 11 9 C11 12 5 13 5 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M11 2 C11 5 5 6 5 9 C5 12 11 13 11 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>',
  true:        '<circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="8" y1="1" x2="8" y2="15" stroke="currentColor" stroke-width="1.2"/><line x1="1" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.2"/>',
  void:        '<path d="M8 3 C4 3 3 6 5 8 C7 10 5 13 8 13 C11 13 13 10 11 8 C9 6 12 3 8 3Z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>',
};

function dmgIcon(type, size) {
  size = size || 14;
  const color = ELEM_COLORS[type] || '#888';
  const inner = DMG_ICONS[type];
  if (!inner) return '<span class="elem-dot" style="background:' + color + '"></span>';
  return '<svg class="dmg-icon" width="' + size + '" height="' + size + '" viewBox="0 0 16 16" fill="none" style="color:' + color + '" aria-hidden="true">' + inner + '</svg>';
}

// Faction damage-type effectiveness (Update 36.0+)
// Keys mirror enemies.json faction strings; values map damage type → multiplier
const FACTION_EFFECTIVENESS = {
  grineer:         { impact:1.5, corrosive:1.5 },
  kuva_grineer:    { impact:1.5, heat:0.5, corrosive:1.5 },
  corpus:          { puncture:1.5, magnetic:1.5 },
  corpus_amalgam:  { electricity:1.5, blast:0.5, magnetic:1.5 },
  infested:        { slash:1.5, heat:1.5 },
  infestation:     { slash:1.5, heat:1.5 },
  deimos_infested: { blast:1.5, gas:1.5, viral:0.5 },
  corrupted:       { puncture:1.5, radiation:0.5, viral:1.5 },
  orokin:          { puncture:1.5, radiation:0.5, viral:1.5 },
  sentient:        { cold:1.5, corrosive:0.5, radiation:1.5 },
  narmer:          { slash:1.5, toxin:1.5, magnetic:0.5 },
  themurmur:       { electricity:1.5, radiation:1.5, viral:0.5 },
  murmur:          { electricity:1.5, radiation:1.5, viral:0.5 },
  scaldra:         { impact:1.5, corrosive:1.5, gas:0.5 },
  techrot:         { cold:0.5, gas:1.5, magnetic:1.5 },
  anarchs:         { impact:1.5, electricity:1.5, radiation:0.5 },
};

// Tooltip text map
const TOOLTIPS = {
  'crit-chance':  'Chance per hit to deal a critical strike. 100–200% = guaranteed Tier 1 + chance at Tier 2, etc.',
  'crit-mult':    'Damage multiplier on a critical hit.',
  'status':       'Chance per hit to apply a status proc — Slash bleed, Heat burn, Viral debuff, etc.',
  'fire-rate':    'Shots (or attacks) per second. Affects DPS but not per-hit damage.',
  'magazine':     'Rounds before a reload is required.',
  'max-ammo':     'Maximum ammo reserve (excludes magazine).',
  'reload':       'Time in seconds to reload the weapon.',
  'multishot':    'Projectiles fired per trigger pull. Each projectile deals full damage and independently rolls status/crit. Base is 1.0 for all weapons.',
  'impact':       'Strong vs. Machinery, Robotic. Weak vs. Infested Sinew.',
  'puncture':     'Strong vs. Corpus, Corrupted/Orokin. No DoT.',
  'slash':        'Strong vs. Infested, Narmer. Procs a bleed DoT that bypasses armor.',
  'heat':         'Strong vs. Infested. Resistant: Kuva Grineer. Procs a burn DoT.',
  'cold':         'Strong vs. Sentient. Resistant: Techrot. Procs a slow.',
  'electricity':  'Strong vs. Corpus Amalgam, Murmur, Anarchs. Procs a chain stun.',
  'toxin':        'Strong vs. Narmer. Procs a poison DoT that bypasses shields.',
  'blast':        'Heat + Cold. Strong vs. Deimos Infested. Resistant: Corpus Amalgam. Procs a knockback.',
  'corrosive':    'Electricity + Toxin. Strong vs. Grineer, Scaldra. Resistant: Sentient. Permanently strips armor stacks.',
  'gas':          'Heat + Toxin. Strong vs. Deimos Infested, Techrot. Resistant: Scaldra. Procs a toxic cloud AoE.',
  'magnetic':     'Cold + Electricity. Strong vs. Corpus, Techrot. Resistant: Narmer. Procs a shield drain.',
  'radiation':    'Heat + Electricity. Strong vs. Sentient, Murmur. Resistant: Corrupted, Anarchs. Procs confusion (enemies attack each other).',
  'viral':        'Cold + Toxin. Strong vs. Cloned Flesh, Flesh. Weak vs. Robotic, Machinery. Procs a health debuff (×4.25 damage to health at 10 stacks).',
  'void':         'Dealt by Operator amps and select weapons. No special armor/health interactions.',
};

// Track current multishot for results note
let _currentMultishot = 1.0;

function initTooltips() {
  document.querySelectorAll('[data-tooltip]').forEach(el => {
    if (el._tippyBound) return;
    const text = TOOLTIPS[el.dataset.tooltip];
    if (!text) return;
    el._tippyBound = true;
    if (typeof tippy === 'function') {
      tippy(el, {
        content: text,
        placement: 'top',
        theme: 'warframe',
        delay: [200, 0],
        maxWidth: 280,
      });
    }
  });
}

let weaponCombo = null;
let enemyCombo = null;

async function loadData() {
  [allWeapons, allMods, allEnemies] = await Promise.all([
    fetch('/api/weapons').then(r => r.json()),
    fetch('/api/mods').then(r => r.json()),
    fetch('/api/enemies').then(r => r.json()),
  ]);

  const HIDDEN_WEAPON_CLASSES = new Set(['Exalted Weapon']);
  const HIDDEN_WEAPON_NAMES  = new Set(['Garuda Talons', 'Garuda Prime Talons']);
  const visibleWeapons = allWeapons.filter(w =>
    !HIDDEN_WEAPON_CLASSES.has(w.class) && !HIDDEN_WEAPON_NAMES.has(w.name)
  );

  weaponCombo = setupCombobox('weapon-search', 'weapon-dropdown',
    visibleWeapons.map(w => w.name),
    () => onWeaponChange(),
    name => {
      const w = allWeapons.find(x => x.name === name);
      return w?.image ? `/static/images/weapons/${w.image}` : '';
    }
  );
  enemyCombo = setupCombobox('enemy-search', 'enemy-dropdown',
    allEnemies.map(e => e.name),
    () => { showEnemyStats(getCurrentEnemy()); }
  );

  initModGrid();
}

function getCurrentWeapon() {
  const name = document.getElementById('weapon-search').value;
  return allWeapons.find(x => x.name === name) || null;
}

function getCurrentEnemy() {
  const name = document.getElementById('enemy-search').value;
  return allEnemies.find(x => x.name === name) || null;
}

function getBonusElement() {
  const div = document.getElementById('bonus-element-div');
  if (!div || div.style.display === 'none') return {};
  return {
    bonus_element: document.getElementById('bonus-element-type').value,
    bonus_element_pct: (parseFloat(document.getElementById('bonus-element-pct').value) || 25) / 100.0,
  };
}

// ---------------------------------------------------------------------------
// 2×4 Mod Card Grid
// ---------------------------------------------------------------------------
let selectedAttack = null; // name of selected attack mode (null = first)

let modSlots = ['','','','','','','','']; // 8 slots, mod names
let _pickerSlot = -1; // which slot the picker is open for
let _sortableInstance = null;

function polaritySVG(polarity) {
  if (!polarity) return '';
  const paths = {
    'Madurai':   '<path d="M6 2L11 10L6 8L1 10Z"/>',
    'Naramon':   '<path d="M1 4.5H11V7.5H1Z"/>',
    'Vazarin':   '<path d="M3 1C9 3 9 9 3 11L3 1Z"/>',
    'Zenurik':   '<path d="M1 2.5H11V4.5H1ZM1 7.5H11V9.5H1Z"/>',
    'Unairu':    '<path d="M6 1L11 11H1Z"/>',
    'Penjaga':   '<path d="M6 1L10 5L6 9M6 5H2"/>',
    'Umbra':     '<path d="M6 1L10 6L6 11L2 6ZM6 4L8 6L6 8"/>',
    'Universal': '<circle cx="6" cy="6" r="4"/>',
  };
  const p = paths[polarity];
  if (!p) return '';
  return `<span class="mod-polarity"><svg class="polarity-icon" viewBox="0 0 12 12" width="14" height="14" fill="currentColor" stroke="none">${p}</svg></span>`;
}

function initModGrid() {
  modSlots = ['','','','','','','',''];
  renderModCards();
  renderSpecialSlots();
  initSortable();

}

function renderModCards() {
  const grid = document.getElementById('mod-grid');
  grid.innerHTML = '';
  const STAT_LABELS = {
    damage:'DMG', multishot:'MS', crit_chance:'CC', crit_damage:'CD',
    status_chance:'SC', fire_rate:'FR', heat:'Heat', cold:'Cold',
    electricity:'Elec', toxin:'Tox',
    impact:'Impact', puncture:'Puncture', slash:'Slash',
  };
  modSlots.forEach((modName, i) => {
    const card = document.createElement('div');
    card.dataset.slot = i;

    if (modName === '__riven__') {
      card.className = 'mod-card riven-mod-card';
      const lines = (rivenApplied || []).filter(s => s.stat)
        .map(s => `<div class="riven-card-stat">${s.pct >= 0 ? '+' : ''}${s.pct}% ${esc(STAT_LABELS[s.stat] || s.stat)}</div>`)
        .join('');
      card.innerHTML = `
        <button class="mod-clear" onclick="event.stopPropagation();clearRiven()" title="Remove riven">&times;</button>
        <div class="riven-card-icon">⬡</div>
        <div class="mod-name" style="color:var(--riven)">Riven</div>
        <div class="riven-card-stats">${lines}</div>`;
      card.onclick = openRivenBuilder;
    } else if (modName) {
      card.className = 'mod-card';
      const mod = allMods.find(m => m.name === modName);
      const rarity = mod ? (mod.rarity || '').toLowerCase() : '';
      if (rarity) card.classList.add('rarity-' + rarity);
      const elemTag = mod && mod.primary_element ? mod.primary_element : '';
      const polIcon = mod ? polaritySVG(mod.polarity) : '';
      card.innerHTML = `
        <button class="mod-clear" onclick="event.stopPropagation();clearModSlot(${i})" title="Remove mod">&times;</button>
        ${polIcon}
        <div class="mod-name">${esc(modName)}</div>
        ${elemTag ? `<div class="mod-element">${esc(elemTag)}</div>` : ''}
        <div class="slot-num">${i+1}</div>`;
      card.onclick = () => openModPicker(i);
    } else {
      card.className = 'mod-card empty';
      card.innerHTML = `
        <div class="add-icon">+</div>
        <div class="add-label">Add Mod</div>
        <div class="slot-num">${i+1}</div>`;
      card.onclick = () => openModPicker(i);
    }
    grid.appendChild(card);
  });
  updateElementBadges();
}

function initSortable() {
  const grid = document.getElementById('mod-grid');
  if (_sortableInstance) _sortableInstance.destroy();
  _sortableInstance = new Sortable(grid, {
    animation: 200,
    delay: 150,
    delayOnTouchOnly: true,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd(evt) {
      const item = modSlots.splice(evt.oldIndex, 1)[0];
      modSlots.splice(evt.newIndex, 0, item);
      renderModCards();
      initSortable();
      updateModdedStats();
    }
  });
}

function clearModSlot(i) {
  modSlots[i] = '';
  renderModCards();
  initSortable();
  updateModdedStats();

}

function getSelectedMods() {
  const specials = [stanceSlot, exilusSlot].filter(Boolean);
  return [...specials, ...modSlots.filter(n => n && n !== '__riven__')];
}

// Mod Picker

function openModPicker(slotIndex) {
  _pickerSlot = slotIndex;
  document.getElementById('picker-slot-num').textContent = slotIndex + 1;
  const overlay = document.getElementById('mod-picker-overlay');
  overlay.classList.add('active');
  const search = document.getElementById('mod-picker-search');
  search.value = '';
  toggleSearchClear(search);
  search.focus();
  renderPickerList('');
}

function openSpecialPicker(kind) {
  _pickerSlot = kind; // 'stance' or 'exilus'
  document.getElementById('picker-slot-num').textContent =
    kind === 'stance' ? 'Stance' : 'Exilus';
  const overlay = document.getElementById('mod-picker-overlay');
  overlay.classList.add('active');
  const search = document.getElementById('mod-picker-search');
  search.value = '';
  toggleSearchClear(search);
  search.focus();
  renderPickerList('');
}

function closeModPicker() {
  document.getElementById('mod-picker-overlay').classList.remove('active');
  _pickerSlot = -1;
}

function renderPickerList(query) {
  const weapon = getCurrentWeapon();
  const types = getCompatibleModTypes(weapon);
  const q = query.toLowerCase();

  // Build set of mods already in use (excluding the slot currently being replaced)
  const inUse = new Set();
  if (_pickerSlot !== 'stance' && stanceSlot) inUse.add(stanceSlot);
  if (_pickerSlot !== 'exilus' && exilusSlot) inUse.add(exilusSlot);
  modSlots.forEach((name, i) => {
    if (name && name !== '__riven__' && i !== _pickerSlot) inUse.add(name);
  });

  let filtered;
  if (_pickerSlot === 'stance') {
    const NON_STANCE = new Set(['Aura','Railjack Aura','Warframe','Plexus','K-Drive',
      'Companion','Sentinel','MOA','Beast','Kubrow','Kavat','Vulpaphyla','Predasite',
      'Necramech','Archwing','Archgun','Archmelee']);
    filtered = allMods.filter(m => (m.base_drain || 0) < 0 && !NON_STANCE.has(m.type))
      .filter(m => weapon ? types.has(m.type) : true)
      .filter(m => !inUse.has(m.name))
      .filter(m => !q || m.name.toLowerCase().includes(q));
  } else if (_pickerSlot === 'exilus') {
    const exilusSet = getExilusSet();
    filtered = allMods.filter(m => exilusSet.has(m.name))
      .filter(m => !inUse.has(m.name))
      .filter(m => !q || m.name.toLowerCase().includes(q));
  } else {
    filtered = allMods
      .filter(m => types.has(m.type))
      .filter(m => !inUse.has(m.name))
      .filter(m => !q || m.name.toLowerCase().includes(q));
  }

  const list = document.getElementById('mod-picker-list');
  const RARITY_COLORS = { common: '#9e9e78', uncommon: '#6a8f47', rare: '#5a7cc4', legendary: '#c49a1f' };
  list.innerHTML = filtered.slice(0, 100).map(m => {
    const rc = RARITY_COLORS[(m.rarity || '').toLowerCase()] || '#888';
    const elem = m.primary_element || '';
    return `<div class="mod-picker-item" data-mod="${esc(m.name)}" onclick="selectPickerMod(this)">
      <span class="mod-rarity-dot" style="background:${rc}"></span>
      ${esc(m.name)}
      ${elem ? `<span class="mod-element-tag">${esc(elem)}</span>` : ''}
    </div>`;
  }).join('');
}

function selectPickerMod(el) {
  if (_pickerSlot === -1) return;
  const modName = el.dataset.mod;
  // Prevent duplicates across all slots
  const allSelected = getSelectedMods();
  const currentInSlot = _pickerSlot === 'stance' ? stanceSlot
    : _pickerSlot === 'exilus' ? exilusSlot
    : modSlots[_pickerSlot];
  if (modName !== currentInSlot && allSelected.includes(modName)) return;
  if (_pickerSlot === 'stance') {
    stanceSlot = modName;
    closeModPicker();
    renderSpecialSlots();
  } else if (_pickerSlot === 'exilus') {
    exilusSlot = modName;
    closeModPicker();
    renderSpecialSlots();
  } else {
    modSlots[_pickerSlot] = modName;
    closeModPicker();
    renderModCards();
    initSortable();
  }
  updateModdedStats();

}

// Close picker on outside click
document.addEventListener('click', e => {
  const overlay = document.getElementById('mod-picker-overlay');
  if (overlay && overlay.classList.contains('active') && e.target === overlay) {
    closeModPicker();
  }
});

// Picker search
document.addEventListener('DOMContentLoaded', () => {
  const search = document.getElementById('mod-picker-search');
  if (search) search.addEventListener('input', function() {
    renderPickerList(this.value);
    toggleSearchClear(this);
  });
});

// ---------------------------------------------------------------------------
// Element Combination Badges
// ---------------------------------------------------------------------------
const ELEM_COMBOS = {
  'heat+cold': 'Blast', 'cold+heat': 'Blast',
  'electricity+toxin': 'Corrosive', 'toxin+electricity': 'Corrosive',
  'heat+toxin': 'Gas', 'toxin+heat': 'Gas',
  'cold+electricity': 'Magnetic', 'electricity+cold': 'Magnetic',
  'heat+electricity': 'Radiation', 'electricity+heat': 'Radiation',
  'cold+toxin': 'Viral', 'toxin+cold': 'Viral',
};
const PRIMARY_ELEMENTS = new Set(['heat', 'cold', 'electricity', 'toxin']);

function updateElementBadges() {
  const container = document.getElementById('element-badges');
  if (!container) return;
  // Gather elemental mods in slot order, tracking slot index
  const elemQueue = [];
  modSlots.forEach((name, slotIdx) => {
    if (!name) return;
    const mod = allMods.find(m => m.name === name);
    if (mod && mod.primary_element && PRIMARY_ELEMENTS.has(mod.primary_element.toLowerCase())) {
      elemQueue.push({ element: mod.primary_element.toLowerCase(), slotIdx });
    }
  });

  // Append weapon's innate primary elements at slot 8 (after all 8 mod slots)
  const weaponData = getCurrentWeapon();
  if (weaponData) {
    const atk = getSelectedAttackData(weaponData);
    const bd = ((atk || weaponData).base_damage) || {};
    Object.keys(bd).forEach(k => {
      if (PRIMARY_ELEMENTS.has(k) && bd[k] > 0) {
        elemQueue.push({ element: k, slotIdx: 8 });
      }
    });
  }

  // Combine in order (same as combiner.py logic)
  const badges = [];
  const used = new Set();
  for (let i = 0; i < elemQueue.length; i++) {
    if (used.has(i)) continue;
    let combined = false;
    for (let j = i + 1; j < elemQueue.length; j++) {
      if (used.has(j)) continue;
      const key = elemQueue[i].element + '+' + elemQueue[j].element;
      if (ELEM_COMBOS[key]) {
        badges.push({ a: elemQueue[i].element, b: elemQueue[j].element, result: ELEM_COMBOS[key], slotA: elemQueue[i].slotIdx, slotB: elemQueue[j].slotIdx });
        used.add(i);
        used.add(j);
        combined = true;
        break;
      }
    }
    if (!combined) {
      badges.push({ a: elemQueue[i].element, b: null, result: elemQueue[i].element, slotA: elemQueue[i].slotIdx, slotB: -1 });
      used.add(i);
    }
  }

  container.innerHTML = badges.filter(b => b.b).map(b => {
    const ca = ELEM_COLORS[b.a] || '#888';
    const cb = ELEM_COLORS[b.b] || '#888';
    const cr = ELEM_COLORS[b.result.toLowerCase()] || 'var(--accent)';
    const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
    return `<div class="element-badge">
      ${dmgIcon(b.a, 12)}${cap(b.a)}
      <span class="arrow">+</span>
      ${dmgIcon(b.b, 12)}${cap(b.b)}
      <span class="arrow">=</span>
      ${dmgIcon(b.result.toLowerCase(), 12)}${cap(b.result)}
    </div>`;
  }).join('');

  drawElementArcs(badges.filter(b => b.b !== null));
}

function drawElementArcs(combos) {
  const svg = document.getElementById('element-arcs');
  if (!svg) return;
  svg.innerHTML = '';
  if (!combos || !combos.length) { svg.style.height = '0'; return; }

  const grid = document.getElementById('mod-grid');
  const wrap = document.getElementById('mod-grid-wrapper');
  const wrapRect = wrap.getBoundingClientRect();
  const arcSpace = 30 + combos.length * 28;
  svg.setAttribute('width', wrap.offsetWidth);
  svg.setAttribute('height', grid.offsetHeight + arcSpace);

  combos.forEach((combo, idx) => {
    if (combo.slotA < 0 || combo.slotB < 0) return;
    const cardA = grid.children[combo.slotA];
    const cardB = grid.children[combo.slotB];
    if (!cardA || !cardB) return;

    const rectA = cardA.getBoundingClientRect();
    const rectB = cardB.getBoundingClientRect();
    const ax = rectA.left - wrapRect.left + rectA.width / 2;
    const ay = rectA.top - wrapRect.top + rectA.height;
    const bx = rectB.left - wrapRect.left + rectB.width / 2;
    const by = rectB.top - wrapRect.top + rectB.height;
    const mx = (ax + bx) / 2;
    const my = Math.max(ay, by) + 18 + idx * 28;
    const color = ELEM_COLORS[combo.result.toLowerCase()] || 'var(--accent)';

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${ax} ${ay} Q${ax} ${my} ${mx} ${my} M${bx} ${by} Q${bx} ${my} ${mx} ${my}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('stroke-opacity', '0.5');
    svg.appendChild(path);

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${mx},${my})`);
    const label = combo.result;
    const tw = label.length * 7 + 14;
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', -tw / 2); bg.setAttribute('y', -9);
    bg.setAttribute('width', tw); bg.setAttribute('height', 18);
    bg.setAttribute('rx', 9);
    bg.setAttribute('fill', 'rgba(15,15,25,0.85)');
    bg.setAttribute('stroke', color); bg.setAttribute('stroke-width', '1');
    g.appendChild(bg);
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('text-anchor', 'middle'); text.setAttribute('dy', '4');
    text.setAttribute('fill', color); text.setAttribute('font-size', '11');
    text.setAttribute('font-weight', '600'); text.setAttribute('font-family', 'inherit');
    text.textContent = label;
    g.appendChild(text);
    svg.appendChild(g);
  });
}

// Returns the set of mod types compatible with the given weapon
function getCompatibleModTypes(weapon) {
  if (!weapon) return new Set();
  const slot = weapon.slot || '';
  const cls  = weapon.class || '';
  const types = new Set([weapon.name]); // always include weapon-specific mods

  if (slot === 'Primary') {
    types.add('Primary');
    if (cls === 'Shotgun') {
      types.add('Shotgun');
    } else if (cls === 'Sniper Rifle') {
      types.add('Rifle');
      types.add('Sniper');
    } else if (cls === 'Bow' || cls === 'Crossbow') {
      types.add('Rifle');
      types.add('Bow');
    } else {
      types.add('Rifle');
      types.add('Assault Rifle');
    }
  } else if (slot === 'Secondary') {
    types.add('Pistol');
  } else if (slot === 'Melee') {
    types.add('Melee');
    const classMap = {
      'Dagger':           'Daggers',
      'Dual Daggers':     'Dual Daggers',
      'Sword':            'Swords',
      'Dual Swords':      'Dual Swords',
      'Nikana':           'Nikanas',
      'Dual Nikanas':     'Dual Nikanas',
      'Two-Handed Nikana':'Two-Handed Nikana',
      'Heavy Blade':      'Heavy Blade',
      'Hammer':           'Hammers',
      'Polearm':          'Polearms',
      'Staff':            'Staves',
      'Whip':             'Whips',
      'Blade and Whip':   'Blade And Whip',
      'Glaive':           'Glaives',
      'Claws':            'Claws',
      'Tonfa':            'Tonfas',
      'Scythe':           'Scythes',
      'Heavy Scythe':     'Heavy Scythe',
      'Rapier':           'Rapiers',
      'Sword and Shield': 'Sword And Shield',
      'Machete':          'Machetes',
      'Sparring':         'Sparring',
      'Fist':             'Fists',
      'Nunchaku':         'Nunchaku',
      'Warfan':           'Warfans',
      'Gunblade':         'Gunblade',
    };
    if (classMap[cls]) types.add(classMap[cls]);
  }
  return types;
}

function onWeaponChange() {
  selectedAttack = null;
  const weapon = getCurrentWeapon();
  const compatTypes = getCompatibleModTypes(weapon);
  // Clear regular mod slots that are no longer compatible with the new weapon
  modSlots = modSlots.map(name => {
    if (!name || name === '__riven__') return name;
    const mod = allMods.find(m => m.name === name);
    return (mod && compatTypes.has(mod.type)) ? name : '';
  });
  // Stance slot is melee-only — clear if switching to a ranged weapon
  if (stanceSlot && !isMeleeWeapon()) {
    stanceSlot = '';
  }
  // Exilus set is weapon-type-specific — clear exilus if it no longer applies
  if (exilusSlot && !getExilusSet().has(exilusSlot)) {
    exilusSlot = '';
  }
  // Combo counter is melee-only — hide for ranged weapons and reset to tier 1
  const comboInput  = document.getElementById('combo-counter');
  const comboDiv    = document.getElementById('combo-div');
  const meleeWeapon = isMeleeWeapon();
  comboDiv.style.display = meleeWeapon ? '' : 'none';
  if (!meleeWeapon) comboInput.value = 1;
  // Update combo max: Venka Prime can reach 13x; all other weapons cap at 12x
  comboInput.max = (weapon && weapon.name === 'Venka Prime') ? 13 : 12;
  if (parseInt(comboInput.value) > parseInt(comboInput.max)) comboInput.value = comboInput.max;

  // Bonus element selector: visible only for Kuva/Tenet weapons
  const bonusDiv = document.getElementById('bonus-element-div');
  if (bonusDiv) {
    const isKT = weapon && (weapon.name.startsWith('Kuva ') || weapon.name.startsWith('Tenet '));
    bonusDiv.style.display = isKT ? '' : 'none';
    if (!isKT) {
      document.getElementById('bonus-element-type').value = 'heat';
      document.getElementById('bonus-element-pct').value = 25;
    }
  }

  updateAttackSelector(weapon);
  showWeaponStats(weapon);
  renderSpecialSlots();
  updateModdedStats();

  updateElementBadges();
}

function updateAttackSelector(weapon) {
  if (!weapon || !weapon.attacks || weapon.attacks.length <= 1) {
    selectedAttack = null;
  } else {
    selectedAttack = selectedAttack || weapon.attacks[0].name;
  }
}

function selectAttack(name) {
  selectedAttack = name;
  showWeaponStats(getCurrentWeapon());
  updateModdedStats();
  updateElementBadges();
}

function getSelectedAttackData(weapon) {
  if (!weapon || !weapon.attacks || !weapon.attacks.length) return null;
  if (selectedAttack) {
    const found = weapon.attacks.find(a => a.name === selectedAttack);
    if (found) return found;
  }
  return weapon.attacks[0];
}

function renderDamageTable(baseDmg, moddedData) {
  const wrap = document.getElementById('damage-table-wrap');
  if (!wrap) return;

  const hasModded = moddedData && Object.keys(moddedData.modded_damage || {}).length > 0;

  // Merge all damage types: base IPS + modded elementals
  const allTypes = new Set([
    ...Object.keys(baseDmg),
    ...(hasModded ? Object.keys(moddedData.modded_damage) : []),
  ]);

  const baseTotal = Object.values(baseDmg).reduce((s, v) => s + v, 0);
  const moddedTotal = hasModded ? moddedData.modded_total : null;

  const headerModded = hasModded
    ? `<th style="text-align:right" class="col-modded">Modded</th>`
    : '';

  const rows = Array.from(allTypes).map(type => {
    const baseVal = baseDmg[type];
    const modVal  = hasModded ? moddedData.modded_damage[type] : null;
    const color   = ELEM_COLORS[type] || 'var(--text)';
    const dot     = dmgIcon(type);
    const label   = type.charAt(0).toUpperCase() + type.slice(1);
    const ttAttr  = TOOLTIPS[type] ? ` data-tooltip="${type}"` : '';

    const baseCell = baseVal != null
      ? `<td class="col-base" style="text-align:right">${baseVal.toFixed(1)}</td>`
      : `<td class="col-base" style="text-align:right;color:var(--border)">—</td>`;

    const moddedCell = hasModded
      ? `<td class="col-modded" style="text-align:right">${modVal != null ? modVal.toFixed(1) : '—'}</td>`
      : '';

    return `<tr>
      <td${ttAttr}>${dot}${label}</td>
      ${baseCell}
      ${moddedCell}
    </tr>`;
  }).join('');

  const moddedTotalCell = hasModded
    ? `<td style="text-align:right" class="col-modded">${moddedTotal.toFixed(1)}</td>`
    : '';

  wrap.innerHTML = `
    <table class="breakdown-table">
      <thead>
        <tr>
          <th>Damage Type</th>
          <th style="text-align:right">Base</th>
          ${headerModded}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot class="total-row">
        <tr>
          <td>Total</td>
          <td style="text-align:right">${baseTotal.toFixed(1)}</td>
          ${moddedTotalCell}
        </tr>
      </tfoot>
    </table>
  `;
  initTooltips();
}

let _modUpdateTimer = null;

function updateModdedStats() {
  clearTimeout(_modUpdateTimer);
  _modUpdateTimer = setTimeout(_doUpdateModdedStats, 120);
}

async function _doUpdateModdedStats() {
  const weapon = getCurrentWeapon();
  if (!weapon) return;

  const mods = getSelectedMods();

  try {
    const resp = await fetch('/api/modded-weapon', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ weapon: weapon.name, mods, attack: selectedAttack, riven: getRivenSpec(), galvanized_stacks: parseInt(document.getElementById('galv-stacks').value, 10) || 0, ...getBonusElement() }),
    });
    if (!resp.ok) return;
    const data = await resp.json();

    // Update damage table
    const atkData = getSelectedAttackData(weapon);
    const qBase = data.quantized_base_damage || (atkData ? atkData.base_damage : weapon.base_damage);
    const moddedDiffers = data && JSON.stringify(data.modded_damage) !== JSON.stringify(data.quantized_base_damage);
    const hasAnyMods = (mods.length > 0 || !!getRivenSpec()) && moddedDiffers;
    renderDamageTable(qBase, hasAnyMods ? data : null);

    // Update crit/status stat blocks
    const hasMods = hasAnyMods;
    const hasSomeMods = mods.length > 0 || !!getRivenSpec();
    const pct = v => (v * 100).toFixed(1) + '%';

    const smCC = document.getElementById('sm-cc');
    const smCM = document.getElementById('sm-cm');
    const smSC = document.getElementById('sm-sc');

    if (smCC) {
      if (hasMods && Math.abs(data.modded_cc - data.base_cc) > 0.0001) {
        smCC.textContent = pct(data.modded_cc);
        smCC.style.display = 'block';
      } else {
        smCC.style.display = 'none';
      }
    }
    if (smCM) {
      if (hasMods && Math.abs(data.modded_cm - data.base_cm) > 0.0001) {
        smCM.textContent = data.modded_cm.toFixed(2) + 'x';
        smCM.style.display = 'block';
      } else {
        smCM.style.display = 'none';
      }
    }
    if (smSC) {
      if (hasMods && Math.abs(data.modded_sc - data.base_sc) > 0.0001) {
        smSC.textContent = pct(data.modded_sc);
        smSC.style.display = 'block';
      } else {
        smSC.style.display = 'none';
      }
    }
    const smSCPellet = document.getElementById('sm-sc-pellet');
    if (smSCPellet) {
      if (data.inherent_multishot > 1) {
        const ppSc = data.sc_per_pellet || 0;
        smSCPellet.textContent = pct(ppSc) + '/pellet';
        smSCPellet.style.display = 'block';
      } else {
        smSCPellet.style.display = 'none';
      }
    }

    const smMS = document.getElementById('sm-ms');
    if (smMS) {
      const ms = data.modded_multishot || 1.0;
      _currentMultishot = ms;
      if (hasSomeMods && ms > 1.0001) {
        smMS.textContent = '→ ' + ms.toFixed(2) + 'x';
        smMS.style.display = 'block';
      } else {
        smMS.style.display = 'none';
        if (!hasSomeMods) _currentMultishot = 1.0;
      }
    }

    const smFR = document.getElementById('sm-fr');
    if (smFR) {
      const baseFr  = data.base_fr  || 0;
      const moddedFr = data.modded_fr || 0;
      if (hasSomeMods && baseFr > 0 && Math.abs(moddedFr - baseFr) > 0.001) {
        smFR.textContent = '→ ' + moddedFr.toFixed(2) + '/s';
        smFR.style.display = 'block';
      } else {
        smFR.style.display = 'none';
      }
    }

    const smReload = document.getElementById('sm-reload');
    if (smReload) {
      const baseRel   = data.base_reload   || 0;
      const moddedRel = data.modded_reload || 0;
      if (hasSomeMods && baseRel > 0 && Math.abs(moddedRel - baseRel) > 0.001) {
        smReload.textContent = '→ ' + moddedRel.toFixed(2) + 's';
        smReload.style.display = 'block';
      } else {
        smReload.style.display = 'none';
      }
    }

    const smMag = document.getElementById('sm-mag');
    const svMag = document.getElementById('sv-mag');
    if (smMag && svMag) {
      const baseMag   = data.base_magazine   || 0;
      const moddedMag = data.modded_magazine || 0;
      if (hasSomeMods && baseMag > 0 && moddedMag !== baseMag) {
        smMag.textContent = '→ ' + moddedMag;
        smMag.style.display = 'block';
      } else {
        smMag.style.display = 'none';
      }
    }

    const smAmmo = document.getElementById('sm-ammo');
    const svAmmo = document.getElementById('sv-ammo');
    if (smAmmo && svAmmo) {
      const baseAmmo   = data.base_ammo_max   || 0;
      const moddedAmmo = data.modded_ammo_max || 0;
      if (hasSomeMods && baseAmmo > 0 && moddedAmmo !== baseAmmo) {
        smAmmo.textContent = '→ ' + moddedAmmo;
        smAmmo.style.display = 'block';
      } else {
        smAmmo.style.display = 'none';
      }
    }
  } catch(e) {
    // silent — non-critical
  }
}

  if (!enemy) { panel.style.display = 'none'; document.getElementById('enemy-scaled-stats').innerHTML = ''; return; }

  // Set min to enemy's base level; keep current value if already valid, else clamp
  const lvlInput = document.getElementById('enemy-level');
  if (lvlInput) {
    const bl = enemy.base_level || 1;
    lvlInput.min = bl;
    lvlInput.value = bl;
  }

  const fmt = (v, suffix) => v != null && v !== 0 ? v + (suffix || '') : '—';
  // Handles underscore-separated strings like "infested_flesh" → "Infested Flesh"
  const cap = s => s ? s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : '—';

  // Populate body-part dropdown from enemy.body_parts
  const bpSelect = document.getElementById('body-part-select');
  if (bpSelect && enemy.body_parts) {

  const headMult = enemy.body_parts && enemy.body_parts['Head'];
  const headRow = headMult && headMult !== 1
    ? `<div class="stat-row">

          <div class="stat-label">Head Multiplier</div>
          <div class="stat-value">${headMult}×</div>

    : '';

  document.getElementById('enemy-stats-content').innerHTML = `
    <div style="margin-bottom:10px">
      <div style="font-size:15px;font-weight:600;color:var(--text)">${esc(enemy.name)}</div>
    </div>
    <div class="stat-rows">

          <div class="stat-label">Faction</div>
          <div class="stat-value">${cap(enemy.faction)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Health Type</div>
          <div class="stat-value">${cap(enemy.health_type)}</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-block">
          <div class="stat-label">Base Health</div>
          <div class="stat-value">${fmt(enemy.base_health)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Base Shield</div>

        </div>
        <div class="stat-block">

function populateSelect(id, names) {

  sel.innerHTML = names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
}

function setSelectValue(id, value) {
  const sel = document.getElementById(id);
  for (const opt of sel.options) {
    if (opt.value === value) { sel.value = value; return; }
  }
}

function setSelectByText(sel, text) {
  for (const opt of sel.options) {
    if (opt.value === text) { sel.value = text; return; }
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtNum(n) {
  return n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function setupSearch(inputId, selectId, getNames, onChange) {
  const el = document.getElementById(inputId);
  el.addEventListener('input', function() {
    const q = this.value.toLowerCase();
    const names = getNames().filter(n => n.toLowerCase().includes(q));
    populateSelect(selectId, names);
    if (onChange) onChange();
    toggleSearchClear(this);
  });
}

function setupCombobox(inputId, dropdownId, items, onSelect, getImageUrl) {
  const input = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);
  const panel = input.closest('.panel');
  let _confirmed = '';   // last committed selection

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

  function render(q) {
    const lq = q.toLowerCase();
    const matches = lq ? items.filter(n => n.toLowerCase().includes(lq)) : items;
    const shown = matches.slice(0, 80);
    dropdown.innerHTML = shown.map(n => {
      const img = getImageUrl
        ? `<img class="combobox-img" src="${getImageUrl(n)}" alt="" onerror="this.style.display='none'">`
        : '';
      return `<div class="combobox-item" data-value="${esc(n)}">${img}${esc(n)}</div>`;
    }).join('');
    if (matches.length > 80) {
      dropdown.innerHTML += `<div class="combobox-hint">${matches.length} results — type to narrow</div>`;
    }
    const isOpen = shown.length > 0;
    dropdown.classList.toggle('open', isOpen);
    if (panel) panel.classList.toggle('combobox-open', isOpen);
  }

  function commit(name) {
    _confirmed = name;
    input.value = name;
    close();
    toggleSearchClear(input);
    if (onSelect) onSelect(name);
  }

  function close() {
    // Restore last confirmed name if user abandoned a search
    if (input.value !== _confirmed) {
      input.value = _confirmed;
      toggleSearchClear(input);
    }
    dropdown.classList.remove('open');
    if (panel) panel.classList.remove('combobox-open');
  }

  // Focus: clear input so user can type a new search immediately
  input.addEventListener('focus', () => { input.value = ''; toggleSearchClear(input); render(''); });
  input.addEventListener('input', () => { toggleSearchClear(input); render(input.value); });
  // combobox-clear: reset confirmed state without calling onSelect (used by X button)
  input.addEventListener('combobox-clear', () => { _confirmed = ''; });
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { close(); input.blur(); }
    if (e.key === 'Enter') {
      const first = dropdown.querySelector('.combobox-item');
      if (first) commit(first.dataset.value);
    }
  });

  // mousedown + preventDefault keeps input focused while selecting
  dropdown.addEventListener('mousedown', e => {
    e.preventDefault();
    const item = e.target.closest('.combobox-item');
    if (item) commit(item.dataset.value);
  });

  // Touch selection
  dropdown.addEventListener('touchend', e => {
    const item = e.target.closest('.combobox-item');
    if (item) { e.preventDefault(); commit(item.dataset.value); }
  });

  // Close on click outside
  document.addEventListener('mousedown', e => {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) close();
  });

  return { set: commit };
}

function clearCombobox(which) {
  const input = document.getElementById(`${which}-search`);
  const dropdown = document.getElementById(`${which}-dropdown`);
  input.dispatchEvent(new CustomEvent('combobox-clear'));
  input.value = '';
  dropdown.classList.remove('open');
  toggleSearchClear(input);
  input.focus();
}

function toggleSearchClear(input) {
  const wrap = input.closest('.search-wrap');
  if (wrap) wrap.classList.toggle('has-value', input.value.length > 0);
}

function clearSearch(inputId) {
  const el = document.getElementById(inputId);
  el.value = '';
  el.dispatchEvent(new Event('input'));
  el.focus();
}

function isMeleeWeapon() {
  const w = getCurrentWeapon();
  if (!w) return false;
  const types = getCompatibleModTypes(w);
  return types.has('Melee') || [...types].some(t =>
    ['Daggers','Dual Daggers','Dual Swords','Swords','Hammers','Fists','Polearms',
     'Scythes','Whips','Claws','Heavy Blade','Blade And Whip','Machetes',
     'Nunchaku','Gunblade','Thrown Melee'].includes(t));
}

function getExilusSet() {
  const w = getCurrentWeapon();
  if (!w) return new Set([...EXILUS_PRIMARY, ...EXILUS_SECONDARY, ...EXILUS_MELEE]);
  const types = getCompatibleModTypes(w);

  let base;
  if (types.has('Melee') || [...types].some(t =>
    ['Daggers','Dual Daggers','Dual Swords','Swords','Hammers','Fists','Polearms',
     'Scythes','Whips','Claws','Heavy Blade','Blade And Whip','Machetes',
     'Nunchaku','Gunblade','Thrown Melee'].includes(t))) {
    base = new Set(EXILUS_MELEE);
  } else if (types.has('Pistol')) {
    base = new Set(EXILUS_SECONDARY);
  } else {
    base = new Set(EXILUS_PRIMARY);
  }

  // Add weapon-specific exilus mods for the selected weapon
  for (const [modName, weapons] of Object.entries(WEAPON_SPECIFIC_EXILUS)) {
    if (weapons.includes(w.name)) base.add(modName);
  }
  return base;
}

}

function renderAlchPicker() {
  const el = document.getElementById('alchemy-picker');
  el.innerHTML = ALCH_PRIMARY.map(e => {
    const color = ELEM_COLORS[e] || '#fff';
    const sel = alchSelected.includes(e);
    return `<button class="alchemy-elem-btn${sel ? ' selected' : ''}"
      style="color:${color};border-color:${sel ? color : 'transparent'};box-shadow:${sel ? `0 0 12px ${color}` : 'none'}"
      onclick="selectAlchElem('${e}')">${e}</button>`;
  }).join('');
}

function selectAlchElem(elem) {
  clearTimeout(_alchMergeTimer);
  if (alchSelected.includes(elem)) {
    alchSelected = alchSelected.filter(e => e !== elem);
  } else if (alchSelected.length < 2) {
    alchSelected.push(elem);
  } else {
    alchSelected[1] = elem;
  }
  renderAlchPicker();
  updateAlchStage();
}

function resetAlchStage() {
  const stage = document.getElementById('alchemy-stage');
  stage.className = 'alchemy-stage';
  ['alchemy-orb-left', 'alchemy-orb-right'].forEach(id => {
    const o = document.getElementById(id);
    o.className = 'alchemy-orb ' + id;
    o.style.background = '';
  });
  document.getElementById('alchemy-flash').className = 'alchemy-result-flash';
  document.getElementById('alchemy-flash').style.background = '';
}

function updateAlchStage() {
  resetAlchStage();
  document.getElementById('alchemy-result').textContent = '';
  document.getElementById('alchemy-mods').innerHTML = '';
  const [a, b] = alchSelected;
  if (a) {
    const lo = document.getElementById('alchemy-orb-left');
    lo.style.background = ELEM_COLORS[a] || '#fff';
    lo.classList.add('visible');
  }
  if (b) {
    const ro = document.getElementById('alchemy-orb-right');
    ro.style.background = ELEM_COLORS[b] || '#fff';
    ro.classList.add('visible');
  }
  if (a && b) {
    document.getElementById('alchemy-stage').classList.add('swirling');
    _alchMergeTimer = setTimeout(() => triggerAlchMerge(a, b), 900);
  }
}

function triggerAlchMerge(a, b) {
  const stage = document.getElementById('alchemy-stage');
  stage.classList.remove('swirling');
  stage.classList.add('merging');
  const key = `${a}+${b}`;
  const result = ELEM_COMBOS[key] || ELEM_COMBOS[`${b}+${a}`] || null;
  const resultColor = result ? (ELEM_COLORS[result.toLowerCase()] || '#fff') : '#aaa';
  setTimeout(() => {
    const flash = document.getElementById('alchemy-flash');
    flash.style.background = resultColor;
    flash.classList.add('pop');
    const resultEl = document.getElementById('alchemy-result');
    resultEl.textContent = result || '(no combination)';
    resultEl.style.color = resultColor;
    showAlchModSuggestions(a, b);
  }, 480);
}

let _alchRelevantMods = [];

function showAlchModSuggestions(a, b) {
  const modsEl = document.getElementById('alchemy-mods');
  const compatible = getCompatibleModTypes(getCurrentWeapon());
  _alchRelevantMods = allMods.filter(m =>
    compatible.has(m.type) &&
    (m.primary_element === a || m.primary_element === b)
  );
  if (!_alchRelevantMods.length) {
    modsEl.innerHTML = '<span style="color:var(--text-dim);font-size:12px">No mods found for current weapon type</span>';
    return;
  }
  const label = '<div class="alchemy-mods-label">Mods that provide these elements</div>';
  const chips = _alchRelevantMods.map(m => {
    const color = ELEM_COLORS[m.primary_element] || '#fff';
    return `<span class="alchemy-mod-chip">${dmgIcon(m.primary_element, 10)}${m.name}</span>`;
  }).join('');
  // Show equip button only if there are empty slots and at least 2 elements selected
  const emptySlots = modSlots.filter(s => !s).length;
  const equipBtn = emptySlots > 0
    ? `<button class="alch-equip-btn" onclick="equipAlchMods()">Equip These Mods</button>`
    : '';
  modsEl.innerHTML = label + chips + equipBtn;
}

function equipAlchMods() {
  const [a, b] = alchSelected;
  if (!a) return;
  const alreadyEquipped = new Set(getSelectedMods());
  const elems = b ? [a, b] : [a];
  for (const elem of elems) {
    const mod = _alchRelevantMods.find(m => m.primary_element === elem && !alreadyEquipped.has(m.name));
    if (!mod) continue;
    const slot = modSlots.indexOf('');
    if (slot < 0) break;
    modSlots[slot] = mod.name;
    alreadyEquipped.add(mod.name);
  }
  renderModCards();
  initSortable();
  updateModdedStats();
  closeAlchemyMixer();
}

// ---------------------------------------------------------------------------
// Riven Builder
// ---------------------------------------------------------------------------
let rivenApplied = null; // [{stat, pct}, ...] — committed
let rivenDraft   = [];   // working copy in modal

function openRivenBuilder() {
  rivenDraft = Array.from({length: 4}, (_, i) =>
    rivenApplied && rivenApplied[i] ? {...rivenApplied[i]} : {stat: '', pct: 0}
  );
  renderRivenRows();
document.getElementById('riven-picker-overlay').classList.add('active');
}

function closeRivenBuilder() {
  document.getElementById('riven-picker-overlay').classList.remove('active');
}

function applyRiven() {
  const valid = rivenDraft.filter(s => s.stat);
  rivenApplied = valid.length ? valid : null;
  closeRivenBuilder();
  if (rivenApplied) {
    const existing = modSlots.indexOf('__riven__');
    if (existing < 0) {
      const empty = modSlots.indexOf('');
      if (empty >= 0) modSlots[empty] = '__riven__';
      else { alert('No empty mod slot — remove a mod first.'); return; }
    }
  } else {
    const idx = modSlots.indexOf('__riven__');
    if (idx >= 0) modSlots[idx] = '';
  }
  renderModCards();
  initSortable();
  updateModdedStats();
}

function clearRiven() {
  rivenDraft = [{stat:'',pct:0},{stat:'',pct:0},{stat:'',pct:0},{stat:'',pct:0}];
  rivenApplied = null;
  const idx = modSlots.indexOf('__riven__');
  if (idx >= 0) modSlots[idx] = '';
  renderRivenRows();
  renderModCards();
  initSortable();
  updateModdedStats();
}

function clearRivenRow(i) {
  rivenDraft[i] = {stat: '', pct: 0};
  renderRivenRows();
}

function onRivenDraftChange(i, field, value) {
  if (field === 'pct') rivenDraft[i].pct = parseFloat(value) || 0;
  else rivenDraft[i].stat = value;
}

function renderRivenRows() {
  const container = document.getElementById('riven-rows');
  container.innerHTML = rivenDraft.map((s, i) => `
    <div class="riven-stat-row${s.stat ? ' has-value' : ''}">
      <select class="riven-stat-select" onchange="onRivenDraftChange(${i},'stat',this.value)">
        ${RIVEN_STAT_OPTIONS.map(o =>
          `<option value="${esc(o.value)}"${o.value===s.stat?' selected':''}>${esc(o.label)}</option>`
        ).join('')}
      </select>
      <input type="number" class="riven-stat-input" step="0.1" value="${s.pct || ''}"
        placeholder="0" min="-999" max="9999"
        onchange="onRivenDraftChange(${i},'pct',this.value)"
        oninput="if(this.value.length>4)this.value=this.value.slice(0,4);onRivenDraftChange(${i},'pct',this.value)">
      <button class="riven-row-clear" onclick="clearRivenRow(${i})" title="Clear row">×</button>
    </div>
  `).join('');
}

function clearRivenRow(i) {
  rivenDraft[i] = { stat: '', pct: 0 };
  renderRivenRows();
}


function getRivenSpec() {
  if (!rivenApplied || !rivenApplied.length) return null;
  const stats = rivenApplied.filter(s => s.stat).map(s => ({stat: s.stat, value: s.pct / 100}));
  return stats.length ? {stats} : null;
}

// Close riven modal on backdrop click
document.addEventListener('click', e => {
  const riven = document.getElementById('riven-picker-overlay');
  if (riven && riven.classList.contains('active') && e.target === riven)
    closeRivenBuilder();
  const alch = document.getElementById('alchemy-mixer-overlay');
  if (alch && alch.classList.contains('active') && e.target === alch)
    closeAlchemyMixer();
});

// ---------------------------------------------------------------------------
// Warframe Buffs
// ---------------------------------------------------------------------------
const BUFF_OPTIONS = [
  {key:'roar',          label:'Roar (Rhino)'},
  {key:'eclipse',       label:'Eclipse (Mirage)'},
  {key:'xatas_whisper', label:"Xata's Whisper (Xaku)"},
  {key:'nourish',       label:'Nourish (Grendel)'},
];
let buffRowId = 0;

function addBuffRow() {
  const container = document.getElementById('buff-rows');
  const id = buffRowId++;
  const row = document.createElement('div');
  row.id = 'buff-row-' + id;
  row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap';
  const opts = BUFF_OPTIONS.map(o => `<option value="${o.key}">${o.label}</option>`).join('');
  row.innerHTML = `<select style="flex:1;min-width:140px">${opts}</select>`
    + `<label style="font-size:12px;color:#aaa">Str%</label>`
    + `<input type="number" value="100" min="1" max="999" style="width:56px" title="Ability Strength %">`
    + `<label style="font-size:11px;color:#b89d65;cursor:pointer;display:flex;align-items:center;gap:3px" title="Use Helminth (subsumed) reduced base values">`
    + `<input type="checkbox" class="buff-subsumed" style="accent-color:#b89d65"> Helminth</label>`
    + `<button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:#c44;cursor:pointer;font-size:16px" title="Remove buff">&times;</button>`;
  container.appendChild(row);
}

function getActiveBuffs() {
  const rows = document.querySelectorAll('#buff-rows > div');
  const buffs = [];
  rows.forEach(row => {
    const sel = row.querySelector('select');
    const inp = row.querySelector('input[type="number"]');
    const sub = row.querySelector('.buff-subsumed');
    if (sel && inp) {
      const b = {name: sel.value, strength: (parseFloat(inp.value) || 100) / 100};
      if (sub && sub.checked) b.subsumed = true;
      buffs.push(b);
    }
  });
  return buffs;
}

// ---------------------------------------------------------------------------
// Calculate
// ---------------------------------------------------------------------------
async function runCalculation() {
  const weapon = document.getElementById('weapon-search').value;
  const enemy  = document.getElementById('enemy-search').value;
  const mods   = getSelectedMods();
  const critMode    = document.getElementById('crit-mode').value;
  const bodyPart    = document.getElementById('body-part-select').value || 'Body';
  const viralStacks     = parseInt(document.getElementById('viral-stacks').value, 10) || 0;
  const corrosiveStacks = parseInt(document.getElementById('corrosive-stacks').value, 10) || 0;
  const comboTier       = Math.max(1, parseInt(document.getElementById('combo-counter').value, 10) || 1);
  const comboCounter    = (comboTier - 1) * 10; // tier → raw hits: tier=1→0 (×1), tier=12→110 (×12)
  const uniqueStatuses  = parseInt(document.getElementById('unique-statuses').value, 10) || 0;
  const galvStacks      = parseInt(document.getElementById('galv-stacks').value, 10) || 0;

  if (!weapon || !enemy) {
    showError('Please select a weapon and enemy.');
    return;
  }

  const btn = document.getElementById('calc-btn');
  btn.disabled = true;
  btn.textContent = 'Calculating…';

  try {
    const resp = await fetch('/api/calculate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({weapon, mods, enemy, crit_mode: critMode, body_part: bodyPart, viral_stacks: viralStacks, corrosive_stacks: corrosiveStacks, combo_counter: comboCounter, unique_statuses: uniqueStatuses, galvanized_stacks: galvStacks, attack: selectedAttack, riven: getRivenSpec(), enemy_level: parseInt(document.getElementById('enemy-level').value) || 1, steel_path: steelPathOn, eximus: eximusOn, buffs: getActiveBuffs(), ...getBonusElement()}),
    });
    const data = await resp.json();
    if (!resp.ok) {
      showError(data.detail || 'Calculation failed.');
    } else {
      showResults(data);
    }
  } catch(e) {
    showError('Network error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Calculate';
  }
}

function showError(msg) {
  document.getElementById('no-results').style.display = 'none';
  document.getElementById('results-content').style.display = 'none';
  let errDiv = document.getElementById('error-msg');
  if (!errDiv) {
    errDiv = document.createElement('div');
    errDiv.id = 'error-msg';
    errDiv.className = 'error-msg';
    document.getElementById('results-panel').appendChild(errDiv);
  }
  errDiv.textContent = msg;
  errDiv.style.display = 'block';
}

function showResults(data) {
  const errDiv = document.getElementById('error-msg');
  if (errDiv) errDiv.style.display = 'none';
  document.getElementById('no-results').style.display = 'none';

  const breakdown = data.breakdown;
  const entries = Object.entries(breakdown).sort((a,b) => b[1] - a[1]);
  const maxVal = entries.length ? entries[0][1] : 1;

  const meta = [
    `Weapon: ${data.weapon}`,
    `Mods: ${data.mods.length ? data.mods.join(', ') : '(none)'}`,
    `Enemy: ${data.enemy}`,
    `Crit: ${data.crit_mode} — ×${data.crit_multiplier.toFixed(3)}${data.body_part && data.body_part !== 'Body' ? ` (${data.body_part})` : ''}`,
    data.viral_stacks > 0 ? `Viral: ${data.viral_stacks} stacks (×${[1.75,2,2.25,2.5,2.75,3,3.25,3.5,3.75,4.25][data.viral_stacks-1]})` : null,
    data.corrosive_stacks > 0 ? `Corrosive: ${data.corrosive_stacks} stacks (−${Math.min(80, 20 + 6*data.corrosive_stacks)}% armor)` : null,
    data.galvanized_stacks > 0 ? `Galv. Stacks: ${data.galvanized_stacks}` : null,
    data.buffs && data.buffs.length > 0 ? `Buffs: ${data.buffs.map(b => b.name + (b.strength !== 1 ? ` (${Math.round(b.strength*100)}%)` : '')).join(', ')}` : null,
  ].filter(Boolean).join(' &nbsp;|&nbsp; ');

  const _effEnemy = getCurrentEnemy();
  const _factionMap = _effEnemy ? (FACTION_EFFECTIVENESS[_effEnemy.faction.toLowerCase()] || {}) : {};

  const rows = entries.map(([type, val]) => {
    const pct = maxVal > 0 ? (val / maxVal * 100).toFixed(1) : 0;
    const key  = type.toLowerCase();
    const color = ELEM_COLORS[key] || 'var(--accent)';
    const dot = dmgIcon(key);
    const ttAttr = TOOLTIPS[key] ? ` data-tooltip="${key}"` : '';
    const eff = _factionMap[key];
    const effBadge = eff === 1.5 ? '<span class="eff-badge eff-vuln">+50%</span>'
                   : eff === 0.5 ? '<span class="eff-badge eff-res">−50%</span>'
                   : '';
    return `<tr>
      <td${ttAttr}>${dot}${type}${effBadge}</td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div></td>
      <td>${val.toFixed(2)}</td>
    </tr>`;
  }).join('');

  const ms = _currentMultishot;
  const msNote = ms > 1.0001
    ? `<span class="ms-note">Per-trigger damage (includes ×${ms.toFixed(2)} multishot)</span>`
    : '';

  // Status procs section
  const PROC_LABELS = { slash: 'Slash (Bleed)', heat: 'Heat (Burn)', gas: 'Gas (Cloud)', toxin: 'Toxin (Poison)', electricity: 'Electricity (Arc)' };
  const PROC_COLORS = { slash: ELEM_COLORS.slash, heat: ELEM_COLORS.heat, gas: ELEM_COLORS.gas, toxin: ELEM_COLORS.toxin, electricity: ELEM_COLORS.electricity };
  const CC_PROC_LABELS = { viral: 'Viral Health Vulnr.', magnetic: 'Magnetic (Shield)', radiation: 'Radiation (Confuse)', blast: 'Blast (Accuracy)', cold: 'Cold (Freeze)' };
  const CC_PROC_COLORS = { viral: ELEM_COLORS.viral, magnetic: ELEM_COLORS.magnetic, radiation: ELEM_COLORS.radiation, blast: ELEM_COLORS.blast, cold: ELEM_COLORS.cold };
  let procsHtml = '';
  if (data.procs) {
    const activeDot = Object.entries(data.procs).filter(([k, p]) => p.active && k in PROC_LABELS);
    const activeCc  = Object.entries(data.procs).filter(([k, p]) => p.active && k in CC_PROC_LABELS);
    if (activeDot.length) {
      const procRows = activeDot.map(([key, p]) => {
        const color = PROC_COLORS[key] || 'var(--accent)';
        const dot = dmgIcon(key);
        return `<tr>
          <td>${dot}${PROC_LABELS[key] || key}</td>
          <td>${p.damage_per_tick.toFixed(2)} × ${p.ticks} ticks</td>
          <td>${p.total_damage.toFixed(2)}</td>
        </tr>`;
      }).join('');
      procsHtml += `
        <h4 style="margin:12px 0 6px;color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em">Status Procs (if triggered)</h4>
        <table class="breakdown-table">
          <thead><tr><th>Proc</th><th>Per Tick</th><th>Total (6 ticks)</th></tr></thead>
          <tbody>${procRows}</tbody>
        </table>`;
    }
    if (activeCc.length) {
      const ccRows = activeCc.map(([key, p]) => {
        const color = CC_PROC_COLORS[key] || 'var(--accent)';
        const dot = dmgIcon(key);
        return `<tr>
          <td>${dot}${CC_PROC_LABELS[key] || key}</td>
          <td colspan="2" style="color:var(--text-muted);font-size:0.85em">${p.effect}</td>
        </tr>`;
      }).join('');
      procsHtml += `
        <h4 style="margin:12px 0 6px;color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em">CC / Debuff Procs (if triggered)</h4>
        <table class="breakdown-table">
          <thead><tr><th>Proc</th><th colspan="2">Effect</th></tr></thead>
          <tbody>${ccRows}</tbody>
        </table>`;
    }
  }

  // DPS section
  let dpsHtml = '';
  if (data.fire_rate != null) {
    const fr  = data.fire_rate;
    const mag = data.magazine;
    const rel = data.reload;
    const ms  = data.modded_ms || 1.0;
    const sc  = data.modded_sc || 0.0;

    const burstDps     = data.total * fr;
    const sustainedDps = (rel > 0 && mag > 1)
      ? data.total * mag / (mag / fr + rel)
      : null;

    const inherentMs = data.inherent_multishot || 1;
    const scPerPellet = data.sc_per_pellet || sc;
    const totalProjectiles = inherentMs * ms;
    const procsPerSec = scPerPellet * totalProjectiles * fr;
    let procDpsRows = '';
    let totalProcDps = 0;
    if (data.procs) {
      for (const [key, p] of Object.entries(data.procs)) {
        if (!p.active || procsPerSec <= 0 || !(key in PROC_LABELS)) continue;
        const pdps = p.damage_per_tick * procsPerSec;
        totalProcDps += pdps;
        const label = PROC_LABELS[key] || key;
        const color = ELEM_COLORS[key] || 'var(--accent)';
        const dot   = dmgIcon(key);
        procDpsRows += `<tr><td>${dot}${label} DPS</td><td></td><td>${fmtNum(pdps)}</td></tr>`;
      }
    }

    const scPct = (sc * 100).toFixed(1);
    const pelletNote = inherentMs > 1 ? ` (${(scPerPellet*100).toFixed(1)}%/pellet \u00d7${totalProjectiles.toFixed(1)})` : '';
    const footnote = procsPerSec > 0
      ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">Proc DPS is steady-state average @ ${scPct}% status chance${pelletNote}</div>`
      : '';

    dpsHtml = `
      <h4 style="margin:12px 0 6px;color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em">DPS</h4>
      <table class="breakdown-table">
        <thead><tr><th>Metric</th><th></th><th>DPS</th></tr></thead>
        <tbody>
          <tr><td>Burst DPS</td><td style="font-size:0.75rem;color:var(--text-muted)">${ms > 1.0001 ? `×${ms.toFixed(2)} multishot × ` : ''}${fr}/s</td><td>${fmtNum(burstDps)}</td></tr>
          ${sustainedDps != null ? `<tr><td>Sustained DPS</td><td style="font-size:0.75rem;color:var(--text-muted)">${rel}s reload / ${mag} mag</td><td>${fmtNum(sustainedDps)}</td></tr>` : ''}
          ${procDpsRows}
        </tbody>
        ${totalProcDps > 0 ? `<tfoot class="total-row"><tr><td colspan="2">TOTAL w/ procs</td><td>${fmtNum(burstDps + totalProcDps)}</td></tr></tfoot>` : ''}
      </table>
      ${footnote}`;
  }

  document.getElementById('results-content').innerHTML = `
    <div class="result-header">
      <h3>${esc(data.weapon)} vs ${esc(data.enemy)}</h3>
      <div class="result-total">${data.total.toFixed(2)} <span>total damage</span></div>
    </div>
    <div class="result-meta">${meta}</div>
    <table class="breakdown-table">
      <thead><tr><th>Type</th><th>Bar</th><th>Damage</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot class="total-row">
        <tr><td colspan="2">TOTAL</td><td>${data.total.toFixed(2)}</td></tr>
      </tfoot>
    </table>
    ${msNote}
    ${procsHtml}
    ${dpsHtml}
  `;
  document.getElementById('results-content').style.display = 'block';
  initTooltips();
}
