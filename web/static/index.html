<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warframe Damage Calculator</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --accent: #c49a1f;
      --accent2: #e8b923;
      --text: #e0e0e0;
      --text-dim: #888;
      --good: #4caf50;
      --bad: #f44336;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 18px;
      color: var(--accent2);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }
    .panel h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    label { display: block; margin-bottom: 4px; color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    select, input[type=text] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }
    select:focus, input[type=text]:focus { border-color: var(--accent); }

    /* Fixed 8-slot mod grid */
    .mods-list { margin-bottom: 4px; }
    .mod-slot {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .mod-slot select { margin-bottom: 0; flex: 1; }
    .mod-slot button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      flex-shrink: 0;
    }
    .mod-slot button:hover { border-color: var(--bad); color: var(--bad); }

    .options-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .options-row > div { flex: 1; }
    .btn-calc {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .btn-calc:hover { background: var(--accent2); }
    .btn-calc:disabled { background: var(--border); color: var(--text-dim); cursor: default; }

    /* Right column */
    .right-col { display: flex; flex-direction: column; gap: 16px; }

    /* Weapon stats panel */
    .weapon-stats-img-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .weapon-stats-img-row img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
    }
    .weapon-stats-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .weapon-stats-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

    .stat-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .stat-row { display: flex; gap: 8px; }
    .stat-block {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      min-width: 0;
    }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 3px; }
    .stat-value { font-size: 15px; font-weight: 600; color: var(--text); }
    .stat-value.crit { color: #f0a030; }
    .stat-value.status { color: #60b0e0; }
    .stat-modded {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent2);
      margin-top: 2px;
    }
    .stat-modded::before { content: '▶ '; font-size: 9px; opacity: 0.7; }

    /* Results */
    .no-results {
      color: var(--text-dim);
      text-align: center;
      padding: 60px 0;
      font-size: 13px;
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .result-header h3 { font-size: 15px; color: var(--accent2); }
    .result-total { font-size: 22px; font-weight: 700; color: var(--text); }
    .result-total span { font-size: 12px; color: var(--text-dim); margin-left: 4px; }
    .result-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 16px;
      line-height: 1.8;
    }
    .breakdown-table {
      width: 100%;
      border-collapse: collapse;
    }
    .breakdown-table th, .breakdown-table td {
      padding: 7px 10px;
      text-align: left;
      font-size: 13px;
    }
    .breakdown-table th {
      color: var(--text-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    .breakdown-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
    .breakdown-table tr:hover td { background: var(--surface2); }
    .bar-cell { width: 180px; }
    .bar-bg { background: var(--surface2); border-radius: 2px; height: 8px; }
    .bar-fill { background: var(--accent); height: 8px; border-radius: 2px; }
    .total-row td { border-top: 1px solid var(--border); font-weight: 700; }
    .error-msg {
      background: #2a1010;
      border: 1px solid #5a2020;
      border-radius: 4px;
      padding: 12px;
      color: #e07070;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 8px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }

    /* Damage table modded column */
    .col-modded { color: var(--accent2); font-weight: 600; }
    .col-base { color: var(--text-dim); }
    .elem-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        padding: 12px;
        gap: 12px;
      }
      .stat-row { flex-wrap: wrap; }
      .stat-block { min-width: 80px; }
      .bar-cell { width: 80px; }
      .result-header { flex-direction: column; gap: 6px; }
      .result-total { font-size: 18px; }
      .options-row { flex-direction: column; }
      header { padding: 10px 16px; }
      header h1 { font-size: 15px; }
    }
    @media (max-width: 480px) {
      .breakdown-table .bar-cell { display: none; }
      .weapon-stats-img-row img { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
<header>
  <h1>Warframe Damage Calculator</h1>
</header>

<div class="container">
  <div>
    <!-- Weapon -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Weapon</h2>
      <input type="text" id="weapon-search" class="search-input" placeholder="Search weapon…">
      <label for="weapon-select">Weapon</label>
      <select id="weapon-select" size="1"></select>
    </div>

    <!-- Mods — fixed 8 slots -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Mods (in slot order)</h2>
      <div id="mods-list" class="mods-list"></div>
    </div>

    <!-- Enemy -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Enemy</h2>
      <input type="text" id="enemy-search" class="search-input" placeholder="Search enemy…">
      <label for="enemy-select">Enemy</label>
      <select id="enemy-select" size="1"></select>
    </div>

    <!-- Hit Options -->
    <div class="panel" style="margin-bottom:16px">
      <h2>Hit Options</h2>
      <div class="options-row">
        <div>
          <label for="crit-mode">Hit Type</label>
          <select id="crit-mode">
            <option value="average">Average (Expected)</option>
            <option value="guaranteed">Guaranteed Crit</option>
            <option value="max">Maximum Crit</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:18px">
          <input type="checkbox" id="headshot-cb" style="width:auto;margin:0">
          <label for="headshot-cb" style="margin:0;cursor:pointer">Headshot</label>
        </div>
      </div>
    </div>

    <button class="btn-calc" id="calc-btn" onclick="runCalculation()">Calculate</button>
  </div>

  <!-- Right column -->
  <div class="right-col">

    <!-- Weapon Stats -->
    <div class="panel" id="weapon-stats-panel" style="display:none">
      <h2>Weapon Stats</h2>
      <div id="weapon-stats-content"></div>
    </div>

    <!-- Enemy Stats -->
    <div class="panel" id="enemy-stats-panel" style="display:none">
      <h2>Enemy Stats</h2>
      <div id="enemy-stats-content"></div>
    </div>

    <!-- Results -->
    <div class="panel results-panel" id="results-panel">
      <h2>Results</h2>
      <div class="no-results" id="no-results">Select a weapon and enemy, then click Calculate.</div>
      <div id="results-content" style="display:none"></div>
    </div>

  </div>
</div>

<script>
let allWeapons = [];
let allMods = [];
let allEnemies = [];

// Warframe element colours
const ELEM_COLORS = {
  impact:      '#9090b0',
  puncture:    '#d0c080',
  slash:       '#e05050',
  heat:        '#ff7a30',
  cold:        '#60b0e0',
  electricity: '#f0e040',
  toxin:       '#60d030',
  blast:       '#ffd040',
  corrosive:   '#a0e040',
  gas:         '#c0e040',
  magnetic:    '#c060f0',
  radiation:   '#f0a020',
  viral:       '#f060a0',
  true:        '#ffffff',
  void:        '#9060ff',
};

async function loadData() {
  [allWeapons, allMods, allEnemies] = await Promise.all([
    fetch('/api/weapons').then(r => r.json()),
    fetch('/api/mods').then(r => r.json()),
    fetch('/api/enemies').then(r => r.json()),
  ]);
  populateSelect('weapon-select', allWeapons.map(w => w.name));
  populateSelect('enemy-select', allEnemies.map(e => e.name));

  document.getElementById('weapon-select').addEventListener('change', onWeaponChange);
  document.getElementById('enemy-select').addEventListener('change', () => showEnemyStats(getCurrentEnemy()));

  initModGrid();

  // Default selections for quick testing
  setSelectValue('weapon-select', 'Soma Prime');
  setSelectValue('enemy-select', 'Heavy Gunner');
  onWeaponChange();
  showEnemyStats(getCurrentEnemy());
}

function getCurrentWeapon() {
  const name = document.getElementById('weapon-select').value;
  return allWeapons.find(x => x.name === name) || null;
}

function getCurrentEnemy() {
  const name = document.getElementById('enemy-select').value;
  return allEnemies.find(x => x.name === name) || null;
}

// ---------------------------------------------------------------------------
// Fixed 8-slot mod grid
// ---------------------------------------------------------------------------
function initModGrid() {
  const list = document.getElementById('mods-list');
  list.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const div = document.createElement('div');
    div.className = 'mod-slot';

    const sel = document.createElement('select');
    sel.innerHTML = '<option value="">(empty)</option>';
    sel.addEventListener('change', () => {
      refreshModDropdowns();
      updateModdedStats();
    });

    const btn = document.createElement('button');
    btn.textContent = '✕';
    btn.title = 'Clear slot';
    btn.onclick = () => {
      sel.value = '';
      refreshModDropdowns();
      updateModdedStats();
    };

    div.appendChild(sel);
    div.appendChild(btn);
    list.appendChild(div);
  }
}

// Returns the set of mod types compatible with the given weapon
function getCompatibleModTypes(weapon) {
  if (!weapon) return new Set();
  const slot = weapon.slot || '';
  const cls  = weapon.class || '';
  const types = new Set([weapon.name]); // always include weapon-specific mods

  if (slot === 'Primary') {
    types.add('Primary');
    if (cls === 'Shotgun') {
      types.add('Shotgun');
    } else if (cls === 'Sniper Rifle') {
      types.add('Rifle');
      types.add('Sniper');
    } else if (cls === 'Bow' || cls === 'Crossbow') {
      types.add('Rifle');
      types.add('Bow');
    } else {
      types.add('Rifle');
      types.add('Assault Rifle');
    }
  } else if (slot === 'Secondary') {
    types.add('Pistol');
  } else if (slot === 'Melee') {
    types.add('Melee');
    const classMap = {
      'Dagger':           'Daggers',
      'Dual Daggers':     'Dual Daggers',
      'Sword':            'Swords',
      'Dual Swords':      'Dual Swords',
      'Nikana':           'Nikanas',
      'Dual Nikanas':     'Dual Nikanas',
      'Two-Handed Nikana':'Two-Handed Nikana',
      'Heavy Blade':      'Heavy Blade',
      'Hammer':           'Hammers',
      'Polearm':          'Polearms',
      'Staff':            'Staves',
      'Whip':             'Whips',
      'Blade and Whip':   'Blade And Whip',
      'Glaive':           'Glaives',
      'Claws':            'Claws',
      'Tonfa':            'Tonfas',
      'Scythe':           'Scythes',
      'Heavy Scythe':     'Heavy Scythe',
      'Rapier':           'Rapiers',
      'Sword and Shield': 'Sword And Shield',
      'Machete':          'Machetes',
      'Sparring':         'Sparring',
      'Fist':             'Fists',
      'Nunchaku':         'Nunchaku',
      'Warfan':           'Warfans',
      'Gunblade':         'Gunblade',
    };
    if (classMap[cls]) types.add(classMap[cls]);
  }
  return types;
}

function buildModOptions(compatibleTypes) {
  const filtered = compatibleTypes
    ? allMods.filter(m => compatibleTypes.has(m.type))
    : allMods;
  return '<option value="">(empty)</option>' +
    filtered.map(m => `<option value="${esc(m.name)}">${esc(m.name)}</option>`).join('');
}

// Rebuild all existing mod slot dropdowns to match the new weapon
function refreshModDropdowns() {
  const weapon = getCurrentWeapon();
  const types = getCompatibleModTypes(weapon);
  document.querySelectorAll('#mods-list select').forEach(sel => {
    const current = sel.value;
    sel.innerHTML = buildModOptions(weapon ? types : null);
    if (current && Array.from(sel.options).some(o => o.value === current)) {
      sel.value = current;
    }
  });
}

function onWeaponChange() {
  refreshModDropdowns();
  showWeaponStats(getCurrentWeapon());
  updateModdedStats();
}

// ---------------------------------------------------------------------------
// Weapon stats panel — base stats
// ---------------------------------------------------------------------------
function showWeaponStats(weapon) {
  const panel = document.getElementById('weapon-stats-panel');
  if (!weapon) { panel.style.display = 'none'; return; }

  const pct = v => (v * 100).toFixed(1) + '%';
  const fmt = (v, suffix) => v != null ? v + (suffix || '') : '—';
  const sub = [weapon.slot, weapon.class, weapon.trigger].filter(Boolean).join(' · ');

  const imgHtml = weapon.image
    ? `<div class="weapon-stats-img-row" id="weapon-img-row">
        <img src="/static/images/weapons/${esc(weapon.image)}" alt=""
             onerror="document.getElementById('weapon-img-row').style.display='none'">
        <div>
          <div class="weapon-stats-name">${esc(weapon.name)}</div>
          <div class="weapon-stats-sub">${esc(sub)}</div>
        </div>
       </div>`
    : `<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
        <div class="weapon-stats-name">${esc(weapon.name)}</div>
        <div class="weapon-stats-sub">${esc(sub)}</div>
       </div>`;

  document.getElementById('weapon-stats-content').innerHTML = `
    ${imgHtml}
    <div class="stat-rows">
      <div class="stat-row">
        <div class="stat-block">
          <div class="stat-label">Crit Chance</div>
          <div class="stat-value crit" id="sv-cc">${pct(weapon.crit_chance || 0)}</div>
          <div class="stat-modded" id="sm-cc" style="display:none"></div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Crit Mult</div>
          <div class="stat-value crit" id="sv-cm">${fmt(weapon.crit_multiplier, 'x')}</div>
          <div class="stat-modded" id="sm-cm" style="display:none"></div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Status</div>
          <div class="stat-value status" id="sv-sc">${pct(weapon.status_chance || 0)}</div>
          <div class="stat-modded" id="sm-sc" style="display:none"></div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-block">
          <div class="stat-label">Fire Rate</div>
          <div class="stat-value">${fmt(weapon.fire_rate)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Magazine</div>
          <div class="stat-value">${fmt(weapon.magazine)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Reload</div>
          <div class="stat-value">${fmt(weapon.reload, 's')}</div>
        </div>
      </div>
    </div>
    <div id="damage-table-wrap"></div>
  `;

  renderDamageTable(weapon.base_damage, null);
  panel.style.display = 'block';
}

function renderDamageTable(baseDmg, moddedData) {
  const wrap = document.getElementById('damage-table-wrap');
  if (!wrap) return;

  const hasModded = moddedData && Object.keys(moddedData.modded_damage || {}).length > 0;

  // Merge all damage types: base IPS + modded elementals
  const allTypes = new Set([
    ...Object.keys(baseDmg),
    ...(hasModded ? Object.keys(moddedData.modded_damage) : []),
  ]);

  const baseTotal = Object.values(baseDmg).reduce((s, v) => s + v, 0);
  const moddedTotal = hasModded ? moddedData.modded_total : null;

  const headerModded = hasModded
    ? `<th style="text-align:right" class="col-modded">Modded</th>`
    : '';

  const rows = Array.from(allTypes).map(type => {
    const baseVal = baseDmg[type];
    const modVal  = hasModded ? moddedData.modded_damage[type] : null;
    const color   = ELEM_COLORS[type] || 'var(--text)';
    const dot     = `<span class="elem-dot" style="background:${color}"></span>`;
    const label   = type.charAt(0).toUpperCase() + type.slice(1);

    const baseCell = baseVal != null
      ? `<td class="col-base" style="text-align:right">${baseVal.toFixed(1)}</td>`
      : `<td class="col-base" style="text-align:right;color:var(--border)">—</td>`;

    const moddedCell = hasModded
      ? `<td class="col-modded" style="text-align:right">${modVal != null ? modVal.toFixed(1) : '—'}</td>`
      : '';

    return `<tr>
      <td>${dot}${label}</td>
      ${baseCell}
      ${moddedCell}
    </tr>`;
  }).join('');

  const moddedTotalCell = hasModded
    ? `<td style="text-align:right" class="col-modded">${moddedTotal.toFixed(1)}</td>`
    : '';

  wrap.innerHTML = `
    <table class="breakdown-table">
      <thead>
        <tr>
          <th>Damage Type</th>
          <th style="text-align:right">Base</th>
          ${headerModded}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot class="total-row">
        <tr>
          <td>Total</td>
          <td style="text-align:right">${baseTotal.toFixed(1)}</td>
          ${moddedTotalCell}
        </tr>
      </tfoot>
    </table>
  `;
}

// ---------------------------------------------------------------------------
// Live modded stats update
// ---------------------------------------------------------------------------
let _modUpdateTimer = null;

function updateModdedStats() {
  clearTimeout(_modUpdateTimer);
  _modUpdateTimer = setTimeout(_doUpdateModdedStats, 120);
}

async function _doUpdateModdedStats() {
  const weapon = getCurrentWeapon();
  if (!weapon) return;

  const mods = Array.from(document.querySelectorAll('#mods-list select'))
    .map(s => s.value).filter(Boolean);

  try {
    const resp = await fetch('/api/modded-weapon', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ weapon: weapon.name, mods }),
    });
    if (!resp.ok) return;
    const data = await resp.json();

    // Update damage table
    renderDamageTable(weapon.base_damage, mods.length > 0 ? data : null);

    // Update crit/status stat blocks
    const hasMods = mods.length > 0;
    const pct = v => (v * 100).toFixed(1) + '%';

    const smCC = document.getElementById('sm-cc');
    const smCM = document.getElementById('sm-cm');
    const smSC = document.getElementById('sm-sc');

    if (smCC) {
      if (hasMods && Math.abs(data.modded_cc - data.base_cc) > 0.0001) {
        smCC.textContent = pct(data.modded_cc);
        smCC.style.display = 'block';
      } else {
        smCC.style.display = 'none';
      }
    }
    if (smCM) {
      if (hasMods && Math.abs(data.modded_cm - data.base_cm) > 0.0001) {
        smCM.textContent = data.modded_cm.toFixed(2) + 'x';
        smCM.style.display = 'block';
      } else {
        smCM.style.display = 'none';
      }
    }
    if (smSC) {
      if (hasMods && Math.abs(data.modded_sc - data.base_sc) > 0.0001) {
        smSC.textContent = pct(data.modded_sc);
        smSC.style.display = 'block';
      } else {
        smSC.style.display = 'none';
      }
    }
  } catch(e) {
    // silent — non-critical
  }
}

// ---------------------------------------------------------------------------
// Enemy stats panel
// ---------------------------------------------------------------------------
function showEnemyStats(enemy) {
  const panel = document.getElementById('enemy-stats-panel');
  if (!enemy) { panel.style.display = 'none'; return; }

  const fmt = (v, suffix) => v != null && v !== 0 ? v + (suffix || '') : '—';
  // Handles underscore-separated strings like "infested_flesh" → "Infested Flesh"
  const cap = s => s ? s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : '—';

  const headRow = enemy.head_multiplier && enemy.head_multiplier !== 1
    ? `<div class="stat-row">
        <div class="stat-block" style="flex:2">
          <div class="stat-label">Head Multiplier</div>
          <div class="stat-value">${enemy.head_multiplier}×</div>
        </div>
       </div>`
    : '';

  document.getElementById('enemy-stats-content').innerHTML = `
    <div style="margin-bottom:10px">
      <div style="font-size:15px;font-weight:600;color:var(--text)">${esc(enemy.name)}</div>
    </div>
    <div class="stat-rows">
      <div class="stat-row">
        <div class="stat-block">
          <div class="stat-label">Faction</div>
          <div class="stat-value">${cap(enemy.faction)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Health Type</div>
          <div class="stat-value">${cap(enemy.health_type)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Armor Type</div>
          <div class="stat-value">${cap(enemy.armor_type)}</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-block">
          <div class="stat-label">Base Health</div>
          <div class="stat-value">${fmt(enemy.base_health)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Base Shield</div>
          <div class="stat-value">${fmt(enemy.base_shield)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Base Armor</div>
          <div class="stat-value">${fmt(enemy.base_armor)}</div>
        </div>
      </div>
      ${headRow}
    </div>
  `;
  panel.style.display = 'block';
}

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function populateSelect(id, names) {
  const sel = document.getElementById(id);
  sel.innerHTML = names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
}

function setSelectValue(id, value) {
  const sel = document.getElementById(id);
  for (const opt of sel.options) {
    if (opt.value === value) { sel.value = value; return; }
  }
}

function setSelectByText(sel, text) {
  for (const opt of sel.options) {
    if (opt.value === text) { sel.value = text; return; }
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Search/filter selects
document.addEventListener('DOMContentLoaded', () => {
  setupSearch('weapon-search', 'weapon-select', () => allWeapons.map(w => w.name), onWeaponChange);
  setupSearch('enemy-search', 'enemy-select', () => allEnemies.map(e => e.name), () => showEnemyStats(getCurrentEnemy()));
  loadData();
});

function setupSearch(inputId, selectId, getNames, onChange) {
  document.getElementById(inputId).addEventListener('input', function() {
    const q = this.value.toLowerCase();
    const names = getNames().filter(n => n.toLowerCase().includes(q));
    populateSelect(selectId, names);
    if (onChange) onChange();
  });
}

// ---------------------------------------------------------------------------
// Calculate
// ---------------------------------------------------------------------------
async function runCalculation() {
  const weapon = document.getElementById('weapon-select').value;
  const enemy  = document.getElementById('enemy-select').value;
  const mods   = Array.from(document.querySelectorAll('#mods-list select'))
                   .map(s => s.value).filter(Boolean);
  const critMode = document.getElementById('crit-mode').value;
  const headshot = document.getElementById('headshot-cb').checked;

  if (!weapon || !enemy) {
    showError('Please select a weapon and enemy.');
    return;
  }

  const btn = document.getElementById('calc-btn');
  btn.disabled = true;
  btn.textContent = 'Calculating…';

  try {
    const resp = await fetch('/api/calculate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({weapon, mods, enemy, crit_mode: critMode, headshot}),
    });
    const data = await resp.json();
    if (!resp.ok) {
      showError(data.detail || 'Calculation failed.');
    } else {
      showResults(data);
    }
  } catch(e) {
    showError('Network error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Calculate';
  }
}

function showError(msg) {
  document.getElementById('no-results').style.display = 'none';
  document.getElementById('results-content').style.display = 'none';
  let errDiv = document.getElementById('error-msg');
  if (!errDiv) {
    errDiv = document.createElement('div');
    errDiv.id = 'error-msg';
    errDiv.className = 'error-msg';
    document.getElementById('results-panel').appendChild(errDiv);
  }
  errDiv.textContent = msg;
  errDiv.style.display = 'block';
}

function showResults(data) {
  const errDiv = document.getElementById('error-msg');
  if (errDiv) errDiv.style.display = 'none';
  document.getElementById('no-results').style.display = 'none';

  const breakdown = data.breakdown;
  const entries = Object.entries(breakdown).sort((a,b) => b[1] - a[1]);
  const maxVal = entries.length ? entries[0][1] : 1;

  const meta = [
    `Weapon: ${data.weapon}`,
    `Mods: ${data.mods.length ? data.mods.join(', ') : '(none)'}`,
    `Enemy: ${data.enemy}`,
    `Crit: ${data.crit_mode} — ×${data.crit_multiplier.toFixed(3)}${data.headshot ? ' (headshot)' : ''}`,
  ].join(' &nbsp;|&nbsp; ');

  const rows = entries.map(([type, val]) => {
    const pct = maxVal > 0 ? (val / maxVal * 100).toFixed(1) : 0;
    const color = ELEM_COLORS[type.toLowerCase()] || 'var(--accent)';
    const dot = `<span class="elem-dot" style="background:${color}"></span>`;
    return `<tr>
      <td>${dot}${type}</td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div></td>
      <td>${val.toFixed(2)}</td>
    </tr>`;
  }).join('');

  document.getElementById('results-content').innerHTML = `
    <div class="result-header">
      <h3>${esc(data.weapon)} vs ${esc(data.enemy)}</h3>
      <div class="result-total">${data.total.toFixed(2)} <span>total damage</span></div>
    </div>
    <div class="result-meta">${meta}</div>
    <table class="breakdown-table">
      <thead><tr><th>Type</th><th>Bar</th><th>Damage</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot class="total-row">
        <tr><td colspan="2">TOTAL</td><td>${data.total.toFixed(2)}</td></tr>
      </tfoot>
    </table>
  `;
  document.getElementById('results-content').style.display = 'block';
}
</script>
