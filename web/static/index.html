<body>

<main class="main">

<aside class="sidebar" id="sidebar">

        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="3"/><path d="M10 2 L10 5 M10 15 L10 18 M2 10 L5 10 M15 10 L18 10"/></svg>

        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">

          <line x1="10" y1="8" x2="10" y2="12"/><line x1="8" y1="10" x2="12" y2="10"/>

        <svg viewBox="0 0 20 20"><rect x="4" y="3" width="12" height="14" rx="1"/><line x1="7" y1="7" x2="13" y2="7"/><line x1="7" y1="11" x2="13" y2="11"/></svg>

        <span class="theme-dot" data-theme="jade"    title="Jade"></span>
        <span class="theme-dot" data-theme="ash"     title="Void Ash"></span>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleDrawer()"></div>
<button class="burger-btn" id="burger-btn" aria-label="Menu" onclick="toggleDrawer()">
  <span></span><span></span><span></span>
</button>

</div><!-- .app -->
</div><!-- .live-page-wrap -->

<script>
'use strict';

let countdownTimer = null;

const TIER_COLORS = {
  Lith: '#b87333', Meso: '#00bcd4', Neo: '#3949ab',
  Axi: '#ffd700', Requiem: '#8b0000', Omnia: '#e0e0e0', Railjack: '#3ddcb8',
};

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let activeCategory = 'origin';
function getFissureCategory(f) {
  if (f.is_railjack)        return 'railjack';
  if (f.tier === 'Requiem') return 'requiem';
  if (f.is_steel_path)      return 'steelpath';
  return 'origin';
}
function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.tier-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.category === cat));
  const el = document.getElementById('fissure-rows');
  if (el) el.innerHTML = renderFissureRows(window._fissureData || []);
}

function toggleDrawer() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn     = document.getElementById('burger-btn');
  const open    = sidebar.classList.toggle('open');
  overlay.classList.toggle('open', open);
  btn.classList.toggle('open', open);
}

function openGuide() {}

/* ── Fissures ── */
function renderFissureRows(fissures) {
  const filtered = fissures.filter(f => getFissureCategory(f) === activeCategory);
  const list = filtered.slice().sort((a, b) => (a.expiry_ts || 0) - (b.expiry_ts || 0));
  if (!list.length) return '<div class="live-empty">No fissures for selected category</div>';
  return '<div class="fissure-list">' + list.map(f => `
    <div class="fissure-row">
      <span class="fissure-tier" ${(f.is_railjack ? TIER_COLORS['Railjack'] : TIER_COLORS[f.tier]) ? `style="--tier-color:${f.is_railjack ? TIER_COLORS['Railjack'] : TIER_COLORS[f.tier]}"` : ''}>${f.is_railjack ? 'Railjack' : esc(f.tier)}</span>
      <div class="fissure-info">
        <div class="fissure-node">${esc(f.node)}${f.is_steel_path ? '<span class="fissure-tag">SP</span>' : ''}</div>
        <div class="fissure-sub">${esc(f.mission_type)} · ${esc(f.enemy)}</div>
      </div>
      <span class="eta-chip" data-expiry="${f.expiry_ts || 0}">${esc(f.eta)}</span>
    </div>`).join('') + '</div>';
}

function buildFissureCard(fissures) {
  window._fissureData = fissures;
  const cats = [
    { key: 'origin',    label: 'Origin System' },
    { key: 'steelpath', label: 'Steel Path' },
    { key: 'requiem',   label: 'Requiem' },
    { key: 'railjack',  label: 'Railjack' },
  ];
  const btns = cats.map(c =>
    `<button class="tier-btn${c.key === activeCategory ? ' active' : ''}" data-category="${c.key}" onclick="setCategory('${c.key}')">${c.label}</button>`
  ).join('');
  return `<div class="panel live-card-full">
    <h2>Void Fissures <span class="live-count">${fissures.length} active</span></h2>
    <div class="tier-btns">${btns}</div>
    <div id="fissure-rows">${renderFissureRows(fissures)}</div>
  </div>`;
}

/* ── Sortie ── */
function buildSortieCard(sortie) {
  if (!sortie) return `<div class="panel">
    <h2>Sortie</h2>
    <div class="live-empty">No sortie data</div>
  </div>`;
  const missions = (sortie.missions || []).map(m => `
    <div class="mission-block">
      <div class="mission-node">${esc(m.node)}</div>
      <div class="mission-sub">${esc(m.mission_type)}</div>
      ${m.modifier ? `<span class="modifier-badge">${esc(m.modifier)}</span>` : ''}
    </div>`).join('');
  return `<div class="panel">
    <h2>Sortie <span class="live-count" data-expiry="${sortie.expiry_ts || 0}">${esc(sortie.eta)}</span></h2>
    <div class="sortie-meta">
      <span class="sortie-boss">${esc(sortie.boss)}</span>
      <span>${esc(sortie.faction)}</span>
    </div>
    <div class="mission-list">${missions}</div>
  </div>`;
}

/* ── Archon Hunt ── */
function buildArchonCard(archon) {
  if (!archon) return `<div class="panel">
    <h2>Archon Hunt</h2>
    <div class="live-empty">No archon hunt data</div>
  </div>`;
  const missions = (archon.missions || []).map(m => `
    <div class="mission-block">
      <div class="mission-node">${esc(m.node)}</div>
      <div class="mission-sub">${esc(m.mission_type)}</div>
      ${m.modifier ? `<span class="modifier-badge">${esc(m.modifier)}</span>` : ''}
    </div>`).join('');
  return `<div class="panel">
    <h2>Archon Hunt <span class="live-count" data-expiry="${archon.expiry_ts || 0}">${esc(archon.eta)}</span></h2>
    <div class="sortie-meta">
      <span class="sortie-boss">${esc(archon.boss)}</span>
      <span>${esc(archon.faction)}</span>
    </div>
    <div class="mission-list">${missions}</div>
  </div>`;
}

/* ── Void Trader ── */
function buildTraderCard(trader) {
  if (!trader) return '';
  const dot = trader.active
    ? '<span class="trader-dot active"></span>'
    : '<span class="trader-dot inactive"></span>';
  const status = trader.active
    ? `${dot}<span class="trader-location">${esc(trader.node)}</span><span class="trader-eta">Departs <span data-expiry="${trader.expiry_ts || 0}">${esc(trader.eta)}</span></span>`
    : `${dot}<span class="trader-location">${trader.node ? esc(trader.node) : 'Location unknown'}</span><span class="trader-eta">Arrives <span data-expiry="${trader.expiry_ts || 0}">${esc(trader.eta)}</span></span>`;
  let inventory = '';
  if (trader.active && trader.inventory && trader.inventory.length) {
    const rows = trader.inventory.map(it => `
      <tr>
        <td>${esc(it.item)}</td>
        <td class="ducat-val">${it.ducats > 0 ? it.ducats + ' ⟁' : '—'}</td>
        <td class="credit-val">${it.credits > 0 ? it.credits.toLocaleString() + ' ¢' : '—'}</td>
      </tr>`).join('');
    inventory = `<table class="inventory-table">
      <thead><tr><th>Item</th><th>Ducats</th><th>Credits</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }
  const wideClass = trader.active && trader.inventory && trader.inventory.length > 6 ? ' live-card-wide' : '';
  return `<div class="panel${wideClass}">
    <h2>Void Trader — Baro Ki'Teer</h2>
    <div class="trader-status">${status}</div>
    ${inventory}
  </div>`;
}

/* ── Nightwave ── */
function buildNightwaveCard(nw) {
  if (!nw) return `<div class="panel">
    <h2>Nightwave</h2>
    <div class="live-empty">No active Nightwave season</div>
  </div>`;
  const challenges = (nw.active_challenges || []).map(ch => {
    const cls = ch.is_elite ? 'elite' : ch.is_daily ? 'daily' : 'weekly';
    const lbl = ch.is_elite ? 'Elite' : ch.is_daily ? 'Daily' : 'Weekly';
    return `<div class="nw-row">
      <div class="nw-left">
        <div class="nw-title-row">
          <span class="nw-tag ${cls}">${lbl}</span>
          <div class="nw-title">${esc(ch.title)}</div>
        </div>
        ${ch.description ? `<div class="nw-desc">${esc(ch.description)}</div>` : ''}
      </div>
      <div class="nw-right">
        <span class="nw-rep">+${ch.reputation.toLocaleString()}</span>
        <div class="nw-eta" data-expiry="${ch.expiry_ts || 0}">${esc(ch.eta)}</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="panel">
    <h2>Nightwave <span class="live-count">S${nw.season} · <span data-expiry="${nw.expiry_ts || 0}">${esc(nw.eta)}</span></span></h2>
    ${challenges || '<div class="live-empty">No active challenges</div>'}
  </div>`;
}

/* ── Alerts ── */
function buildAlertsCard(alerts) {
  if (!alerts || !alerts.length) return `<div class="panel">
    <h2>Alerts</h2>
    <div class="live-empty">No active alerts</div>
  </div>`;
  const rows = alerts.map(a => `
    <div class="alert-row">
      <div class="alert-info">
        <div class="alert-reward">${esc(a.reward)}</div>
        <div class="alert-sub">${esc(a.node)} · ${esc(a.mission_type)} · ${esc(a.faction)}</div>
      </div>
      <span class="eta-chip" data-expiry="${a.expiry_ts || 0}">${esc(a.eta)}</span>
    </div>`).join('');
  return `<div class="panel">
    <h2>Alerts <span class="live-count">${alerts.length} active</span></h2>
    ${rows}
  </div>`;
}

/* ── Invasions ── */
function buildInvasionsCard(invasions) {
  if (!invasions || !invasions.length) return `<div class="panel">
    <h2>Invasions</h2>
    <div class="live-empty">No active invasions</div>
  </div>`;
  const rows = invasions.map(inv => `
    <div class="invasion-row">
      <div class="invasion-header">
        <span class="invasion-node">${esc(inv.node)}</span>
        ${inv.eta && inv.eta !== '?' ? `<span class="eta-chip">${esc(inv.eta)}</span>` : ''}
      </div>
      <div class="invasion-sides">
        <div class="invasion-side invasion-attacker">
          <span class="invasion-faction">${esc(inv.attacker)}</span>
          ${inv.attacker_reward ? `<span class="reward-chip">${esc(inv.attacker_reward)}</span>` : ''}
        </div>
        <span class="invasion-vs">VS</span>
        <div class="invasion-side invasion-defender">
          <span class="invasion-faction">${esc(inv.defender)}</span>
          ${inv.defender_reward ? `<span class="reward-chip">${esc(inv.defender_reward)}</span>` : ''}
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" data-progress="${inv.progress}"></div>
      </div>
    </div>`).join('');
  return `<div class="panel">
    <h2>Invasions <span class="live-count">${invasions.length} active</span></h2>
    ${rows}
  </div>`;
}

/* ── Open World Cycles ── */
function buildCyclesCard(cycles) {
  if (!cycles || !cycles.length) return '';
  const WARM = new Set(['Day', 'Warm', 'Fass', 'Corpus', 'Joy']);
  const items = cycles.map(c => {
    const cls = WARM.has(c.state) ? 'cycle-warm' : 'cycle-cool';
    return `<div class="cycle-item">
      <div class="cycle-name">${esc(c.location)}</div>
      <div class="cycle-state ${cls}">${esc(c.state)}</div>
      <div class="cycle-eta" data-expiry="${c.expiry_ts || 0}">${esc(c.eta)}</div>
    </div>`;
  }).join('');
  return `<div class="cycles-standalone live-card-full"><div class="cycle-grid">${items}</div></div>`;
}

/* ── News & Events ── */
function relativeTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(diff / 3600000);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(diff / 86400000);
  return days + 'd ago';
}

function buildNewsEventsPanel(news, events, gifts) {
  if (!news || !news.length) return '';
  const eventItems  = events && events.length  ? events  : [];
  const giftItems   = gifts  && gifts.length   ? gifts   : [];
  const hasRightCol = eventItems.length > 0 || giftItems.length > 0;
  const title       = hasRightCol ? 'News &amp; Events' : 'News';

  const newsItems = news.slice(0, 7).map(n => {
    const link = n.url
      ? `<a class="ne-news-link" href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.message)}</a>`
      : `<span class="ne-news-link ne-news-plain">${esc(n.message)}</span>`;
    const timeStr = relativeTime(n.date);
    const timeEl = timeStr ? `<span class="ne-news-time">${timeStr}</span>` : '';
    return `<li>${timeEl}${link}</li>`;
  }).join('');

  const newsCol = `<div class="ne-col ne-news">
    ${hasRightCol ? '<div class="ne-sub-header">News</div>' : ''}
    <ul class="ne-news-list">${newsItems}</ul>
  </div>`;

  const giftRows = giftItems.map(g => `
    <div class="event-row event-row--gift">
      <div class="event-row-header">
        <div class="event-title">${esc(g.name || 'Gift of the Lotus')}</div>
        <div class="live-eta" data-expiry="${g.expiry_ts || 0}">${esc(g.eta)}</div>
      </div>
      ${g.reward ? `<div class="event-desc">${esc(g.reward)}</div>` : ''}
    </div>`).join('');

  const eventRows = eventItems.map(ev => `
    <div class="event-row">
      <div class="event-row-header">
        <div class="event-title">${esc(ev.name)}</div>
        <div class="live-eta" data-expiry="${ev.expiry_ts || 0}">${esc(ev.eta)}</div>
      </div>
      ${ev.reward ? `<div class="event-desc">${esc(ev.reward)}</div>` : ''}
    </div>`).join('');

  const eventsCol = hasRightCol ? `<div class="ne-col ne-events">
    <div class="ne-sub-header">Active Events</div>
    <div class="event-list">${giftRows}${eventRows}</div>
  </div>` : '';

  return `<div class="panel live-card-full">
    <h2>${title}</h2>
    <div class="ne-body${hasRightCol ? ' ne-body--split' : ''}">${newsCol}${eventsCol}</div>
  </div>`;
}

/* ── Data loading ── */
let _hasLoaded = false;
async function loadData() {
  resetCountdown();
  if (!_hasLoaded) {
    document.getElementById('live-content').innerHTML =
      '<div class="loading-msg">Acquiring worldstate…</div>';
  }
  try {
    const res = await fetch('/api/worldstate');
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `HTTP ${res.status}`);
    }
    renderAll(await res.json());
  } catch (err) {
    document.getElementById('live-content').innerHTML = `
      <div class="panel">
        <div class="error-msg">
          Live data temporarily unavailable.
          <small>${esc(err.message)}</small>
        </div>
      </div>`;
  }
}

function renderAll(data) {
  _hasLoaded = true;
  const allAlerts   = data.alerts || [];
  const allEvents   = data.events || [];
  // Gifts of the Lotus come through the Events array; fall back to alert-tagged gifts if present
  const gifts       = [
    ...allEvents.filter(e => e.is_gift),
    ...allAlerts.filter(a => a.is_gift),
  ];
  const plainAlerts = allAlerts.filter(a => !a.is_gift);
  const plainEvents = allEvents.filter(e => !e.is_gift);

  const cards = [
    buildCyclesCard(data.cycles || []),
    buildFissureCard(data.fissures || []),
    buildInvasionsCard(data.invasions || []),
    `<div class="panel-stack">${buildSortieCard(data.sortie)}${buildArchonCard(data.archon_hunt)}</div>`,
    `<div class="panel-stack">${buildNightwaveCard(data.nightwave)}${buildTraderCard(data.void_trader)}</div>`,
  ].filter(Boolean).join('');

  // Alerts and events all go in the right column — alerts first, then game events
  const allEventsAndAlerts = [...plainAlerts, ...plainEvents];
  document.getElementById('live-news').innerHTML = buildNewsEventsPanel(data.news || [], allEventsAndAlerts, gifts);
  const el = document.getElementById('live-content');
  const grid = document.createElement('div');
  grid.className = 'live-grid';
  grid.innerHTML = cards;
  el.replaceChildren(grid);
  grid.querySelectorAll('.progress-bar-fill[data-progress]').forEach(bar => {
    bar.style.width = bar.dataset.progress + '%';
  });
  startEtaTimer();
}

/* ── ETA Countdown Engine ── */
let _etaTimer = null;

function fmtCountdown(secs) {
  if (secs <= 0) return '—';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h >= 24) {
    const d = Math.floor(h / 24);
    const rh = h % 24;
    return rh > 0 ? `${d}d ${rh}h` : `${d}d`;
  }
  if (h > 0) return `${h}h ${m}m ${s}s`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function startEtaTimer() {
  if (_etaTimer) clearInterval(_etaTimer);
  _etaTimer = setInterval(() => {
    const now = Date.now() / 1000;
    document.querySelectorAll('[data-expiry]').forEach(el => {
      const exp = parseFloat(el.dataset.expiry);
      if (!exp) return;
      el.textContent = fmtCountdown(Math.round(exp - now));
    });
  }, 1000);
}

/* ── Auto-refresh ── */
function resetCountdown() {
  clearInterval(countdownTimer);
  countdownTimer = setTimeout(() => loadData(), 180000);
}

/* ── Version ── */
fetch('/api/version').then(r => r.json()).then(d => {
  const el = document.getElementById('nav-ver');
  if (el) el.textContent = 'v' + d.app;
}).catch(() => {});

loadData();
</script>
<script src="/static/js/theme.js"></script>
