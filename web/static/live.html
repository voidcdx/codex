<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void Codex — Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void-black:     #050505;
      --void-dark:      #0a0a0a;
      --void-panel:     rgba(10, 10, 10, 0.85);
      --charcoal:       #1a1a1a;
      --crimson:        #8B0000;
      --crimson-bright: #dc143c;
      --crimson-glow:   rgba(220, 20, 60, 0.35);
      --text:           #A0A0A0;
      --text-dim:       #555555;
      --font-display:   'Orbitron', monospace;
      --font-body:      'Rajdhani', sans-serif;
    }

    html, body {
      background: var(--void-black);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Atmosphere ── */
    .atmo {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 35% at 50% -5%,  rgba(139,0,0,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 100% 50%, rgba(80,0,0,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 35% 40% at 0% 80%,   rgba(80,0,0,0.10) 0%, transparent 50%),
        radial-gradient(ellipse 25% 30% at 80% 95%,  rgba(100,0,0,0.07) 0%, transparent 40%);
    }
    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }
    .gridlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(139,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,0,0,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Scanlines ── */
    html::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent 0px, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Layout ── */
    .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .body-row { display: flex; flex: 1; }

    /* ── Right sidebar ── */
    .r-sidebar {
      width: 200px;
      flex-shrink: 0;
      background: rgba(5,5,5,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(139,0,0,0.18);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      position: sticky;
      top: 50px;
      height: calc(100vh - 50px);
      overflow-y: auto;
    }
    .r-sidebar::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 1px; height: 100%;
      background: linear-gradient(180deg, transparent, rgba(220,20,60,0.35) 30%, rgba(220,20,60,0.35) 70%, transparent);
      pointer-events: none;
    }
    .sidebar-section-label {
      font-family: var(--font-display);
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 20px 10px;
    }
    .r-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
    .r-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      border: 1px solid transparent;
      border-left: 2px solid transparent;
      transition: all .15s;
    }
    .r-nav a:hover { color: var(--text); background: rgba(139,0,0,0.06); }
    .r-nav a.active {
      color: var(--crimson-bright);
      background: linear-gradient(90deg, rgba(139,0,0,0.15), transparent);
      border-left-color: var(--crimson-bright);
      text-shadow: 0 0 5px rgba(153,0,0,0.5);
    }
    .r-nav a svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      flex-shrink: 0;
    }
    .sidebar-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,0,0,0.25), transparent);
      margin: 16px 0;
    }
    .live-wrap { flex: 1; min-width: 0; }

    .sidebar-tier-btn { border-left: 2px solid transparent !important; }
    .sidebar-tier-btn.active { background: rgba(255,255,255,0.04) !important; border-left-color: currentColor !important; }

    @media (max-width: 900px) { .r-sidebar { display: none; } }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      background: rgba(5,5,5,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(139,0,0,0.2);
    }
    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(220,20,60,0.45) 30%, rgba(220,20,60,0.45) 70%, transparent);
      pointer-events: none;
    }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--crimson-bright);
      text-shadow: 0 0 8px var(--crimson-glow);
      user-select: none;
    }
    .nav-sep {
      width: 1px;
      height: 16px;
      background: rgba(139,0,0,0.3);
    }
    .nav-links {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    .nav-links a {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active {
      color: var(--crimson-bright);
      border-color: rgba(139,0,0,0.35);
      text-shadow: 0 0 5px rgba(153,0,0,0.5);
    }

    /* ── Page wrapper ── */
    .live-wrap {
      max-width: 1320px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Controls ── */
    .live-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .controls-label {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .platform-pills { display: flex; gap: 2px; }
    .platform-pill {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(10,10,10,0.7);
      border: 1px solid rgba(139,0,0,0.2);
      color: var(--text-dim);
      padding: 5px 14px;
      cursor: pointer;
      transition: all .15s;
      border-radius: 0;
    }
    .platform-pill:hover { color: var(--text); border-color: rgba(139,0,0,0.4); }
    .platform-pill.active {
      background: rgba(139,0,0,0.12);
      border-color: var(--crimson-bright);
      color: var(--crimson-bright);
      text-shadow: 0 0 5px rgba(153,0,0,0.5);
    }
    .refresh-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .refresh-btn {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: 1px solid rgba(139,0,0,0.25);
      color: var(--text-dim);
      padding: 4px 12px;
      cursor: pointer;
      transition: all .15s;
      border-radius: 0;
    }
    .refresh-btn:hover { border-color: var(--crimson-bright); color: var(--crimson-bright); }
    #refresh-countdown { font-variant-numeric: tabular-nums; }

    /* ── Grid ── */
    .live-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ── Panel ── */
    .s-panel {
      background: var(--void-panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(139,0,0,0.15);
      border-radius: 0;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }
    .s-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(220,20,60,0.5), transparent);
      pointer-events: none;
    }
    .s-panel:hover { border-color: rgba(139,0,0,0.35); }
    .s-panel.full-width { grid-column: 1 / -1; }

    /* ── Panel header ── */
    .s-panel-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(139,0,0,0.1);
    }
    .s-panel-title {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-shadow: 0 0 5px rgba(153,0,0,0.4);
    }
    .s-panel-meta {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }
    .s-panel-body { padding: 14px 16px; }

    /* ── Energy divider ── */
    .s-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,0,0,0.35), transparent);
    }

    /* ── Tier filter ── */
    .tier-filters {
      display: flex;
      gap: 3px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tier-btn {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid currentColor;
      padding: 2px 9px;
      cursor: pointer;
      background: none;
      transition: opacity .15s, background .15s;
      border-radius: 2px;
    }
    .tier-btn.active { opacity: 1; background: rgba(255,255,255,0.05); }
    .tier-btn:not(.active) { opacity: 0.3; }

    /* ── Fissure rows ── */
    .fissure-row, .alert-row, .invasion-row, .nw-row, .mission-block {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }
    .fissure-row:last-child, .alert-row:last-child,
    .invasion-row:last-child, .nw-row:last-child, .mission-block:last-child {
      border-bottom: none;
    }

    /* ── Tier badge ── */
    .tier-badge {
      border-radius: 2px;
      padding: 2px 7px;
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 1px;
    }
    .tier-Lith     { background: rgba(205,127,50,.2);  color: #e8a060; border: 1px solid rgba(205,127,50,.35); }
    .tier-Meso     { background: rgba(192,192,192,.12); color: #c0c0c0; border: 1px solid rgba(192,192,192,.3); }
    .tier-Neo      { background: rgba(255,215,0,.14);  color: #ffd700; border: 1px solid rgba(255,215,0,.3); }
    .tier-Axi      { background: rgba(100,180,255,.14); color: #80c8ff; border: 1px solid rgba(100,180,255,.3); }
    .tier-Requiem  { background: rgba(155,89,182,.2);  color: #c39bd3; border: 1px solid rgba(155,89,182,.35); }
    .tier-Omnia    { background: rgba(255,255,255,.08); color: #c0c0c0; border: 1px solid rgba(255,255,255,.2); }

    .fissure-info { flex: 1; min-width: 0; }
    .fissure-node { color: var(--text); font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fissure-sub  { color: var(--text-dim); font-size: 11px; margin-top: 2px; letter-spacing: 0.04em; }
    .eta-chip {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      align-self: flex-start;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    .storm-tag {
      font-size: 9px;
      background: rgba(60,100,200,.25);
      color: #88aaff;
      border: 1px solid rgba(60,100,200,.4);
      border-radius: 2px;
      padding: 1px 5px;
      margin-left: 5px;
      vertical-align: middle;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .sp-tag {
      font-size: 9px;
      background: rgba(139,0,0,.3);
      color: var(--crimson-bright);
      border: 1px solid rgba(139,0,0,.5);
      border-radius: 2px;
      padding: 1px 5px;
      margin-left: 5px;
      vertical-align: middle;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    /* ── Sortie / Archon ── */
    .mission-block { flex-direction: column; gap: 4px; }
    .mission-node { color: var(--text); font-size: 13px; font-weight: 500; }
    .mission-sub  { color: var(--text-dim); font-size: 11px; letter-spacing: 0.04em; }
    .modifier-badge {
      display: inline-block;
      background: rgba(139,0,0,.15);
      border: 1px solid rgba(139,0,0,.3);
      color: var(--crimson-bright);
      border-radius: 2px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }
    .sortie-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }
    .sortie-boss { color: var(--text); font-weight: 600; }

    /* ── Void Trader ── */
    .trader-status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .trader-dot {
      width: 6px; height: 6px;
      border-radius: 0;
      flex-shrink: 0;
      transform: rotate(45deg);
    }
    .trader-dot.active  { background: var(--crimson-bright); box-shadow: 0 0 6px var(--crimson-glow); }
    .trader-dot.inactive { background: var(--text-dim); }
    .trader-location { color: var(--text); font-size: 13px; font-weight: 500; }
    .trader-eta { color: var(--text-dim); font-size: 11px; margin-left: auto; }

    .inventory-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 4px; }
    .inventory-table th {
      font-family: var(--font-display);
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: left;
      padding: 6px 6px 6px 0;
      border-bottom: 1px solid rgba(139,0,0,0.25);
    }
    .inventory-table th:last-child, .inventory-table td:last-child { text-align: right; }
    .inventory-table td {
      padding: 6px 6px 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 12px;
    }
    .inventory-table tr:nth-child(even) td { background: rgba(139,0,0,0.03); }
    .inventory-table tr:last-child td { border-bottom: none; }
    .ducat-val  { color: #c8a84b; }
    .credit-val { color: var(--text-dim); }

    /* ── Nightwave ── */
    .nw-tag {
      font-family: var(--font-body);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 2px;
      padding: 2px 6px;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
    }
    .nw-tag.daily   { background: rgba(76,175,80,.15);  color: #81c784; border: 1px solid rgba(76,175,80,.3); }
    .nw-tag.weekly  { background: rgba(33,150,243,.15); color: #64b5f6; border: 1px solid rgba(33,150,243,.3); }
    .nw-tag.elite   { background: rgba(139,0,0,.2);     color: var(--crimson-bright); border: 1px solid rgba(139,0,0,.4); }
    .nw-rep { margin-left: auto; font-size: 11px; color: #c8a84b; white-space: nowrap; flex-shrink: 0; }

    /* ── Invasions ── */
    .invasion-info { flex: 1; min-width: 0; }
    .invasion-node { color: var(--text); font-size: 13px; font-weight: 500; }
    .invasion-factions {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }
    .invasion-vs { color: rgba(139,0,0,0.6); font-size: 9px; font-weight: 700; }
    .progress-bar-wrap {
      height: 2px;
      background: rgba(255,255,255,.08);
      margin-top: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--crimson), var(--crimson-bright));
      transition: width .4s;
    }
    .invasion-rewards {
      display: flex;
      gap: 5px;
      margin-top: 6px;
      font-size: 11px;
      flex-wrap: wrap;
    }
    .reward-chip {
      background: rgba(139,0,0,.08);
      border: 1px solid rgba(139,0,0,.2);
      border-radius: 2px;
      padding: 1px 6px;
      color: var(--text-dim);
      font-size: 10px;
    }

    /* ── Alerts ── */
    .alert-reward { flex: 1; color: var(--text); font-size: 13px; font-weight: 500; }
    .alert-sub    { color: var(--text-dim); font-size: 11px; margin-top: 2px; letter-spacing: 0.04em; }

    /* ── Empty / error ── */
    .empty-state {
      color: var(--text-dim);
      font-size: 12px;
      padding: 16px 0;
      text-align: center;
      letter-spacing: 0.06em;
    }
    .error-msg { color: var(--crimson-bright); font-size: 13px; padding: 16px 0; }

    /* ── Loading ── */
    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--text-dim);
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      gap: 16px;
    }
    .scanner {
      width: 28px; height: 3px;
      background: var(--crimson);
      box-shadow: 0 0 8px var(--crimson-glow);
      animation: scan .8s ease-in-out infinite alternate;
    }
    @keyframes scan {
      0%   { transform: scaleX(0.3); opacity: 0.5; }
      100% { transform: scaleX(1.4); opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .live-grid { grid-template-columns: 1fr; }
      .s-panel.full-width { grid-column: 1; }
      .live-wrap { padding: 16px 14px; }
    }
  </style>
</head>
<body>
<div class="atmo"></div>
<div class="noise"></div>
<div class="gridlines"></div>

<div class="app">
  <header>
    <span class="nav-brand">Void Codex</span>
    <div class="nav-sep"></div>
    <nav class="nav-links">
      <a href="/">Calculator</a>
      <a href="/live" class="active">Live Data</a>
    </nav>
  </header>

  <div class="body-row">
  <div class="live-wrap">
    <div class="live-controls">
      <span class="controls-label">Platform</span>
      <div class="platform-pills">
        <button class="platform-pill active" onclick="setPlatform('pc')">PC</button>
        <button class="platform-pill" onclick="setPlatform('ps4')">PS4</button>
        <button class="platform-pill" onclick="setPlatform('xb1')">Xbox</button>
        <button class="platform-pill" onclick="setPlatform('swi')">Switch</button>
      </div>
      <div class="refresh-info">
        <span>Refresh in <span id="refresh-countdown">60</span>s</span>
        <button class="refresh-btn" onclick="loadData()">↻ Now</button>
      </div>
    </div>

    <div id="live-content">
      <div class="loading-overlay"><div class="scanner"></div>Acquiring worldstate…</div>
    </div>
  </div>

  <aside class="r-sidebar">
    <div class="sidebar-section-label">Navigation</div>
    <nav class="r-nav">
      <a href="/">
        <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/></svg>
        Calculator
      </a>
      <a href="/live" class="active">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3m-4.2-7.8-2.1 2.1M6.3 17.7l-2.1 2.1m0-13.6 2.1 2.1m11.3 11.3 2.1 2.1"/></svg>
        Live Data
      </a>
    </nav>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Tier Filter</div>
    <nav class="r-nav" id="sidebar-tier-nav"></nav>
  </aside>
  </div><!-- /.body-row -->
</div><!-- /.app -->

<script>
'use strict';

let currentPlatform = 'pc';
let countdownTimer  = null;
let countdownVal    = 60;

const TIER_COLORS = {
  Lith: '#e8a060', Meso: '#c0c0c0', Neo: '#ffd700',
  Axi: '#80c8ff', Requiem: '#c39bd3', Omnia: '#c0c0c0',
};

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setPlatform(p) {
  currentPlatform = p;
  document.querySelectorAll('.platform-pill').forEach(el => {
    el.classList.toggle('active',
      el.textContent.toLowerCase() === p ||
      (p === 'xb1' && el.textContent === 'Xbox') ||
      (p === 'swi' && el.textContent === 'Switch')
    );
  });
  loadData();
}

let activeTier = 'All';
function setTier(tier) {
  activeTier = tier;
  document.querySelectorAll('.tier-btn, .sidebar-tier-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tier === tier));
  renderFissureRows(window._fissureData || []);
}

function buildSidebarTiers() {
  const tiers = ['All','Lith','Meso','Neo','Axi','Requiem','Omnia'];
  const nav = document.getElementById('sidebar-tier-nav');
  if (!nav) return;
  nav.innerHTML = tiers.map(t => {
    const col = TIER_COLORS[t] || '#A0A0A0';
    return `<a href="#" class="sidebar-tier-btn${t===activeTier?' active':''}" data-tier="${t}"
      style="color:${col};--tier-col:${col}"
      onclick="event.preventDefault();setTier('${t}')">${t}</a>`;
  }).join('');
}

/* ── Fissures ── */
function renderFissureRows(fissures) {
  const list = activeTier === 'All' ? fissures : fissures.filter(f => f.tier === activeTier);
  if (!list.length) return '<div class="empty-state">No fissures for selected tier</div>';
  return list.map(f => `
    <div class="fissure-row">
      <span class="tier-badge tier-${esc(f.tier)}">${esc(f.tier)}</span>
      <div class="fissure-info">
        <div class="fissure-node">${esc(f.node)}${f.is_storm?'<span class="storm-tag">Storm</span>':''}${f.is_steel_path?'<span class="sp-tag">SP</span>':''}</div>
        <div class="fissure-sub">${esc(f.mission_type)} · ${esc(f.enemy)}</div>
      </div>
      <span class="eta-chip">${esc(f.eta)}</span>
    </div>`).join('');
}

function buildFissureCard(fissures) {
  window._fissureData = fissures;
  const tiers = ['All','Lith','Meso','Neo','Axi','Requiem','Omnia'];
  const btns = tiers.map(t => {
    const col = TIER_COLORS[t] ? `style="color:${TIER_COLORS[t]};border-color:${TIER_COLORS[t]}55"` : 'style="color:#A0A0A0;border-color:#333"';
    return `<button class="tier-btn${t===activeTier?' active':''}" data-tier="${t}" onclick="setTier('${t}')" ${col}>${t}</button>`;
  }).join('');
  return `
    <div class="s-panel full-width">
      <div class="s-panel-hd">
        <span class="s-panel-title">Void Fissures</span>
        <span class="s-panel-meta">${fissures.length} active</span>
      </div>
      <div class="s-panel-body">
        <div class="tier-filters">${btns}</div>
        <div id="fissure-rows">${renderFissureRows(fissures)}</div>
      </div>
    </div>`;
}

/* ── Sortie ── */
function buildSortieCard(sortie) {
  if (!sortie) return `
    <div class="s-panel"><div class="s-panel-hd"><span class="s-panel-title">Sortie</span></div>
    <div class="s-panel-body"><div class="empty-state">No sortie data</div></div></div>`;
  const missions = (sortie.missions||[]).map(m => `
    <div class="mission-block">
      <div class="mission-node">${esc(m.node)}</div>
      <div class="mission-sub">${esc(m.mission_type)}</div>
      ${m.modifier?`<div><span class="modifier-badge">${esc(m.modifier)}</span></div>`:''}
    </div>`).join('');
  return `
    <div class="s-panel">
      <div class="s-panel-hd">
        <span class="s-panel-title">Sortie</span>
        <span class="s-panel-meta">${esc(sortie.eta)}</span>
      </div>
      <div class="s-panel-body">
        <div class="sortie-meta">
          <span class="sortie-boss">${esc(sortie.boss)}</span>
          <span>${esc(sortie.faction)}</span>
        </div>
        ${missions}
      </div>
    </div>`;
}

/* ── Archon ── */
function buildArchonCard(archon) {
  if (!archon) return `
    <div class="s-panel"><div class="s-panel-hd"><span class="s-panel-title">Archon Hunt</span></div>
    <div class="s-panel-body"><div class="empty-state">No archon hunt data</div></div></div>`;
  const missions = (archon.missions||[]).map(m => `
    <div class="mission-block">
      <div class="mission-node">${esc(m.node)}</div>
      <div class="mission-sub">${esc(m.mission_type)}</div>
      ${m.modifier?`<div><span class="modifier-badge">${esc(m.modifier)}</span></div>`:''}
    </div>`).join('');
  return `
    <div class="s-panel">
      <div class="s-panel-hd">
        <span class="s-panel-title">Archon Hunt</span>
        <span class="s-panel-meta">${esc(archon.eta)}</span>
      </div>
      <div class="s-panel-body">
        <div class="sortie-meta">
          <span class="sortie-boss">${esc(archon.boss)}</span>
          <span>${esc(archon.faction)}</span>
        </div>
        ${missions}
      </div>
    </div>`;
}

/* ── Void Trader ── */
function buildTraderCard(trader) {
  if (!trader) return '';
  const dot = trader.active
    ? '<span class="trader-dot active"></span>'
    : '<span class="trader-dot inactive"></span>';
  const status = trader.active
    ? `${dot}<span class="trader-location">${esc(trader.node)}</span><span class="trader-eta">Departs ${esc(trader.eta)}</span>`
    : `${dot}<span class="trader-location">Not available</span><span class="trader-eta">Arrives ${esc(trader.eta)}</span>`;
  let inventory = '';
  if (trader.active && trader.inventory && trader.inventory.length) {
    const rows = trader.inventory.map(it => `
      <tr>
        <td>${esc(it.item)}</td>
        <td class="ducat-val">${it.ducats>0?it.ducats+' ⟁':'—'}</td>
        <td class="credit-val">${it.credits>0?it.credits.toLocaleString()+' ¢':'—'}</td>
      </tr>`).join('');
    inventory = `<table class="inventory-table">
      <thead><tr><th>Item</th><th>Ducats</th><th>Credits</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }
  const wide = trader.active && trader.inventory && trader.inventory.length > 6 ? ' full-width' : '';
  return `
    <div class="s-panel${wide}">
      <div class="s-panel-hd"><span class="s-panel-title">Void Trader — Baro Ki'Tec</span></div>
      <div class="s-panel-body">
        <div class="trader-status">${status}</div>
        ${inventory}
      </div>
    </div>`;
}

/* ── Nightwave ── */
function buildNightwaveCard(nw) {
  if (!nw) return `
    <div class="s-panel"><div class="s-panel-hd"><span class="s-panel-title">Nightwave</span></div>
    <div class="s-panel-body"><div class="empty-state">No active Nightwave season</div></div></div>`;
  const challenges = (nw.active_challenges||[]).map(ch => {
    const cls = ch.is_elite?'elite':ch.is_daily?'daily':'weekly';
    const lbl = ch.is_elite?'Elite':ch.is_daily?'Daily':'Weekly';
    return `<div class="nw-row">
      <span class="nw-tag ${cls}">${lbl}</span>
      <div style="flex:1;min-width:0">
        <div style="color:var(--text);font-size:13px;font-weight:500">${esc(ch.title)}</div>
        <div style="color:var(--text-dim);font-size:11px;margin-top:2px">${esc(ch.eta)}</div>
      </div>
      <span class="nw-rep">+${ch.reputation.toLocaleString()}</span>
    </div>`;
  }).join('');
  return `
    <div class="s-panel">
      <div class="s-panel-hd">
        <span class="s-panel-title">Nightwave</span>
        <span class="s-panel-meta">S${nw.season} · ${esc(nw.eta)}</span>
      </div>
      <div class="s-panel-body">${challenges||'<div class="empty-state">No active challenges</div>'}</div>
    </div>`;
}

/* ── Alerts ── */
function buildAlertsCard(alerts) {
  if (!alerts||!alerts.length) return `
    <div class="s-panel"><div class="s-panel-hd"><span class="s-panel-title">Alerts</span></div>
    <div class="s-panel-body"><div class="empty-state">No active alerts</div></div></div>`;
  const rows = alerts.map(a => `
    <div class="alert-row">
      <div style="flex:1;min-width:0">
        <div class="alert-reward">${esc(a.reward)}</div>
        <div class="alert-sub">${esc(a.node)} · ${esc(a.mission_type)} · ${esc(a.faction)}</div>
      </div>
      <span class="eta-chip">${esc(a.eta)}</span>
    </div>`).join('');
  return `
    <div class="s-panel">
      <div class="s-panel-hd">
        <span class="s-panel-title">Alerts</span>
        <span class="s-panel-meta">${alerts.length} active</span>
      </div>
      <div class="s-panel-body">${rows}</div>
    </div>`;
}

/* ── Invasions ── */
function buildInvasionsCard(invasions) {
  if (!invasions||!invasions.length) return `
    <div class="s-panel"><div class="s-panel-hd"><span class="s-panel-title">Invasions</span></div>
    <div class="s-panel-body"><div class="empty-state">No active invasions</div></div></div>`;
  const rows = invasions.map(inv => `
    <div class="invasion-row">
      <div class="invasion-info">
        <div class="invasion-node">${esc(inv.node)}</div>
        <div class="invasion-factions">
          <span>${esc(inv.attacker)}</span>
          <span class="invasion-vs">VS</span>
          <span>${esc(inv.defender)}</span>
          <span class="eta-chip" style="margin-left:auto">${esc(inv.eta)}</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${inv.progress}%"></div>
        </div>
        <div class="invasion-rewards">
          <span class="reward-chip">⚔ ${esc(inv.attacker_reward)}</span>
          <span class="reward-chip">🛡 ${esc(inv.defender_reward)}</span>
        </div>
      </div>
    </div>`).join('');
  return `
    <div class="s-panel">
      <div class="s-panel-hd">
        <span class="s-panel-title">Invasions</span>
        <span class="s-panel-meta">${invasions.length} active</span>
      </div>
      <div class="s-panel-body">${rows}</div>
    </div>`;
}

/* ── Data loading ── */
async function loadData() {
  resetCountdown();
  document.getElementById('live-content').innerHTML =
    '<div class="loading-overlay"><div class="scanner"></div>Acquiring worldstate…</div>';
  try {
    const res = await fetch(`/api/worldstate?platform=${currentPlatform}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderAll(data);
  } catch (err) {
    document.getElementById('live-content').innerHTML = `
      <div class="s-panel full-width">
        <div class="s-panel-body">
          <div class="error-msg">
            Failed to load worldstate: ${esc(err.message)}<br>
            <small style="color:var(--text-dim);margin-top:6px;display:block">
              Download worldstate manually from
              <a href="https://content.warframe.com/dynamic/worldState.php" target="_blank"
                 style="color:var(--crimson-bright)">content.warframe.com</a>
              and save as <code>data/worldstate_raw.json</code>, then run
              <code>python scripts/fetch_worldstate.py</code>.
            </small>
          </div>
        </div>
      </div>`;
  }
}

function renderAll(data) {
  const grid = document.createElement('div');
  grid.className = 'live-grid';
  grid.innerHTML = [
    buildFissureCard(data.fissures||[]),
    buildSortieCard(data.sortie),
    buildArchonCard(data.archon_hunt),
    buildTraderCard(data.void_trader),
    buildNightwaveCard(data.nightwave),
    buildAlertsCard(data.alerts||[]),
    buildInvasionsCard(data.invasions||[]),
  ].join('');
  const el = document.getElementById('live-content');
  el.innerHTML = '';
  el.appendChild(grid);
}

/* ── Countdown ── */
function resetCountdown() {
  countdownVal = 60;
  document.getElementById('refresh-countdown').textContent = countdownVal;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownVal--;
    document.getElementById('refresh-countdown').textContent = Math.max(0, countdownVal);
    if (countdownVal <= 0) { clearInterval(countdownTimer); loadData(); }
  }, 1000);
}

buildSidebarTiers();
loadData();
</script>
</body>
</html>
