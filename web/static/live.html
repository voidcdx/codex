<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void Codex — Live</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* ── Nav ─────────────────────────────────────────── */
    .site-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    .site-nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .site-nav a:hover { color: var(--accent2); }
    .site-nav a.active {
      color: var(--accent2);
      border-color: var(--border-highlight);
    }

    /* ── Live page layout ────────────────────────────── */
    .live-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Controls bar */
    .live-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .platform-pills { display: flex; gap: 4px; }
    .platform-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .platform-pill.active,
    .platform-pill:hover {
      border-color: var(--accent);
      color: var(--accent2);
    }
    .live-refresh-info {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: var(--radius-sm);
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent2); }
    #refresh-countdown { font-variant-numeric: tabular-nums; }

    /* ── Live grid ───────────────────────────────────── */
    .live-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .live-card {
      background: var(--surface);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .live-card:hover { border-color: var(--border-highlight); }
    .live-card.full-width { grid-column: 1 / -1; }

    .card-title {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title span { color: var(--text-dim); font-weight: normal; text-transform: none; letter-spacing: 0; }

    /* ── Fissure rows ────────────────────────────────── */
    .tier-filters {
      display: flex;
      gap: 4px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .tier-btn {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 11px;
      cursor: pointer;
      background: none;
      transition: all .15s;
    }
    .tier-btn.active { opacity: 1; }
    .tier-btn:not(.active) { opacity: 0.45; }

    .fissure-row, .alert-row, .invasion-row, .nw-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
    }
    .fissure-row:last-child, .alert-row:last-child,
    .invasion-row:last-child, .nw-row:last-child {
      border-bottom: none;
    }

    /* Tier badge */
    .tier-badge {
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .04em;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 1px;
    }
    .tier-Lith     { background: rgba(205,127,50,.25); color: #e8a060; border: 1px solid rgba(205,127,50,.4); }
    .tier-Meso     { background: rgba(192,192,192,.18); color: #d0d0d0; border: 1px solid rgba(192,192,192,.35); }
    .tier-Neo      { background: rgba(255,215,0,.18); color: #ffd700; border: 1px solid rgba(255,215,0,.35); }
    .tier-Axi      { background: rgba(100,180,255,.18); color: #80c8ff; border: 1px solid rgba(100,180,255,.35); }
    .tier-Requiem  { background: rgba(155,89,182,.25); color: #c39bd3; border: 1px solid rgba(155,89,182,.4); }
    .tier-Omnia    { background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.3); }

    .fissure-info { flex: 1; min-width: 0; }
    .fissure-node { color: var(--text); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fissure-sub  { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
    .eta-chip {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      align-self: flex-start;
      margin-top: 2px;
    }
    .storm-tag {
      font-size: 10px;
      background: rgba(60,100,200,.3);
      color: #88aaff;
      border: 1px solid rgba(60,100,200,.5);
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 5px;
      vertical-align: middle;
    }
    .sp-tag {
      font-size: 10px;
      background: rgba(200,30,30,.25);
      color: #ff7070;
      border: 1px solid rgba(200,30,30,.4);
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 5px;
      vertical-align: middle;
    }

    /* ── Sortie / Archon ─────────────────────────────── */
    .mission-block {
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .mission-block:last-child { border-bottom: none; }
    .mission-node { color: var(--text); font-size: 13px; }
    .mission-sub  { color: var(--text-dim); font-size: 11px; margin-top: 3px; }
    .modifier-badge {
      display: inline-block;
      background: rgba(232,185,35,.15);
      border: 1px solid rgba(232,185,35,.3);
      color: var(--accent2);
      border-radius: 3px;
      padding: 1px 7px;
      font-size: 10px;
      margin-top: 4px;
    }
    .sortie-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .sortie-boss { color: var(--text); font-weight: 600; }

    /* ── Void Trader ─────────────────────────────────── */
    .trader-status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .trader-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .trader-dot.active { background: var(--good); box-shadow: 0 0 6px var(--good); }
    .trader-dot.inactive { background: var(--text-dim); }
    .trader-location { color: var(--text); font-size: 13px; }
    .trader-eta { color: var(--text-dim); font-size: 12px; }

    .inventory-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 4px; }
    .inventory-table th {
      color: var(--text-dim);
      font-weight: normal;
      text-align: left;
      padding: 4px 6px 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .inventory-table th:last-child, .inventory-table td:last-child { text-align: right; }
    .inventory-table td {
      padding: 5px 6px 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text);
    }
    .inventory-table tr:last-child td { border-bottom: none; }
    .ducat-val { color: #c8a84b; }
    .credit-val { color: var(--text-dim); }

    /* ── Nightwave ───────────────────────────────────── */
    .nw-tag {
      font-size: 10px;
      border-radius: 3px;
      padding: 1px 5px;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
      font-weight: 600;
    }
    .nw-tag.daily   { background: rgba(76,175,80,.2);  color: #81c784; border: 1px solid rgba(76,175,80,.4); }
    .nw-tag.weekly  { background: rgba(33,150,243,.2); color: #64b5f6; border: 1px solid rgba(33,150,243,.4); }
    .nw-tag.elite   { background: rgba(244,67,54,.2);  color: #e57373; border: 1px solid rgba(244,67,54,.4); }
    .nw-rep { margin-left: auto; font-size: 11px; color: #c8a84b; white-space: nowrap; flex-shrink: 0; }

    /* ── Invasions ───────────────────────────────────── */
    .invasion-info { flex: 1; min-width: 0; }
    .invasion-factions {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 3px;
    }
    .invasion-vs { color: var(--text-dim); font-size: 10px; }
    .progress-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,.1);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width .3s;
    }
    .invasion-rewards {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      font-size: 11px;
      flex-wrap: wrap;
    }
    .reward-chip {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 3px;
      padding: 1px 6px;
      color: var(--text-dim);
    }

    /* ── Alerts ──────────────────────────────────────── */
    .alert-reward { flex: 1; color: var(--text); font-size: 13px; }
    .alert-sub { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
    .empty-state { color: var(--text-dim); font-size: 13px; padding: 12px 0; text-align: center; }

    /* ── Loading / error ─────────────────────────────── */
    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 13px;
      gap: 10px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: var(--bad); font-size: 13px; padding: 12px 0; }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 768px) {
      .live-grid { grid-template-columns: 1fr; }
      .live-card.full-width { grid-column: 1; }
    }
  </style>
</head>
<body>
<header>
  <div class="banner-lockup">
    <!-- Left Orokin wing -->
    <svg class="banner-wing" width="110" height="44" viewBox="0 0 110 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-l" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="1.8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <polyline points="0,5 10,5 15,10 15,34 10,39 0,39" stroke="#e8b923" stroke-width="1.5" stroke-linejoin="miter" filter="url(#glow-l)"/>
      <line x1="19" y1="22" x2="98" y2="22" stroke="#c49a1f" stroke-width="1"/>
      <line x1="36" y1="18" x2="36" y2="26" stroke="#c49a1f" stroke-width="1"/>
      <line x1="58" y1="19" x2="58" y2="25" stroke="#c49a1f" stroke-width="0.8"/>
      <line x1="80" y1="19" x2="80" y2="25" stroke="#c49a1f" stroke-width="0.8"/>
      <polygon points="98,22 103,17 108,22 103,27" fill="#e8b923" filter="url(#glow-l)"/>
    </svg>
    <h1>Void Codex</h1>
    <!-- Right wing — mirror of left -->
    <svg class="banner-wing" width="110" height="44" viewBox="0 0 110 44" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform:scaleX(-1)">
      <defs>
        <filter id="glow-r" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="1.8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <polyline points="0,5 10,5 15,10 15,34 10,39 0,39" stroke="#e8b923" stroke-width="1.5" stroke-linejoin="miter" filter="url(#glow-r)"/>
      <line x1="19" y1="22" x2="98" y2="22" stroke="#c49a1f" stroke-width="1"/>
      <line x1="36" y1="18" x2="36" y2="26" stroke="#c49a1f" stroke-width="1"/>
      <line x1="58" y1="19" x2="58" y2="25" stroke="#c49a1f" stroke-width="0.8"/>
      <line x1="80" y1="19" x2="80" y2="25" stroke="#c49a1f" stroke-width="0.8"/>
      <polygon points="98,22 103,17 108,22 103,27" fill="#e8b923" filter="url(#glow-r)"/>
    </svg>
  </div>
  <nav class="site-nav">
    <a href="/">Damage Calculator</a>
    <a href="/live" class="active">Live Data</a>
  </nav>
</header>

<div class="live-container">
  <!-- Controls -->
  <div class="live-controls">
    <div class="platform-pills">
      <button class="platform-pill active" onclick="setPlatform('pc')">PC</button>
      <button class="platform-pill" onclick="setPlatform('ps4')">PS4</button>
      <button class="platform-pill" onclick="setPlatform('xb1')">Xbox</button>
      <button class="platform-pill" onclick="setPlatform('swi')">Switch</button>
    </div>
    <div class="live-refresh-info">
      <span>Refreshes in <span id="refresh-countdown">60</span>s</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh now</button>
    </div>
  </div>

  <!-- Content -->
  <div id="live-content">
    <div class="loading-overlay"><div class="spinner"></div> Loading worldstate…</div>
  </div>
</div>

<script>
'use strict';

let currentPlatform = 'pc';
let refreshTimer = null;
let countdownTimer = null;
let countdownVal = 60;

const TIER_COLORS = {
  Lith: '#e8a060', Meso: '#d0d0d0', Neo: '#ffd700',
  Axi: '#80c8ff', Requiem: '#c39bd3', Omnia: '#ffffff',
};

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function setPlatform(p) {
  currentPlatform = p;
  document.querySelectorAll('.platform-pill').forEach(el => {
    el.classList.toggle('active', el.textContent.toLowerCase() === p ||
      (p === 'xb1' && el.textContent === 'Xbox') ||
      (p === 'swi' && el.textContent === 'Switch'));
  });
  loadData();
}

// ── Tier filter state ──────────────────────────────────────
let activeTier = 'All';

function setTier(tier) {
  activeTier = tier;
  document.querySelectorAll('.tier-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tier === tier);
  });
  renderFissureRows(window._fissureData || []);
}

// ── Render helpers ─────────────────────────────────────────

function renderFissureRows(fissures) {
  const filtered = activeTier === 'All'
    ? fissures
    : fissures.filter(f => f.tier === activeTier);

  if (!filtered.length) {
    return '<div class="empty-state">No fissures for selected tier</div>';
  }
  return filtered.map(f => `
    <div class="fissure-row">
      <span class="tier-badge tier-${esc(f.tier)}">${esc(f.tier)}</span>
      <div class="fissure-info">
        <div class="fissure-node">
          ${esc(f.node)}
          ${f.is_storm ? '<span class="storm-tag">Storm</span>' : ''}
          ${f.is_steel_path ? '<span class="sp-tag">SP</span>' : ''}
        </div>
        <div class="fissure-sub">${esc(f.mission_type)} · ${esc(f.enemy)}</div>
      </div>
      <span class="eta-chip">${esc(f.eta)}</span>
    </div>
  `).join('');
}

function buildFissureCard(fissures) {
  window._fissureData = fissures;
  const tiers = ['All', 'Lith', 'Meso', 'Neo', 'Axi', 'Requiem', 'Omnia'];
  const tierBtns = tiers.map(t => {
    const color = TIER_COLORS[t] ? `style="color:${TIER_COLORS[t]};border-color:${TIER_COLORS[t]}44"` : '';
    return `<button class="tier-btn ${t === activeTier ? 'active' : ''}" data-tier="${t}"
      onclick="setTier('${t}')" ${color}>${t}</button>`;
  }).join('');

  return `
    <div class="live-card full-width">
      <div class="card-title">Void Fissures <span>${fissures.length} active</span></div>
      <div class="tier-filters">${tierBtns}</div>
      <div id="fissure-rows">${renderFissureRows(fissures)}</div>
    </div>
  `;
}

function buildSortieCard(sortie) {
  if (!sortie) return `
    <div class="live-card">
      <div class="card-title">Sortie</div>
      <div class="empty-state">No sortie data</div>
    </div>`;
  const missions = (sortie.missions || []).map(m => `
    <div class="mission-block">
      <div class="mission-node">${esc(m.node)}</div>
      <div class="mission-sub">${esc(m.mission_type)}</div>
      ${m.modifier ? `<div><span class="modifier-badge">${esc(m.modifier)}</span></div>` : ''}
    </div>
  `).join('');
  return `
    <div class="live-card">
      <div class="card-title">Sortie <span>${esc(sortie.eta)}</span></div>
      <div class="sortie-meta">
        <span class="sortie-boss">${esc(sortie.boss)}</span>
        <span>${esc(sortie.faction)}</span>
      </div>
      ${missions}
    </div>
  `;
}

function buildArchonCard(archon) {
  if (!archon) return `
    <div class="live-card">
      <div class="card-title">Archon Hunt</div>
      <div class="empty-state">No archon hunt data</div>
    </div>`;
  const missions = (archon.missions || []).map(m => `
    <div class="mission-block">
      <div class="mission-node">${esc(m.node)}</div>
      <div class="mission-sub">${esc(m.mission_type)}</div>
      ${m.modifier ? `<div><span class="modifier-badge">${esc(m.modifier)}</span></div>` : ''}
    </div>
  `).join('');
  return `
    <div class="live-card">
      <div class="card-title">Archon Hunt <span>${esc(archon.eta)}</span></div>
      <div class="sortie-meta">
        <span class="sortie-boss">${esc(archon.boss)}</span>
        <span>${esc(archon.faction)}</span>
      </div>
      ${missions}
    </div>
  `;
}

function buildTraderCard(trader) {
  if (!trader) return '';
  const dot = trader.active
    ? '<span class="trader-dot active"></span>'
    : '<span class="trader-dot inactive"></span>';
  const status = trader.active
    ? `${dot}<span class="trader-location">${esc(trader.node)}</span><span class="trader-eta">Departs ${esc(trader.eta)}</span>`
    : `${dot}<span class="trader-location">Not available</span><span class="trader-eta">Arrives ${esc(trader.eta)}</span>`;

  let inventory = '';
  if (trader.active && trader.inventory && trader.inventory.length) {
    const rows = trader.inventory.map(it => `
      <tr>
        <td>${esc(it.item)}</td>
        <td class="ducat-val">${it.ducats > 0 ? it.ducats + ' ⟁' : '—'}</td>
        <td class="credit-val">${it.credits > 0 ? it.credits.toLocaleString() + ' ¢' : '—'}</td>
      </tr>
    `).join('');
    inventory = `
      <table class="inventory-table">
        <thead><tr><th>Item</th><th>Ducats</th><th>Credits</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  return `
    <div class="live-card ${trader.active && trader.inventory && trader.inventory.length > 6 ? 'full-width' : ''}">
      <div class="card-title">Void Trader — Baro Ki'Tec</div>
      <div class="trader-status">${status}</div>
      ${inventory}
    </div>
  `;
}

function buildNightwaveCard(nw) {
  if (!nw) return `
    <div class="live-card">
      <div class="card-title">Nightwave</div>
      <div class="empty-state">No active Nightwave season</div>
    </div>`;

  const challenges = (nw.active_challenges || []).map(ch => {
    const tagClass = ch.is_elite ? 'elite' : ch.is_daily ? 'daily' : 'weekly';
    const tagLabel = ch.is_elite ? 'Elite' : ch.is_daily ? 'Daily' : 'Weekly';
    return `
      <div class="nw-row">
        <span class="nw-tag ${tagClass}">${tagLabel}</span>
        <div style="flex:1;min-width:0">
          <div style="color:var(--text);font-size:13px">${esc(ch.title)}</div>
          <div style="color:var(--text-dim);font-size:11px;margin-top:2px">${esc(ch.eta)}</div>
        </div>
        <span class="nw-rep">+${ch.reputation.toLocaleString()} rep</span>
      </div>
    `;
  }).join('');

  return `
    <div class="live-card">
      <div class="card-title">Nightwave <span>Season ${nw.season} · ${esc(nw.eta)}</span></div>
      ${challenges || '<div class="empty-state">No active challenges</div>'}
    </div>
  `;
}

function buildAlertsCard(alerts) {
  if (!alerts || !alerts.length) return `
    <div class="live-card">
      <div class="card-title">Alerts</div>
      <div class="empty-state">No active alerts</div>
    </div>`;
  const rows = alerts.map(a => `
    <div class="alert-row">
      <div style="flex:1;min-width:0">
        <div class="alert-reward">${esc(a.reward)}</div>
        <div class="alert-sub">${esc(a.node)} · ${esc(a.mission_type)} · ${esc(a.faction)}</div>
      </div>
      <span class="eta-chip">${esc(a.eta)}</span>
    </div>
  `).join('');
  return `
    <div class="live-card">
      <div class="card-title">Alerts <span>${alerts.length} active</span></div>
      ${rows}
    </div>
  `;
}

function buildInvasionsCard(invasions) {
  if (!invasions || !invasions.length) return `
    <div class="live-card">
      <div class="card-title">Invasions</div>
      <div class="empty-state">No active invasions</div>
    </div>`;
  const rows = invasions.map(inv => `
    <div class="invasion-row">
      <div class="invasion-info">
        <div style="color:var(--text);font-size:13px">${esc(inv.node)}</div>
        <div class="invasion-factions">
          <span>${esc(inv.attacker)}</span>
          <span class="invasion-vs">vs</span>
          <span>${esc(inv.defender)}</span>
          <span class="eta-chip" style="margin-left:auto">${esc(inv.eta)}</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${inv.progress}%"></div>
        </div>
        <div class="invasion-rewards">
          <span class="reward-chip">⚔ ${esc(inv.attacker_reward)}</span>
          <span class="reward-chip">🛡 ${esc(inv.defender_reward)}</span>
        </div>
      </div>
    </div>
  `).join('');
  return `
    <div class="live-card">
      <div class="card-title">Invasions <span>${invasions.length} active</span></div>
      ${rows}
    </div>
  `;
}

// ── Data loading ───────────────────────────────────────────

async function loadData() {
  resetCountdown();
  document.getElementById('live-content').innerHTML =
    '<div class="loading-overlay"><div class="spinner"></div> Loading worldstate…</div>';

  try {
    const res = await fetch(`/api/worldstate?platform=${currentPlatform}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderAll(data);
  } catch (err) {
    document.getElementById('live-content').innerHTML =
      `<div class="live-card full-width"><div class="error-msg">
        Failed to load worldstate: ${esc(err.message)}<br>
        <small style="color:var(--text-dim);margin-top:6px;display:block">
          If this is the first run, download the worldstate manually:<br>
          <a href="https://content.warframe.com/dynamic/worldState.php" target="_blank"
             style="color:var(--accent)">content.warframe.com/dynamic/worldState.php</a>
          and save it as <code>data/worldstate_raw.json</code>, then run
          <code>python scripts/fetch_worldstate.py</code>.
        </small>
      </div></div>`;
  }
}

function renderAll(data) {
  const grid = document.createElement('div');
  grid.className = 'live-grid';

  grid.innerHTML = [
    buildFissureCard(data.fissures || []),
    buildSortieCard(data.sortie),
    buildArchonCard(data.archon_hunt),
    buildTraderCard(data.void_trader),
    buildNightwaveCard(data.nightwave),
    buildAlertsCard(data.alerts || []),
    buildInvasionsCard(data.invasions || []),
  ].join('');

  document.getElementById('live-content').innerHTML = '';
  document.getElementById('live-content').appendChild(grid);
}

// ── Countdown timer ────────────────────────────────────────

function resetCountdown() {
  countdownVal = 60;
  document.getElementById('refresh-countdown').textContent = countdownVal;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownVal--;
    document.getElementById('refresh-countdown').textContent = Math.max(0, countdownVal);
    if (countdownVal <= 0) {
      clearInterval(countdownTimer);
      loadData();
    }
  }, 1000);
}

// ── Init ───────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
