<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void Codex — Live Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/layout.css">
  <link rel="stylesheet" href="/static/panels.css">
  <link rel="stylesheet" href="/static/responsive.css">
  <link rel="stylesheet" href="/static/live.css">
</head>
<body>
<div class="atmo"></div>

<div class="app">

<main class="main">
<header class="header">
  <h1 class="header-title">Live Data</h1>
</header>

<div class="live-wrap">
  <div class="live-controls">
    <span class="controls-label">Platform</span>
    <div class="platform-pills">
      <button class="platform-pill active" onclick="setPlatform('pc')">PC</button>
      <button class="platform-pill" onclick="setPlatform('ps4')">PS4</button>
      <button class="platform-pill" onclick="setPlatform('xb1')">Xbox</button>
      <button class="platform-pill" onclick="setPlatform('swi')">Switch</button>
    </div>
    <div class="refresh-info">
      <span>Refresh in <span id="refresh-countdown">180</span>s</span>
      <button class="refresh-btn" onclick="loadData()">↻ Now</button>
    </div>
  </div>
  <div id="live-content"></div>
</div>
</main>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <div class="brand-text">VOID <span>CODEX</span></div>
  </div>

  <nav class="nav-menu">
    <a href="/" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 20 20"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="11" y="3" width="6" height="6" rx="1"/><rect x="3" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/></svg>
      </div>
      Calculator
    </a>
    <a href="/live" class="nav-item active">
      <div class="nav-icon">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="3"/><path d="M10 2 L10 5 M10 15 L10 18 M2 10 L5 10 M15 10 L18 10"/></svg>
      </div>
      Live Data
    </a>
    <a href="/factions" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M10 2L17 5V12C17 15.5 10 18 10 18C10 18 3 15.5 3 12V5Z"/>
          <line x1="10" y1="8" x2="10" y2="12"/><line x1="8" y1="10" x2="12" y2="10"/>
        </svg>
      </div>
      Factions
    </a>
  </nav>

  <div class="sidebar-tools">
    <button class="nav-item" onclick="openGuide()">
      <div class="nav-icon">
        <svg viewBox="0 0 20 20"><rect x="4" y="3" width="12" height="14" rx="1"/><line x1="7" y1="7" x2="13" y2="7"/><line x1="7" y1="11" x2="13" y2="11"/></svg>
      </div>
      Guide
    </button>
  </div>

  <div class="sidebar-footer">
    <div id="nav-ver">v—</div>
    <div>© 2026 Void Codex</div>
    <div>Data: wiki.warframe.com</div>
    <div>Not affiliated with DE</div>
  </div>
</aside>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleDrawer()"></div>
<button class="burger-btn" id="burger-btn" aria-label="Menu" onclick="toggleDrawer()">
  <span></span><span></span><span></span>
</button>

</div><!-- .app -->

<script>
'use strict';

let currentPlatform = 'pc';
let countdownTimer  = null;
let countdownVal    = 180;

const TIER_COLORS = {
  Lith: '#e8a060', Meso: '#c0c0c0', Neo: '#ffd700',
  Axi: '#80c8ff', Requiem: '#c39bd3', Omnia: '#c0c0c0',
};

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setPlatform(p) {
  currentPlatform = p;
  document.querySelectorAll('.platform-pill').forEach(el => {
    el.classList.toggle('active',
      el.textContent.toLowerCase() === p ||
      (p === 'xb1' && el.textContent === 'Xbox') ||
      (p === 'swi' && el.textContent === 'Switch')
    );
  });
  loadData();
}

let activeTier = 'All';
function setTier(tier) {
  activeTier = tier;
  document.querySelectorAll('.tier-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tier === tier));
  const el = document.getElementById('fissure-rows');
  if (el) el.innerHTML = renderFissureRows(window._fissureData || []);
}

function toggleDrawer() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn     = document.getElementById('burger-btn');
  const open    = sidebar.classList.toggle('open');
  overlay.classList.toggle('open', open);
  btn.classList.toggle('open', open);
}

function openGuide() {}

/* ── Fissures ── */
function renderFissureRows(fissures) {
  const list = activeTier === 'All' ? fissures : fissures.filter(f => f.tier === activeTier);
  if (!list.length) return '<div class="live-empty">No fissures for selected tier</div>';
  return '<div class="fissure-list">' + list.map(f => `
    <div class="fissure-row">
      <span class="fissure-tier" ${TIER_COLORS[f.tier] ? `style="--tier-color:${TIER_COLORS[f.tier]}"` : ''}>${esc(f.tier)}</span>
      <div class="fissure-info">
        <div class="fissure-node">${esc(f.node)}${f.is_storm ? '<span class="fissure-tag">Storm</span>' : ''}${f.is_steel_path ? '<span class="fissure-tag">SP</span>' : ''}</div>
        <div class="fissure-sub">${esc(f.mission_type)} · ${esc(f.enemy)}</div>
      </div>
      <span class="eta-chip">${esc(f.eta)}</span>
    </div>`).join('') + '</div>';
}

function buildFissureCard(fissures) {
  window._fissureData = fissures;
  const tiers = ['All','Lith','Meso','Neo','Axi','Requiem','Omnia'];
  const btns = tiers.map(t => {
    const col = TIER_COLORS[t] ? `style="--tier-color:${TIER_COLORS[t]}"` : '';
    return `<button class="tier-btn${t === activeTier ? ' active' : ''}" data-tier="${t}" onclick="setTier('${t}')" ${col}>${t}</button>`;
  }).join('');
  return `<div class="panel live-card-full">
    <h2>Void Fissures <span class="live-count">${fissures.length} active</span></h2>
    <div class="tier-btns">${btns}</div>
    <div id="fissure-rows">${renderFissureRows(fissures)}</div>
  </div>`;
}

/* ── Sortie ── */
function buildSortieCard(sortie) {
  if (!sortie) return `<div class="panel">
    <h2>Sortie</h2>
    <div class="live-empty">No sortie data</div>
  </div>`;
  const missions = (sortie.missions || []).map(m => `
    <div class="mission-block">
      <div class="mission-node">${esc(m.node)}</div>
      <div class="mission-sub">${esc(m.mission_type)}</div>
      ${m.modifier ? `<span class="modifier-badge">${esc(m.modifier)}</span>` : ''}
    </div>`).join('');
  return `<div class="panel">
    <h2>Sortie <span class="live-count">${esc(sortie.eta)}</span></h2>
    <div class="sortie-meta">
      <span class="sortie-boss">${esc(sortie.boss)}</span>
      <span>${esc(sortie.faction)}</span>
    </div>
    <div class="mission-list">${missions}</div>
  </div>`;
}

/* ── Archon Hunt ── */
function buildArchonCard(archon) {
  if (!archon) return `<div class="panel">
    <h2>Archon Hunt</h2>
    <div class="live-empty">No archon hunt data</div>
  </div>`;
  const missions = (archon.missions || []).map(m => `
    <div class="mission-block">
      <div class="mission-node">${esc(m.node)}</div>
      <div class="mission-sub">${esc(m.mission_type)}</div>
      ${m.modifier ? `<span class="modifier-badge">${esc(m.modifier)}</span>` : ''}
    </div>`).join('');
  return `<div class="panel">
    <h2>Archon Hunt <span class="live-count">${esc(archon.eta)}</span></h2>
    <div class="sortie-meta">
      <span class="sortie-boss">${esc(archon.boss)}</span>
      <span>${esc(archon.faction)}</span>
    </div>
    <div class="mission-list">${missions}</div>
  </div>`;
}

/* ── Void Trader ── */
function buildTraderCard(trader) {
  if (!trader) return '';
  const dot = trader.active
    ? '<span class="trader-dot active"></span>'
    : '<span class="trader-dot inactive"></span>';
  const status = trader.active
    ? `${dot}<span class="trader-location">${esc(trader.node)}</span><span class="trader-eta">Departs ${esc(trader.eta)}</span>`
    : `${dot}<span class="trader-location">Not available</span><span class="trader-eta">Arrives ${esc(trader.eta)}</span>`;
  let inventory = '';
  if (trader.active && trader.inventory && trader.inventory.length) {
    const rows = trader.inventory.map(it => `
      <tr>
        <td>${esc(it.item)}</td>
        <td class="ducat-val">${it.ducats > 0 ? it.ducats + ' ⟁' : '—'}</td>
        <td class="credit-val">${it.credits > 0 ? it.credits.toLocaleString() + ' ¢' : '—'}</td>
      </tr>`).join('');
    inventory = `<table class="inventory-table">
      <thead><tr><th>Item</th><th>Ducats</th><th>Credits</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }
  const wideClass = trader.active && trader.inventory && trader.inventory.length > 6 ? ' live-card-wide' : '';
  return `<div class="panel${wideClass}">
    <h2>Void Trader — Baro Ki'Tec</h2>
    <div class="trader-status">${status}</div>
    ${inventory}
  </div>`;
}

/* ── Nightwave ── */
function buildNightwaveCard(nw) {
  if (!nw) return `<div class="panel">
    <h2>Nightwave</h2>
    <div class="live-empty">No active Nightwave season</div>
  </div>`;
  const challenges = (nw.active_challenges || []).map(ch => {
    const cls = ch.is_elite ? 'elite' : ch.is_daily ? 'daily' : 'weekly';
    const lbl = ch.is_elite ? 'Elite' : ch.is_daily ? 'Daily' : 'Weekly';
    return `<div class="nw-row">
      <span class="nw-tag ${cls}">${lbl}</span>
      <div class="nw-challenge-info">
        <div class="nw-title">${esc(ch.title)}</div>
        <div class="nw-eta">${esc(ch.eta)}</div>
      </div>
      <span class="nw-rep">+${ch.reputation.toLocaleString()}</span>
    </div>`;
  }).join('');
  return `<div class="panel">
    <h2>Nightwave <span class="live-count">S${nw.season} · ${esc(nw.eta)}</span></h2>
    ${challenges || '<div class="live-empty">No active challenges</div>'}
  </div>`;
}

/* ── Alerts ── */
function buildAlertsCard(alerts) {
  if (!alerts || !alerts.length) return `<div class="panel">
    <h2>Alerts</h2>
    <div class="live-empty">No active alerts</div>
  </div>`;
  const rows = alerts.map(a => `
    <div class="alert-row">
      <div class="alert-info">
        <div class="alert-reward">${esc(a.reward)}</div>
        <div class="alert-sub">${esc(a.node)} · ${esc(a.mission_type)} · ${esc(a.faction)}</div>
      </div>
      <span class="eta-chip">${esc(a.eta)}</span>
    </div>`).join('');
  return `<div class="panel">
    <h2>Alerts <span class="live-count">${alerts.length} active</span></h2>
    ${rows}
  </div>`;
}

/* ── Invasions ── */
function buildInvasionsCard(invasions) {
  if (!invasions || !invasions.length) return `<div class="panel">
    <h2>Invasions</h2>
    <div class="live-empty">No active invasions</div>
  </div>`;
  const rows = invasions.map(inv => `
    <div class="invasion-row">
      <div class="invasion-node">${esc(inv.node)}</div>
      <div class="invasion-factions">
        <span>${esc(inv.attacker)}</span>
        <span class="invasion-vs">VS</span>
        <span>${esc(inv.defender)}</span>
        <span class="eta-chip">${esc(inv.eta)}</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" data-progress="${inv.progress}"></div>
      </div>
      <div class="invasion-rewards">
        <span class="reward-chip">⚔ ${esc(inv.attacker_reward)}</span>
        <span class="reward-chip">🛡 ${esc(inv.defender_reward)}</span>
      </div>
    </div>`).join('');
  return `<div class="panel">
    <h2>Invasions <span class="live-count">${invasions.length} active</span></h2>
    ${rows}
  </div>`;
}

/* ── Open World Cycles ── */
function buildCyclesCard(cycles) {
  if (!cycles || !cycles.length) return '';
  const WARM = new Set(['Day', 'Warm', 'Fass', 'Corpus']);
  const items = cycles.map(c => {
    const cls = WARM.has(c.state) ? 'cycle-warm' : 'cycle-cool';
    return `<div class="cycle-item">
      <div class="cycle-name">${esc(c.location)}</div>
      <div class="cycle-state ${cls}">${esc(c.state)}</div>
      <div class="cycle-eta">${esc(c.eta)}</div>
    </div>`;
  }).join('');
  return `<div class="panel live-card-full">
    <h2>Open World Cycles</h2>
    <div class="cycle-grid">${items}</div>
  </div>`;
}

/* ── News ── */
function buildNewsSection(news) {
  if (!news || !news.length) return '';
  const cards = news.map(n => {
    const img = n.image
      ? `<img class="news-thumb" src="${esc(n.image)}" alt="" loading="lazy">`
      : '';
    const link = n.url
      ? `<a class="news-msg" href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.message)}</a>`
      : `<span class="news-msg">${esc(n.message)}</span>`;
    return `<div class="news-card">${img}${link}</div>`;
  }).join('');
  return `<div class="news-row" id="news-row">${cards}</div>`;
}

/* ── Events ── */
function buildEventsCard(events) {
  if (!events || !events.length) return '';
  const rows = events.map(ev => `
    <div class="event-row">
      <div class="event-title">${esc(ev.name)}</div>
      ${ev.reward ? `<div class="event-desc">${esc(ev.reward)}</div>` : ''}
      <div class="live-eta">${esc(ev.eta)}</div>
    </div>`).join('');
  return `<div class="panel live-card-full">
    <h2>Events <span class="live-count">${events.length} active</span></h2>
    <div class="event-list">${rows}</div>
  </div>`;
}

/* ── Data loading ── */
async function loadData() {
  resetCountdown();
  document.getElementById('live-content').innerHTML =
    '<div class="loading-msg">Acquiring worldstate…</div>';
  try {
    const res = await fetch(`/api/worldstate?platform=${currentPlatform}`);
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `HTTP ${res.status}`);
    }
    renderAll(await res.json());
  } catch (err) {
    document.getElementById('live-content').innerHTML = `
      <div class="panel">
        <div class="error-msg">
          Live data temporarily unavailable.
          <small>${esc(err.message)}</small>
        </div>
      </div>`;
  }
}

function renderAll(data) {
  const newsHtml = buildNewsSection(data.news || []);

  const cards = [
    buildCyclesCard(data.cycles || []),
    buildFissureCard(data.fissures || []),
    buildSortieCard(data.sortie),
    buildArchonCard(data.archon_hunt),
    buildTraderCard(data.void_trader),
    buildNightwaveCard(data.nightwave),
    buildAlertsCard(data.alerts || []),
    buildInvasionsCard(data.invasions || []),
    buildEventsCard(data.events || []),
  ].filter(Boolean).join('');

  const el = document.getElementById('live-content');
  el.innerHTML = newsHtml;
  const grid = document.createElement('div');
  grid.className = 'live-grid';
  grid.innerHTML = cards;
  el.appendChild(grid);
  grid.querySelectorAll('.progress-bar-fill[data-progress]').forEach(bar => {
    bar.style.width = bar.dataset.progress + '%';
  });
}

/* ── Countdown ── */
function resetCountdown() {
  countdownVal = 180;
  document.getElementById('refresh-countdown').textContent = countdownVal;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownVal--;
    document.getElementById('refresh-countdown').textContent = Math.max(0, countdownVal);
    if (countdownVal <= 0) { clearInterval(countdownTimer); loadData(); }
  }, 1000);
}

/* ── Version ── */
fetch('/api/version').then(r => r.json()).then(d => {
  const el = document.getElementById('nav-ver');
  if (el) el.textContent = 'v' + d.app;
}).catch(() => {});

loadData();
</script>
</body>
</html>
